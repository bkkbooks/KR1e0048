body:
  text: 春秋集注春秋類提要臣等謹案春秋集注十一卷綱領一卷宋張洽撰洽字元徳清江人嘉定初進士官至著作佐郎端平元年朝廷知洽家居著書宣命臨江軍守臣以禮延訪齎紙札謄冩以進書既上除洽知實章閣㑹洽卒諡之曰文憲以其書付秘閣書首有洽進書狀自言於漢唐以來諸儒之議論莫不考覈研究取其足以發明聖人之意者附於每事之左名曰春秋集傳既又因此書之麤備復倣先師文公語孟之書㑹其精意詮次其説以為集注云云考朱子語録深駁胡安國夏時冠周月之説洽此書以春為建子之月與左傳王周正月義合足破支離轇轕之陋車若水脚氣集乃深以洽改從周正為非門户之見殊不足據至若水謂春秋一書質實判斷不得除非起孔子出來説當時之事與所以褒貶去取之意方得今作集注便是質實判斷此照語孟例不得語孟是説道理春秋是紀事且首先句便難明惠公仲子不知惠公之仲子耶或惠公同仲子耶尹氏卒一邊道是婦人一邊道是天子之世卿諸儒譏世卿之説自是明訓恐是舉燭尚明之論理雖是而事則非也云云其論亦頗中洽之病要其合者不可廢也明洪武中以此書與胡安國傳同立學官迨永樂間胡廣等剽襲汪克寛纂疏為大全其説專主胡傳科塲用為程式洽書遂廢不行今此書遺本僅存而所謂集傳則佚之久矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋集注綱領宋張洽撰論語堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天禄永終舜亦以命禹曰程子云曰上少湯字予小子履敢用𤣥牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽􅂤在帝心朕躬有罪無以萬方萬方有罪罪在朕躬周有大賚善人是富雖有周親不如仁人百姓有過在予一人謹權量審法度修廢官四方之政行焉興滅國繼絶世舉逸民天下之民歸心焉所重民食喪祭寛則得衆信則民任焉敏則有功公則説顔淵問為邦子曰行夏之時寅為人正時以作事當以人為紀故取之乘殷之輅得質之中服周之冕得文之中樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也所因謂三綱五常所捐益謂文質三統也子曰道千乘之國敬事而信節用而愛人使民以時子曰晉文公譎而不正齊桓公正而不譎子曰齊一變至於魯魯一變至於道孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出葢十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議孔子曰禄之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣子曰夷狄之有君不如諸夏之亡也陳成子弑􅂤公孔子沐浴而朝告於哀公曰陳恒弑其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也君曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也孟子曰世衰道微邪説暴行有作臣弑其君者有之子弑其父者有之孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎公羊傳子曰春秋之信史也其事則齊桓晉文其㑹則主㑹者為之也其詞則丘有罪焉爾亦此意也昔者禹抑洪水而天下平周公膺戎狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也史記魯哀公十四年春狩于大野獲麟孔子曰吾道不行矣乃因史記作春秋上至隱公下訖哀十四年約其文詞而指博故吳楚之君自稱王而春秋貶之曰子踐土之㑹實召周天子而春秋諱之曰天王狩于河陽推此類以繩當世孔子在位聽訟文詞有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一詞莊周氏曰春秋經世先王之志也聖人議而不辯又曰春秋以道名分公羊氏曰春秋何以始乎隠祖之所逮聞也何以終乎哀十四年曰備矣君子曷為為春秋撥亂世反之正莫近諸春秋漢董氏曰孔子知時之不用道之不行是非二百四十二年之中以為天下儀表貶諸侯討大夫以達王事曰我欲載之空言不如見之行事之深切著明也有國者不可不知春秋前有讒而不見後有賊而不知為人臣者不可不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷簒弑誅死之罪其實皆以善為之而不知其義被之空言不敢辭故春秋者禮義之大宗也隋王通氏曰春秋之於王道是輕重之權衡曲直之繩墨也濓溪周子曰春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者於前所以懼生者於後也宜乎萬世無窮王祀孔子報德報功之無盡焉河南邵氏曰春秋孔子之刑書也功過不相掩五伯者功之首罪之魁也先定五伯之功過而學春秋則大意立矣春秋之間有功者未有大於四國者也有過者亦未有大於四國者也不先治五伯之功過則事無統理不得聖人之心也横渠張氏曰春秋之書在古無有乃仲尼所自作惟孟子為能知之非理明義精殆未可學先儒未及此而治之故其説多鑿伊川程氏曰詩書載道之文春秋聖人之用詩書如藥方春秋如用藥理病聖人之用全在此書所謂不如載之行事之深切著明者也又曰五經之有春秋猶法律之有斷例也律令惟言其法至於斷例始見其法之用又曰學春秋亦善一句是一事是非便見於此乃窮理之要他經非不可窮理也但論其義耳春秋因其行事是非較著故窮理為要春秋以何為凖無如中庸欲知中庸無如權須是時而為中中非手足胼胝閉戸不出之間所可取也視其當然之時則閉戸胼胝各為其中也權之為言稱錘之謂也何物為權義也時也亦只説到義以上更難説在人自看如何又曰春秋傳為案經為斷又曰春秋之法極謹嚴諸侯而有癈禮即外之韓子之言深得其㫖又作春秋傳序曰天之生民必有出類之才起而君長之治之而爭奪息導之而生養遂教之而倫理明然後人道立天道成地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天一作時以開人各因時而立政暨乎三王迭興三重既備子丑寅之建正忠質文之更尚人道備矣天運周矣聖王既不復作有天下者雖欲倣古之跡亦私意妄為而已事之謬秦至以建亥為正道之悖漢專以智力持世豈復知先王之道也夫子當周之末以聖人不復作也順天應時之治不復有也於是作春秋為百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也先儒之傳曰游夏不能贊一辭辭不待贊也言不能與斯耳斯道也惟顔子嘗聞之矣行夏之時乘殷之輅服周之冕樂則韶舞此其凖的也後世以史視春秋謂襃善貶惡而已至於經世之大法則不知也春秋大義數十其義雖大炳如日星乃易見也惟其微辭隱義時措從宜者為難知也或抑或縱或與或奪或進或退或微或顯而得乎義理之安文質之中寛猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物然後識化工之神聚衆材然後知作室之用於一事一義而欲窺聖人之用心一本無心字非上智不能也故學春秋者必優游涵泳黙識心通然後能造其微也又曰春秋大率所書事同則辭同後人因謂之例然有事同辭異者蓋各有義非可例拘也又曰有重疊言者如征伐盟㑹之類蓋欲成書勢須如此不可事事各求異義但一字有異或上下文異則義須别又曰春秋之文一一意在示人如土功之事無大小一一書之其意止欲人君慎重民力也胡氏曰詞同者正例也詞異則其例變矣正例非聖人莫能立變例非聖人莫能裁惟窮理精義以學春秋者於例中見法例外通類也武夷胡氏曰春秋魯史爾仲尼就加筆削乃史外傳心之要典也孟氏又發明宗㫖以為天子之事者周道衰微乾綱解紐亂臣賊子接迹當世人欲肆而天理滅矣仲尼天理之所在不以為己任而誰可五典弗惇已所當叙五禮弗庸已所當秩五服弗章已所當命五刑弗用已所當討故假魯史以寓王法撥亂世反之正叙先後之倫而典自此可惇秩上下之分而禮自此可庸有徳必襃而善可勸有罪必貶而惡可懲其志存乎經世其功配於大禹之抑洪水周公之驅虎豹其大要皆天子之事也故曰知我罪我者其惟春秋乎知孔子者謂此書遏人欲於横流存天理於既滅為後世慮至深遠也罪孔子者無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆則戚矣是故春秋之作公好惡則發乎詩之情酌古今則貫乎書之事興常典則體乎禮之經本忠恕則導乎樂之和著權制則盡乎易之變百王之法度萬世之凖繩皆在此書故君子以為五經之有春秋猶法律之有斷例也學是經者信窮理之要不學是經而處大事決大疑能不惑者鮮矣去聖旣遠欲因遺經窺測聖人之用豈易能乎然世有先後人心所同然者一爾苟得其所同然者雖越宇宙若見聖人親炙之也而春秋之權度在我矣又曰傳春秋者三家左氏叙事見本末公羊穀梁詞辯而義精學經以傳為案則當閲左氏玩詞以義為主則當習公穀如載惠公元妃繼室及仲子之歸于魯即隠公兄弟嫡庶之辨攝讓之實可案而知也當閲左氏謂此類也若夫來賵仲子以為豫凶事則誣矣王正月之為大一統及我欲之暨不得已也當習公羊氏謂此類也謂母以子貴媵妾許稱夫人則亂矣段弟也弗謂弟公子也弗謂公子賤段而甚鄭伯之處心積慮成於殺也當習穀梁氏謂此類也若夫曲生條例以大夫日卒為正則鑿矣萬物紛錯懸諸天衆言淆亂折諸聖要在反求於心斷之以理精擇而慎取之則美玉之與武砆必有能辨之者左氏釋經雖􅂤而博通諸史叙事尤詳能令百代之下頗見本末其有功於春秋為多公穀釋經其義皆密如衛州吁以稱人為討賊之詞也公薨不地故也不書葬賊不討以辠下也若此之類深得聖人誅亂臣討賊子之意考其源流必有端緒非曲説所能及也啖趙為三傳所記本皆不謬義則口傳未形竹帛後代學者妄加附益轉相傳授浸失本真故事多迂誕理或舛駮其言信矣然則學者於三傳忽焉而不習則無以知經習焉而不察擇焉而不精則春秋之𢎞意大㫖􅂤易明白者汨於僻説愈晦而不顯矣春秋集注綱領
