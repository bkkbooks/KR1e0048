body:
  text: 春秋集注卷三宋張洽撰莊公名同桓公子母文姜諡法勝敵克亂曰莊元年春王正月不書即位桓公見戕於齊固不及有立子之命莊公之生雖以適冢書於經然繼承之初創巨痛深異于他公不但當詣子王即位而父之仇未討亦當告于天子以國事委冢宰而專以討賊為事今泰然居之曽不以父之無罪見殺於鄰國為念但與桓公之初立不同耳是以削其即位蓋莊公之不書即位比于桓宣之特書者固未至此而以人子之心處莊公之時當知莊之無志又非隱閔僖之比也此春秋之㫖唯深明乎時義者知之三月夫人孫于齊夫人文姜莊公母也魯人責其與聞乎弒于是出奔左氏謂不稱姜氏絶不為親禮也穀梁子曰人之於天也以道受命於人也以言受命不若於道者天絶之也不若於言者人絶之也臣子大受命蓋文姜之罪上通乎天為魯之臣子者原先君見弒之罪固難以嗣君夫人所出而以恩掩義故斷以大義而去姜氏以絶之所以尊社稷而重本也古之聖人為禮有等衰制服有輕重三綱之設以夫為妻綱皆所以明天倫之正而使人知本以自别于禽獸者也夏單伯逆王姬逆左傳作送考之春秋之例非也況築館在秋如單伯果以天子大夫送王姬必俟館成之後方至魯豈得預書之當從公穀作逆魯單伯魯大夫不書名氏蓋周禮所謂公之孤四命也大夫而逆王姬者當是時王姬嫁于齊天子不自主昏而使魯主之王姬先至于魯然後往成禮于齊故魯大夫往逆于周也公羊氏曰逆者何使我主之也曷為使我主之天子嫁女乎諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之此古者王姬下嫁之常禮也常事不書而此特書之又不書如京師逆王姬穀梁氏曰其義不可受于京師是也躬君弒于齊使之主昏與齊為禮其義固不可受也春秋書此所以著魯居斬衰而主婚姻已非禮之常而不可不辭矣況王室之女下嫁齊侯而齊乃寢苫枕戈不可同天之讎奈何與之主婚於此見魯之君臣無復讐之心而國之三綱至是絶矣秋築王姬之館于外築館所以待王姬之舍以俟齊侯之逆也於廟則已尊於路寢則不可小寢則嫌故必改築然魯主王姬前此必有其所今特築于外者當是時知仇讐不可與接昏姻又衰麻哭泣不可雜于吉事故築于外也然在平日為可耳桓公弒于齊未及一年其創巨痛深當百倍於先君正終之日又可以于外為安而命國人以築齊王姬之館與春秋所以詳書而著其忘父親讎之罪也冬十月乙亥陳侯林卒王使榮叔來錫桓公命榮叔周大夫榮氏叔字錫賜也桓公已終而賜之命蓋莊公主王姬之昏故親魯而寵嘉其父遣使賜之䇿命若昭七年衛襄公之卒王使成簡公追命衛侯之比也夫五服五章謂之天命者誠以命德討罪上合天心然後足以昭示至公勸善懲惡今桓公之弒隱在王法有賊殺其親之罪乃司馬九伐之所宜加周王非特不能討又以惡為善示以褒嘉故春秋之例王必稱天而此年特去天而止書王以見王之不能奉若天道趙氏以為寵篡弒以瀆三綱也得春秋之㫖矣王姬歸于齊王姬來而不書至别于魯之夫人也書歸著莊公之忘親釋仇主婚而成禮也逆于京師築館于外而不書歸于齊則有本無末無以見莊公忘仇之實矣齊師遷紀郱鄑郚杜氏注郱在東莞臨朐縣東南郚在朱虛縣東南北海都昌縣西有訾城今齊欲滅紀故徙其三邑之民而取其地齊圖紀久矣始遷三邑其民之不服者迫遷之取其地而實以齊之民故稱師而書遷至是紀之力不足以自守駸駸於滅亡矣二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘慶父莊公之庶兄於餘丘公羊曰邾之邑也或曰小國而近于戎者其曰於餘若曰於越然未詳孰是莊公之立寢苫枕戈莫先於率一國以同仇于不義之齊捨是而命將帥師先有事於無罪之小國兵興無名而公子慶父以尊屬得兵柄亦見於此莊公是時年才十五慶父得政以制一國之權軍政之本既失而權移于下以成異日子般閔公篡弒之禍故春秋詳書以譏之胡氏曰魯見弒者三君隱般子惡皆以翬慶父仲遂先制其兵而後得以成篡弒之謀由辨之不早辨也豈不信哉秋七月齊王姬卒禮記檀弓曰齊告王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服然則王姫比于內女而書卒禮之常也至于舍不共戴天之讐而乃主齊夫人之喪則知有齊而不知有父莊公之罪可謂大矣故自單伯逆王姬以至北章特書屢書辭煩而不殺以正其淟汨大倫誣滅天理之罪所謂婉而成章也冬十有二月夫人姜氏㑹齊侯于禚禚齊地公羊作郜下同氏傳曰書姦也趙氏曰姜齊侯之惡著矣亦所以病公也曰子可以制母乎夫死從子通乎其下況於國君君者人神之主風教之本也不能正家如正國何若公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行哀戚之不至云爾子謹案春秋孔子之刑書也觀春秋書法如此則以孔而當周公之任正文姜之罪必不免于管蔡之誅矣乙酉宋公馮卒三年春王正月溺㑹齊師伐衛溺不氏與無駭挾同伐衛為納朔也命將出師㑹仇讐而納衛侯朔蓋不待貶絶而惡見矣夏四月葬宋莊公五月葬桓王王以魯桓公十五年崩至此七年乃葬劉氏曰慢也夫喪不過三年天子七月而葬此送終之大事禮經之不可進退者也及是周室衰微隱三年平王崩􅉠葬之禮諸侯莫之或講而王室反遣使下求於列國隱公復不往㑹其葬周室之喪禮至此掃地盡矣方喪之制自舜二十有八載之後三代用之至于此時則不待漢文之短喪而已先亡矣今桓王七年而不葬者必久喪以待諸侯之至魯人聞喪期不過遣微者往㑹之耳所以既不書公如又不書卿大夫往而止記桓王之葬也同軌畢至之禮既不復行於是諸侯惡其害已而去其籍先王之喪禮僅傳于後世惟有士喪既夕士虞耳可勝惜哉孔子序書而存顧命康王之誥作春秋而於此書葬桓王周室之盛衰可以參見矣秋紀季以酅入于齊季紀侯之弟諸侯之弟例稱字酅紀之邑杜氏注在齊國東安平縣今鄆川之境也齊欲滅紀元年又遷其三邑紀侯力不能抗欲去其國故使季以酅事齊請復五廟當是時王政不行霸者未作强大吞併無道肆行小國不能校巽辭下敵以存宗廟至于如此以先王之建國而宗祀之存反聽命于强暴春秋所以於紀季無譏焉而書入以志其難蓋閔之也冬公次于滑公羊穀梁作郎曰杜氏注滑鄭地在陳留襄邑縣西北或今滑州也傳公次于滑將㑹鄭伯謀紀故也凡師一宿為舍再宿為信過信為次公以姻親之故閔紀之難已在朝夕而度其力終不能救故次師于滑將以鄭之不㑹而辭于紀耳非實有救紀之心也彼於父之讐尚忘之而不圖豈真有心於存紀哉故書次于滑見師出無名以深譏之四年春王二月夫人姜氏享齊侯于祝丘享公穀作饗祝丘魯地享燕兩君相見之禮享有體薦所以訓恭儉燕有折俎所以示慈惠婦人送迎不出門見兄弟不踰閾夾谷之㑹齊侯欲享魯君夫子猶以犧象不出門嘉樂不野合拒之豈齊侯文姜可以行之於祝丘乎假先王之禮而為禽獸之行大亂之道也漢人有云淫亂之漸其變為篡文姜之行瀆亂周公之禮多矣魯人習之三十餘年卒至于子般閔公兩君見弒而後止聖人作易以間有家為家人之始垂訓逺矣三月紀伯姬卒穀梁傳外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也蓋諸侯絶傍期其姑姊妹女子嫁于諸侯則尊同其卒也為之服大功九月然不必皆書此為紀侯去國而伯姬葬于齊侯因魯事以備當時之變也夏齊侯陳侯鄭伯遇于垂齊襄公陳厲公鄭伯突也三國遇垂謀取紀也紀侯大去其國紀侯不能下齊遂以國與紀季去之以違齊難大去者離其民社之守而不反之詞也不胡氏曰與其不爭而去是以異於失地之君而不名與其去而不存是以書叔姬歸酅而不録紀侯之卒明其為君之末矣三愚案紀之本末自桓之五年書齊鄭如紀以至元年年凡關紀之存亡者一一備書之以見齊鄭圖紀之淺深有漸而卒成於今年也紀之圖存雖其間不能無失然而困于强暴之陵迫委宗廟於其弟而後去之故特書大去而不曰出奔所以責强大閔小弱而寓興滅繼絶之志於言意之表也六月乙丑齊侯葬紀伯姬齊襄欲滅紀雖其夫人尚在殯而迫逐其君以去之其惡大矣尚以禮而葬其夫人君子以為豺狼之行而為婦人之仁加刃于人而以手撫之斥言齊侯以賤之也秋七月冬公及齊人狩于禚公羊穀梁作郜微公羊傳公不當與者狩蓋齊侯也齊侯而稱人諱與讐狩也公前此後此皆有事于齊而獨於此譏者譏其一以例其餘蓋通讐之罪俱重不可勝譏而尤莫重乎與讐狩故於此一譏而其餘從同同也五年春王正月夏夫人姜氏如齊師言齊師則齊侯在焉曰如以見魯道有蕩而夫人之行往來恣縱詩人所以有載驅之刺也秋郳犂來來朝郳公羊作倪犂公羊穀梁作黎周郳蓋附庸國即小邾也杜氏云其後數從齊桓以尊室王命以為小邾子東海昌慮縣東北有郳城犂來名也曰常山劉氏曰夷狄附庸例書名犂來能修朝禮故書朝蓋於此已能自進于禮也今案宋仲幾云滕薛郳吾役也則郳蓋宋之附庸非夷狄也而不得與邾儀父同稱字者臨江劉氏以為未成國謂之郳其或然與冬公㑹齊人宋人陳人蔡人伐衛納惠公也穀梁傳是齊侯宋公也其曰人何也人諸侯所以人公也其人公何也逆天王之命也六年春王正月王人子突救衛正月公羊穀梁作三月王人下士也子突字也救衛者奉天王之命以存黔牟而拒朔也朔搆兄篡國天討之所當加而子突能奉王命以救之春秋一經王旅之出而合司馬九伐之法者惟此一事所以雖微者帥師而書字以褒之也夏六月衛侯朔入于衛名之又書入與鄭伯突同篡逆之罪也聖人特人伐衛諸侯於先又褒子突于後正名分以示天討之當然誅黨惡以罪諸侯之同逆而于此書衛侯朔之入國則閔暴行之放恣憂正理之不明者為如何哉自是而後又十餘年齊桓始霸然後諸侯知所一而百餘年間尊卑正否之獾尚有所寄然後知二霸之作為小補於世變之盛衰也秋公至自伐衛書至與公至自唐之意同王誅若行齊魯宋衛皆有當誅之罪故書至以危之也螟冬齊人來歸衛俘二傳作寶胡氏曰案商書遂伐三鬷俘厥寶玉則俘者正文也寶者釋辭也惡傳文姜請之也衛俘衛朔所賂諸侯之貨寶齊人首故主受衛之賂而分於黨惡助亂之國文姜又取以為己之功亦足以見齊襄之淫縱貪黷操貨賂之權以迷惑人心者乃元惡大憝有王者作則諸侯之不待教而誅者也七年春夫人姜氏㑹齊侯于防傳齊志也魯杜氏注防魯地逺至地齊侯之志也夏四月辛卯夜恆星不見夜中星隕如雨夜穀梁作昔隕公羊作霣四恆星經星也經星不見夜明也杜氏以長歷推辛卯月五日月光尚微蓋時無雲日光不以昏沒如雨者言衆多不可為數也此蓋王運將終而霸統方作之祥自此堯舜禹湯文武之紀綱法度掃滅殆盡胡氏曰漢成帝永始中亦有星隕之異而五侯擅權賊莽居攝此天示象于上而人事之必應者也秋大水書大為異非常也蓋文姜宣淫隂盛不制之所感也無麥苗穀梁傳麥苗同時也周之秋今五月麥熟苗將秀因水漂盡民食乏絶有國之大事故書冬夫人姜氏㑹齊侯于穀穀齊地杜氏注濟北穀城縣今屬鄆州東阿縣于文姜元年以罪孫于齊後復宣淫自二年至今詳書策敝笱載驅録于齊風與衛之鶉之奔奔牆有茨諸篇論其時世皆一時之事魯衛先王之後婦行放逸同播其惡於萬民故詩謂之變風夫子曰二國之政兄弟也蓋不特周公康叔之盛而其世衰俗末政之陵夷亦相似如此閔公之篇慶父亂魯齊幾取之與衛之滅適同其時聖人以魯之事已詳於春秋故不復録魯詩而齊詩之及魯事者以不而見之夫二南之風后妃不待間而其德足以化天下後世間有家之道廢而亡國敗家之禍同一軌轍詩易春秋之㫖蓋相為表裏學者不可以不考也八年春王正月師次于郎以俟陳人蔡人次止於外而過信宿也俟者杜氏以為待陳蔡同伐郕也不由王命妄興師衆久次于外無名而動期㑹莫應故書師次又書俟以深責之也甲午治兵治公羊作祠失久次于外而與國不應衆心不一則有伍逃亡之患故申明約束將以訓齊其衆而不知出不以律已失治兵之本矣雖欲治之其將能乎故書曰治兵治者不治者也夏師及齊師圍郕郕降于齊師郕公羊作成之陳蔡不至故㑹齊以圍書及內之志也案左氏師及齊師圍郕郕降于齊師仲慶父請伐齊師莊公不可則公將而出矣魯與郕皆文王之昭蓋同姓兄弟之當親者莊公忘親而志于取郕始擇易制之陳蔡與之同事而陳蔡不來然後不得已而要齊以圍之所以郕不服魯而寧降于齊春秋直書以見其從讐而貪利資人以虐小二國同役而不同心敵遂得以間之魯師之出大無功也故略公而書師所以著輕用民力之罪秋師還常山劉氏曰春秋書魯用師未有如是之詳者蓋莊公此年之師尤為非義上不禀天王之命無故次郎可謂無名甲午治兵可謂黷武圍郕而郕降齊可謂無功歷三時而師還可謂害民夫逆天道親仇讐圍同姓勦民力與國不信伐國不服故聖人備書之以見其惡公胡氏曰春秋正例君將不言帥師則以君為重今莊親將其及其還皆不稱公及不書公至重衆也輕舉大衆妄動久役以勞民毒衆至是師為重矣故皆不書公以著其罪此輕重之權衡也冬十有一月癸未齊無知弒其君諸兒無知公孫也不書氏與翬州吁同例舉於此後皆稱氏從同同也期齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵于僖公衣服禮秩如適襄公絀之二人因之以作亂十二月齊侯田于貝丘反徒人費遇賊于門伏公而出鬬死于門中石之紛如死于階下遂入殺孟陽于牀曰非君也不類見公之足于戶下遂弒之而立無知齊襄之見弒以禍本言之則公孫無知之配嫡已積漸于僖公之時而襄公之惡積而不可掩如抗王伐衛殺魯桓公色荒禽荒䁥比小人以至禍發蕭牆身殱賊手考襄公即位以至于今春秋所書齊事無一非亡國戕身之媒所謂積不善之餘殃者也徒人費石之紛如死而不書逢君之惡比而不周胡氏所謂死不償責者也或曰州吁無知不氏亦無駭挾之比也九年春齊人殺無知初無知虐于雍廪春雍廪殺無知雍廪殺之而以討賊之辭稱人者弒君之賊人無貴賤皆得殺之所以尊君父廣忠孝而誅惡逆也公及齊大夫盟于蔇公穀並作暨沂州承縣也杜氏注蔇魯地琅邪繒縣有蔇亭今之大夫齊之太宰當是時齊無君蓋卿大夫總已以聽者也稱大夫以其任一國之事而表異之故不名也與文七年扈之盟趙盾書大夫同公欲納糾故及大夫盟以定其約當是時齊國無君而為之立嗣繼絶其德厚矣然忘不共戴天之怨而施德焉聖人明著之而繫以公伐齊納糾所謂不待貶絶而罪惡見矣夏公伐齊納糾齊小白入于齊左氏作納子糾今從公羊穀梁作納糾案正義云今定本乃有子字則知左氏古本亦作納糾矣春秋書鄭忽及突曹羈及赤并此書糾及齊小白皆所以别嫌疑明正否也小白與糾之正否程氏論之詳矣莊公忘齊之仇而納其公子又所奉者不正故特書納糾以罪之桓公當立而書入無王命也秋七月丁酉葬齊襄公無知已誅可以葬矣八月庚申及齊師戰于乾時我師敗績杜氏注乾時齊地時水在樂安界岐流旱則竭故曰乾時傳師及齊師戰于乾時我師敗績公喪戎路傳乘而歸秦子梁子以公旗辟於下道皆止春秋書及而沒公又不諱內敗蓋復讐而敗雖敗亦榮故不為內諱獨莊公非有復讐之心而納不正以取敗故諱公以貶之也九月齊人取子糾殺之鮑叔帥師來言曰子糾親也請君討之管召讐也請受而甘心焉乃殺子糾於生竇召忽死之管仲請囚鮑叔受之以歸言於公而以為相春秋於上書糾正小白子糾之分也今書子糾而書取書殺之罪齊人也糾者齊桓之天倫也以其不當爭而爭立則為罪以其骨肉之至親則不可殺為齊侯者當列其罪上告天子下告魯人且明示親親之義而全其生則恩義兩得矣夫殺兄弟當目君而罪齊人者廢立之際殺生子奪寄于當國大臣之手毫釐之差霄壤之繆今齊大夫始以糾為先君之子而盟欲立之謀不審于初已為罪矣及桓公得國又不體其君天倫之思從議親之辟以赦其罪而必殺之廢興生死輕率甚矣故加子於糾又書齊人書取書殺則舉國之君臣同責其忘恩失義之罪也夫天倫之重苟未至如管叔之得罪於宗廟先君與天下之民則必當以親而全其生此聖人以至公之心示後世斷國論之權衡異於私天下為已有欲絶亂本禍根而推刃先君之遺體者不可不深察也冬浚洙洙水在魯城北齊伐魯之道也魯雖殺子糾而猶有畏齊之心故浚而深之以備齊師之至春秋書此以見其不能明政刑結人心使大國畏之而重勞民力務以深險自守不知困民于無益古人徹彼桑土綢繆牖户之計不如是之陋也十年春王正月公敗齊師于長勺書敗某師而不書戰惡詐戰也用民力以戰爭古有司馬車戰之法定日刻期兩陳相向以決勝負雖敗而奔亦無多殺之禍若詐戰則出于不意或舉衆而覆之惟荒逺遷徙鳥舉者不可以常法制故春秋自荒逺之外凡中國以詐勝者皆書某敗某師譏其待中國之人以荒逺而深惡其不仁也莊公政刑不修制軍無法齊師之來以詐而僥幸一勝此書公敗齊之㫖也或曰長勺魯地而齊師至此即所謂敵加于已不得已而應者矣何以責魯乎胡氏曰文告不修疆場無備德已衰矣況兵刃相接又以詐取勝乎故書魯為主以責之已亂寡怨之方也二月公侵宋莊公以僥幸得志于齊遂舉無名之師以掠宋境此所以召郎之師也胡氏曰凡師聲罪致討曰伐潛師掠境曰侵三月宋人遷宿穀梁傳遷亡辭也其不地宿不復見也杜氏注遷而取其地故異于邢遷難襄陵許氏曰遷之使未失其國家以往其義猶有所則是王澤之未竭也至僖文以後則有滅國無遷國矣夏六月齊師宋師次于郎公敗宋師于乘丘乘丘魯地今興仁府乘氏縣敗傳齊師宋師次于郎公子偃曰宋師不整可敗也宋齊必還自雩門竊出蒙臯比而先犯之公從之大敗宋師于乘丘齊師乃還便臨江劉氏曰二國揚兵駐師而不名所伐欲窺利乘快攻取之意魯又不能推忠信奉文告以止齊宋之師而出竒計詐謀以覆滅其軍次者不以義勝者不以道交譏之也秋九月荆敗蔡師于莘以蔡侯獻舞歸荆楚之故號也周成王初封熊繹于丹陽今江陵之枝江縣也自荆子熊通侵伐漢東諸侯其國始大僭號稱王今其子熊資始敗蔡浸猾夏矣弗傳蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯賓息侯怒使謂楚文王曰伐我吾求救于蔡而伐之楚子從之遂敗蔡以獻舞歸不稱人及師荒逺之也臨江劉氏論之詳矣書以歸而名獻舞責其不死于位生降荒遠也諸侯不生名名之則位已絶矣於此見王政不行荒逺慿陵中國楚自此得志中夏者二百餘年而周之子孫日以陵夷皆其有以自取之也冬十月齊師滅談談子奔莒談國在今濟南府歷城縣談傳齊侯之出也過談談不禮焉及其入也諸侯皆賀又不至冬齊師滅談滅者夷其社稷覆宗絶祀也談子爵而不名以其雖失國而恥反面事讐猶有興復之望也不書出國已滅無所出也齊桓方有志尊王室為政於天下非特不能興滅繼絶而以私憾覆滅小國其罪大矣薛氏曰五霸桓公為盛威陵諸侯以圖霸功首滅天子之建侯以肆威耳儒者之不道也宜哉十有一年春王正月夏五月戊寅公敗宋師于鄑鄑魯地敗傳宋為乘丘之役故侵我公禦之宋師未陳而薄之諸鄑宋師再至再敗兵禍旋及其君魯雖再勝其國亦困於兵矣秋宋大水此外災也蓋隂盛陽微之徴外災不書此特書者宋來告魯弔之也傳公使弔之曰天作淫兩害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱此見怨不廢禮與諸侯往弔主人罪已之辭蓋古意之猶存而未泯者也雖然文豈足以應天哉閔公不能踐敬之一言而以靳宋萬自禍乃董氏所謂出災害以譴告之而不知變者春秋之存災異可不察哉冬王姬歸于齊傳齊侯來逆共姬此所謂齊侯之夫人三王姬者也魯主仇讐之昏可以辭于王而不辭然仇已易世異于元年之新冇大故所以雖齊侯之來逆而不復書止書王姬之歸以譏之也王女下嫁曽無以異於諸侯之女適人者蓋車服不繫其夫雖以示恩愛之隆而隂陽之位夫婦之道乃三綱之所繫不可不早正故因其始嫁而一之於諸侯女歸之辭焉若曰往之女家必敬必戒是有常禮不可紊也此可以觀抑揚而得乎義理之中者矣十有二年春王三月紀叔姬歸于酅叔姬伯姬之娣隱七年歸于紀者紀侯大去其國之後死于他國叔姬還魯至是乃歸于酅蓋伯姬既死叔姬實攝內事而能不以國之存亡二其事君子之心不以身之榮悴變其奉宗廟之志故必歸于酅以終其身易曰眇能視利幽人之貞於叔姬見之矣鵲巢之德不過如此春秋可不録其本末以示婦道之正乎夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧捷公羊作接士萬南宫長萬多力之乘丘之役公以金僕姑射萬公右歂孫生搏之歸散舍諸宫中數月而後歸之宋人請之反為大夫與閔公博婦人在側萬曰甚矣魯侯之淑且美也天下諸侯宜為君者獨魯侯爾閔公矜此婦人顧曰此虜也爾虜焉故魯侯之美惡乎至萬怒摶閔公絶其脰仇牧間君弒趨而至遇諸門手劍叱之萬臂摋仇牧碎其首齒著乎門闔已而遇大宰督于東宫之西又殺之春秋取仇牧遇弒父與君之賊而能不畏强禦死于其難故書及以壯之華督以弒君名列于亂臣賊子身為元惡死不償責固不得而書也冬十月宋萬出奔陳宋萬弒君而立子游羣公子奔蕭公子御說奔亳南宫牛猛獲帥師圍亳冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立桓公猛獲奔衛南宫萬奔陳宋人請猛獲于衛衛人歸之亦請南宫萬于陳以賂皆醢之今不曰宋人殺萬而書宋萬出奔陳者歸惡于陳也天下之惡當奉天討容受其奔罪已大矣受賂而後歸之所謂肆人欲而滅天理與所謂殺其人汙其宫而瀦焉之意何其異哉此所以當服黨惡之罪也十有三年春齊侯宋人陳人蔡人邾人㑹于北杏齊侯穀梁作齊人北杏齊地合傳㑹于北杏以平宋亂未今案四國稱人蓋齊桓欲諸侯行霸事恐諸侯之諭故未欲煩其君而使其臣來㑹告以平宋亂舉霸者之事也晉悼公合諸侯于邢丘以令朝聘之數而使諸侯之大夫聽命故自鄭伯之外齊宋衛邾皆稱人殆公之故事與自東遷以來王政不行下逮隱桓之世亂賊得志强暴肆行天下之心思周道之不可復見而願得賢伯之興以息亂賊制强暴蓋已久矣桓公入國今已四年因宋有弒君之亂首惡方誅嗣君新立合諸侯以定宋亂而陳蔡邾並來受命亦可見天下歸之幾如水之就下矣然威公苟能於宋萬初弒君之時舉兵討之而定其亂則不勞告諭而天下自翕然宗之亦不待今日而齊矣經書宋萬出奔陳而繼之以此又因見桓公自失幾㑹于始也夏六月齊人滅遂遂杜氏注在濟北蛇丘縣見傳齊人滅遂而戍之滅國之說胡氏論之詳矣於此其已亡惻隱之心故凡其合于仁者孟子皆以為假也秋七月冬公㑹齊侯盟于柯柯今東平府東阿縣莊公自齊桓入國屢與之戰雖一再勝而齊方修軍政以圖霸魯冇見伐之虞至此始及齊平齊桓亦知魯未可取故不復以用於談遂者待魯公穀載曹子之事蓋魯人知桓公之圖霸因盟以求地齊亦有求諸侯之心捐小利以收魯容或有之但公羊氏言之已過其實而戰國之士又從而增益之耳此亦足以見桓公之屈意以和魯皆霸術也十有四年春齊人陳人曹人伐宋將卑師少曰人故宋人背北杏之㑹齊帥近宋二國以伐之也程子曰齊自管仲為政莊十一年而後未嘗興大衆其賦于諸侯亦寡矣終管仲之身息飬天下厚矣至于秦晉使之不競而已不强致也是以其功卑而易成愚案伐宋而同陳曹皆宋之鄰不動逺國亦簡便之規模也夏單伯㑹伐宋單伯見元年逆王姬注魯大夫之貴者魯自盟柯已平于齊而未從其役故因齊之討宋命上卿率師往㑹以示從霸之意齊桓方興理勢當從固異於翬之㑹宋殤黨亂賊以伐無罪矣是以書㑹伐而不再叙諸國人也秋七月荆入蔡案傳蔡哀侯為莘故譽息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡而入之觀此則息之亡蔡之入皆哀侯致之惟干戈省厥躬亦足見蔡自㑹鄧懼楚之後非但不為徹桑土繆牖户之謀而以婦人之故再召楚師始則身虜繼以國破楚熊資興兵以悅婦人當是時齊桓之業未成遂致其橫行淮漢浸及中國故特書蔡之見入楚之猾夏兩著其罪也冬單伯㑹齊侯宋公衛侯鄭伯于鄄鄄衛地今之濮州鄄城縣衣傳宋服故也宋公親㑹魯卿始與為裳之㑹而齊霸略定矣十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄傳以為齊始霸蓋指諸侯始定而言然魯未信服而自是之後宋人猶或主兵衛鄭未免復叛蓋齊之霸業駸駸向定而諸侯之心猶未一也夏夫人姜氏如齊文姜不如齊八年矣至是復如齊者蓋鄄之㑹魯莊不與此行殆出于文姜之意齊侯欲求魯好以定霸業而不之拒也文姜播惡於齊襄之時桓公欲圖霸業則絶之於齊義也以欲求魯之故而不監覆車之轍豈非未聞行一不義雖得天下不為之法乎此孔門所以不道霸者而春秋特書以纍齊桓也秋宋人齊人邾人伐郳郳公羊作兒宋案傳諸侯為伐郳蓋小邾宋之附庸而不服宋故桓公為宋伐之宋序齊上蓋是時伯體未全正此役為宋而興亦猶伐宋之師邾人為道而序於鄭之先也鄭人侵宋間諸侯伐郳而侵宋不誠於服齊而背二鄄之㑹鄭之反覆於齊楚之間蓋始于此冬十月十有六年春王正月夏宋人齊人衛人伐鄭宋序齊上與伐郳同伐鄭不正為宋而已蓋鄭不服則諸侯之心未一也秋荆伐鄭案傳鄭伯自櫟入緩告于楚以此受伐蓋齊霸未定楚之威浸及於中國自桓二年鄭已懼楚而㑹鄧至此三十餘年而後受兵楚之威不輕用蓋如此至是始為中國患矣冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男曹伯滑伯滕子同盟于幽公羊㑹上有公字左氏無曹伯今從公羊穀梁秋幽宋地滑國河南緱氏縣或曰今滑州也陳自入春以來常列衛下今在上者杜氏曰齊桓始霸楚亦始强陳介于二國之間而為三恪之客故齊桓因而進之遂班衛上臨江劉氏曰同盟者何殷同之盟也古者諸侯之於天子春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同同盟之禮見於覲禮為壇祀方明方伯臨之古者六歲而㑹十二歲而盟桓非受命之霸也假同盟之禮率諸侯以尊天子蓋自是始霸也盟愚案齊桓欲霸諸侯至是威行信立而諸侯宗之為主不待天子之命而中國之不至者寡矣古者方嶽有同盟以示其考禮修德以尊天子之意桓公至此以諸侯既授以事而霸業定因舉是禮約束諸侯尊周以掩其無王命之事與伐楚而舉召康公之命相似自此欲制諸侯而脅從之者皆稱同盟其無王命假古誼以制與國一也而善惡則各繫於其事焉穀梁稱桓公未嘗有歃血之盟而孟子於葵丘之㑹亦曰諸侯束牲載書而不歃血夫子所謂桓公九合諸侯不以兵車此蓋其衣裳大㑹之始也魯莊與盟已而背之諱不書公者蓋上無天子下無方伯非桓公出而尊周攘楚則中國之民必不免於被髮左祍之禍此同盟于幽之書所以罪魯而與齊也揚雄以習亂為春秋不得已而與齊晉蓋得春秋之㫖矣邾子克卒克儀父名稱子者蓋齊桓請王命以為諸侯故曰子於是始列於諸侯也臨江劉氏曰未成國曰邾儀父既成國曰邾子克成國而後書其卒記其葬未成則否十有七年春齊人執鄭詹詹公羊作瞻下同柔詹鄭大夫叔詹也不氏與溺同執鄭詹討鄭伯不朝齊之罪當書齊侯而稱人以非伯討貶也諸侯不服不能修德以來之而執其大夫則小國之從齊皆出于力不贍而非有心悅誠服之意為可見矣夏齊人殱于遂殱公羊作瀐傳遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉今案十三年滅遂置戍今乃見殱於亡國之遺民蓋絶滅社稷以及其君慮其民之思舊主而以兵力强制之不知彼心不服吾力稍怠必有出於意料之外者蓋王者之道責于興滅繼絶而齊之滅遂不止于殺一不辜而已故聖人于此不言遂人殱齊戊而特書其自殱所以仲遂人以死復讎之志而著桓公之不仁以至於自殱其衆也秋鄭詹自齊逃來執列國大夫踰歷三時不令其服罪而去致防閉弛慢國囚亡逸齊之罪也奉命以使霸國有罪不能即刑竊身逃竄同于苟免之匹夫無大夫之行失節辱國詹之罪也同幽之盟守信不篤為逋逃主以取伐於霸主魯之罪也片言而三罪著春秋簡嚴于此可見冬多麋麋鹿之大者魯所有也多則為異先儒皆以害稼而記災當從山隂陸氏之說以為隂盛所感惡氣之應蓋記異也十有八年春王三月日有食之不書日朔俱失之也夏公追戎于濟西泰山孫氏曰不言侵伐止言追者明不覺其來已去而追之也書者譏內無備也胡氏傳為國無武備啓戎心而不知警危道也春秋之意其必未雨而徹桑土閒暇而明政刑秋有􅈮􅈮名短狐含沙以射水中人影中之輒病或至于死江淮以南水濱有之魯所無也山隂陸氏曰􅈮隂物也麋亦隂物也是時莊公上不能防間其母下不能正其身陽淑消而陰慝長矣此惡氣之應也今案漢書五行志劉向董仲舒己有是說蓋麋者迷也􅈮者惑也是時文姜為亂于閨門之內其遺毒餘患至于哀姜卒再成篡弒之禍物類之感天之示人顯矣冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟程子曰鄄之巨室嫁女子陳人結以其庶女媵之因與齊宋盟挈之以往結好大國所以安國息民以私事之小取怒大國故深罪之書其為媵而往盟為遂事愚案是時莊公昏懦文姜制國政事不修君命不重故結無復君言不宿于家之禮而以私家之鄙事參㑹霸之大命先私後公而無所畏興戎致討而莊公不誅國之無政莫大于此書公子結媵陳人之婦于鄄如臧孫辰告糴于齊以為臧孫之私行也諸家之說獨程子為得之夫人姜氏如莒為國君之母非父母之國而出入縱恣此行比於詩之所刺謂魯道有蕩齊子豈弟者抑又甚矣莊公既無復防間之意而執國政者無人抑又可知安得不成淫風而致篡弒之禍以至其國幾為齊之所取與冬齊人宋人陳人伐我西鄙三國書人將卑師少也鄙邊邑也擁衆於邊鄙問公子結輕君命不恭霸主之罪也惟干戈省厥躬魯蓋無辭於討矣二十年春王二月夫人姜氏如莒文姜比年如莒春秋詳書蓋與詩之變風相應當是之時一反關雎麟趾之化而中國之俗於是大亂夫一國之事繫一人之本此春秋所以詳書文姜之行與夏齊大災天火曰災書大志其甚也齊人來告魯往弔之故書臨江劉氏曰凡弔人者哀其禍而救其乏秋七月冬齊人伐戎戎榖梁作我狄齊桓於是舉攘戎之兵戎在徐州之域最近齊魯故先治之也二十有一年春王正月夏五月辛酉鄭伯突卒突鄭莊公之孽子莊公既卒即奪忽之位而篡之中間雖為祭仲所逐旋入于櫟卒取鄭國春秋不復著忽亹儀之在位所以著其不能君也故論者以為突始終能君夫篡弒竊國之人而春秋終始若之且復記其卒于位豈真與之哉所以著小人肆志亂臣賊子得以終於其位王法不行而世之所由亂也秋七月戊戌夫人姜氏薨文姜之行惡矣而卒以國君之母寵榮終身一用小君之禮此魯之禍所以未艾必至於莊公之終兩君弒哀姜慶父誅而後魯亂始息也冬十有二月葬鄭厲公二十有二年春王正月肆大眚眚公羊作省怙謹案書曰眚災肆赦終賊刑孔氏曰眚過也肆緩也原其意蓋謂過而入于刑者緩之又赦之此宥過無大之意也怙終不悛賊殺刑戮之所加刑故無小之意也周官于三刺之後乃分眚災之日有所謂不識過失遺忘幼弱老耄憃愚可謂詳矣然後可以求民情斷民中此堯舜三代之法不可偏廢者後世兩失之偏慘刻者不復察其情舉過失而盡刑誅之及姑息之過如莊公者反取大罪極惡而例之於眚災以從肆赦之例怙終得志良善瘖啞此用舜典眚災肆赦之名而不察其實春秋謂之肆大眚以譏其務小惠而失大德也癸丑葬我小君文姜陳人殺其公子禦冦公子蓋世子也不稱世子未誓于天子也未誓則稱公子重王命也殺世子母弟稱君今反稱陳人故胡氏曰陳亂無政衆人擅殺之也衆人擅殺固不得為無罪然禦冦乃君之嗣適為一國之儲二而衆人得以殺之則其所自處必有失其道者矣故臨江劉氏譏禦冦之為人子足以殺其身而春秋略殺者之罪也夏五月下脫文也秋七月丙申及齊高傒盟于防公羊傳高傒者貴大夫也曷為就吾微者盟公也公則曷為不言公諱與大夫盟也此與及向戍盟于劉其敵大夫以自卑輕君體以自弱去國都而汲汲于小信一也而此復以婚姻而結盟不顧禰廟不共戴天之仇而與齊為昏又當比事以觀而知此為惡之大者也冬公如齊納幣案婚禮有六曰納采問名納吉納徴請期親迎春秋書納幣即納徴逆女即親迎蓋納幣乃事之成而親迎事之終故也莊公生至是三十五年矣制于文姜過期而不娶今喪未畢而納幣圖婚又忘父仇禮不當親行而躬致其禮其為不孝之罪不待貶絶而具見矣二十有三年春公至自齊告于廟也春秋書至蓋原於書巡狩而歸格于藝祖用特之意聖人以舉動之公往返之節質之幽明而無愧也今莊公忘父讐而娶其女冒母喪而往納幣以此告廟以為有人心者宜于此焉變矣此與他日書至不可同日語也比事屬詞示人之意顯矣祭叔來聘祭叔祭公之臣為祭公而聘魯不言使穀梁氏曰不正其外交故不與使也胡氏傳祭伯來朝而不言朝祭叔來聘而不言使尹氏王子虎劉卷來訃而不書其爵秩皆所以正人臣之義也人君而明此不容下比之臣人臣而明此不為交私之計黨錮之禍息矣夏公如齊觀社社者古人祀地之名古制惟為社事單出里惟為社田國人畢作東遷而後王制漸變祀事不存古意浸為美觀襄公二十四年齊社搜軍實使客觀之其廢祀典而夸愚俗兆于今矣故左氏外傳載曹劌之言曰齊棄太公之法觀民于社君為是舉而往觀之非故業也天子祀上帝諸侯㑹之受命焉諸侯祀先公卿大夫佐之受事焉不聞諸侯之相㑹祀也君舉必書書而不法後嗣何觀程子曰昏議尚疑故以觀社再往請議後一年方逆蓋齊難之觀此亦足以見齊桓欲親魯以圖霸而親之不以其道也公至自齊荆人來聘楚自四五年來先加兵于蔡鄭而以聘使至魯已用逺交近攻之術聖人於此書其來聘而不書使必其禮有未備者中庸曰送往迎來嘉善而矜不能此三代柔逺人之道也至于此時以魯而受楚之聘非有德以懷來之彼之以禮幣至亦當審所以待之之術如班彪述漢宣戒邊吏之言以為丐奴大國多變詐待遇得其情則却敵折衝應對入其數則反為輕欺觀春秋止書荆人來聘亦可見所以待遇之品節矣公及齊侯遇于穀為昏姻而齊難之也不可與為婚姻則當絶之而數與之約然後與之書此所以著莊公之不子而齊桓待人之不以義也蕭叔朝公蕭今徐州蕭縣諸侯相見曰朝書朝公以見非其地蕭之來魯之受皆非禮也秋丹桓宫楹穀梁傳禮天子諸侯黝堊大夫蒼士黈丹楹非禮也冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈扈鄭地至此又盟以結其信而後許之也二十有四年春王三月刻桓宫桷桷椽也穀梁傳天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也刻鏤也於礱斫之外又加刻鏤之工也又曰夫人所以崇宗廟也取非禮與非正而加之宗廟以飾夫人非正也刻桓宫桷丹桓宫楹斥言桓宫以惡莊也葬曹莊公夏公如齊逆女諸侯無越竟逆女之禮於紀履緰逆女之書辨之詳矣然則莊公無父之仇猶不可以親至齊廷也況躬君弒于齊而舍宗廟之守往受其女於廟乎昔晉王裒讀蓼莪之詩而哀痛終其身莊公思妃偶之合兩年之間三至齊廷而念不及於其父春秋所以詳書而誅其心也與秋公至自齊公羊榖梁與孫氏言之詳矣杜預究公羊之指歸以為為孟任故足以見莊公不夫哀姜妒忌之情矣經以傳為案此類是也八月丁丑夫人姜氏入謹詳此書夫人之至特異於桓公及文公以後夫人至之例而以入書之其穀梁氏曰入者內弗受也娶仇人子女以薦舍於前義不可受也入愚案妻者齊也一與之齊終身不改故書夫人姜氏而莊公無人子之心於奉祀祭享之際終其身為可見矣始之不正終必致亂故夫人不終嗣子不立魯國幾亡皆哀姜入之所致書八月丁丑見後公而至之日多也在易歸妹征凶無攸利莊公之娶哀姜當之矣戊寅大夫宗婦覿用幣夫人至大夫見于宗廟婦見于內禮也男贄大者玉帛小者禽鳥女贄不過榛栗棗修今大夫宗婦並覿同贄特書以譏其失男女之别以胡氏曰公曰見私曰覿夫人不可見乎宗廟則不可臨諸臣故以私言之也大水夫人姜氏入而大水應之天人感應之速如此春秋所以書也冬戎侵曹將以納赤也曹文之昭也戌挾不正以納之齊桓不能治所以纍齊也曹羈出奔陳赤歸于曹羈繫於曹與齊小白鄭忽同明其正也杜氏陸氏以羈為曹之世子即位踰年而不稱爵不能君也赤不繫國不書公子蓋庶孽也書歸言易戎力足以主之國人聽命是以不難也赤以庶逐嫡戎以外間內而天子方伯不能正又著羈之不能自立乎其位比事屬辭簡明之㫖可以觀矣郭公蓋經闕誤也劉氏傳或曰是郭亡也齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至于亡父老曰郭君善善不能用惡惡不能去所以亡也考其時與事理或然也二十有五年春陳侯使女叔來聘女氏叔字不名天子之命大夫也陳始來結好夏五月癸丑衛侯朔卒惠公也在位三十一年魯不㑹故不書葬六月辛未朔日有食之鼓用牲于社日食隂盛陽微之徴事關天下固不止為一魯而諸侯亦有臣民則因天變以自省如洪範五事敬謹於視聽言動思之間一失其正則咎必應之古人應天以實而不以文故高宗肜日洪範之言乃古人之所先務至如𦙍征與周禮鼓人大僕所載乃禮文之末耳一時遭變禮文固不可廢然正其本而後末可理也今莊公於充陽之本蓋藐然矣鼓何益乎又用牲而欲以物求免書此以見其本末之皆失也伯姬歸于杞伯姬莊公女不書逆不使卿志失禮也秋大水鼓用牲于社于門傳曰非常也凡天災有幣無牲非日月之眚不鼓愚案比年大水隂盛陽微之變極矣莊公若思先王正厥事之意謹內外之防嚴夫婦之别使陰沴無寖長之漸則後日之禍猶可及止也鼓以充陽之事與後世減膳避寢之禮皆既具文而未必有正厥事之誠意實政也既文而無實尚非修德應天之道況徒以牲牷飲食求免乎書日食大水用牲等事以見莊公非惟不恐懼修省以正其本而禮文之末亦錯矣此魯之所以亂也冬公子友如陳友莊公之母弟報女叔之聘也二十有六年春公伐戎公羊無春字報今年伐戎為追于濟西之恥怨也以莊公治家與國之多缺而勞師于戎雖能復怨何益于魯之內治乎書此以見忽蕭牆而修怨為不知務也夏公至自伐戎勞師事外踰時而反危之也曹殺其大夫曹伯赤殺之也稱大夫則不失其官豈於羈赤出入之際或不附戎而殺之若鄭厲之殺原繁傳瑕與君之卿佐是謂股肱加之鈇鉞是自虧其股肱也四凶之罪大矣而舜所殛死惟鯀而已其三人者曰竄流放尚從末減也諸侯雖得専一國之權而卿大夫非大罪極惡不得擅加以刀鋸必以聞于天子此王制之所甚謹雖霸者之申禁猶不敢廢蓋視為一體則恩意之篤自足以感其忠敬之心於無窮而視猶土芥無罪而殺之則冦讎之視有所必至此春秋於殺大夫所以詳書以謹之而上下相殺之變至于定哀而極也胡氏曰稱國以殺者君與大臣擅殺之也義繫於殺則止書其官義繫於人則書其名氏也秋㑹宋人齊人伐徐公穀作公㑹左氏古本無公字陸氏纂例同案宋齊皆卑者則內亦當然左氏為正徐嬴姓國近齊魯今泗州臨淮縣是也徐蓋是時已服楚故齊率諸侯伐之宋序齊上蓋齊桓使之主兵然失霸體矣故劉氏非之冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮薛氏曰洮溝在濟州今濟南府是也傳曰非事也諸侯非民事不舉㑹伯姬非禮也陸氏曰參譏之公及杞侯伯姬皆失正也夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽再舉同盟之禮以申霸令而一諸侯之心也魯宋陳鄭偕至而衛獨不來故明年伐衛秋公子友如陳葬原仲原仲陳大夫原氏仲字也禮臣既沒不名故稱字公子友如陳葬原仲無以異於葬諸侯之使則友之行莊公使之非私行也故劉氏曰何以書譏何譏爾君不行使乎大夫君行使乎大夫內失正也大夫不交諸侯大夫而交乎諸侯原氏失正也內失正原氏失正季子可以已矣則是從命也參譏之冬杞伯姬來歸寧也春㑹于洮今又歸寧志其來往之數非歲一歸寧之義所以厚男女之别也莒慶來逆叔姬慶莒大夫也叔姬莊公女卿自為逆則稱字嫁女於大夫不當書特書莒慶之逆者諸侯嫁女于大夫尊卑不敵當使大夫主以與之今公自主之非禮而任情春秋之所謹故特書以譏之杞伯來朝杞為三恪桓公之篇以侯書今稱伯者國小力微故降爵以自儕于小國杞之自侯而伯自伯而子蓋浸以微弱也公㑹齊侯于城濮城濮衛地齊欲討衛而㑹魯于此定其交而後加兵於人所以見其謀之審也二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績前年同盟衛人不至衛為與國又嘗受盟于幽伐而不服罪乃以齊來伐之日即因其至而急擊之然終不能敵齊人節制之師而敗春秋著衛之不服罪以取敗故舉戰之日加于伐之上公羊所謂至之日是也以衛為主深罪之也齊稱人將卑師少也不地於衛之都也夏四月丁未邾子瑣卒秋荆伐鄭公㑹齊人宋人救鄭公羊宋人下有邾人傳楚令尹子元以車六百乘伐鄭入于桔柣之門衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭愚案是時楚文王卒成王幼子元因夫人之言而伐師出無名故鄭人示以閒暇而不敢入閒諸侯之救而遂遁時桓公攘楚之訃未定楚政雖亂然自若敖蚡冒至于武文兵制尚在是後二年之間楚殺子元授政於令尹子文復修國政故召陵之師雖舉而楚之君臣亦非比時之比所以僅能使之受盟而已終不足以大服之也冬築郿郿公羊穀梁作微雖郿魯下邑築者創始造邑也冬用民力之時而下書大無麥禾則築郿之不時可知矣大無麥禾臧孫辰告糴于齊辰穀梁作臣也不言水旱而言大無麥禾者天時人事至此兩不足洪範曰五者來備各以其序庶草繁廡則大無麥禾己見德之不修而不能召和矣然古人初不敢必於天恐其或爽所應每預為儲蓄以待之故常以三十年之通制國用節以制度使有九年之蓄恃吾之有政而不恃天也今一年不熟而上下相顧無以粒民重臣至自請往告糴于鄰國若不遇齊桓則魯之民必至坐視轉死於溝壑矣故不言如齊告糴甚急不可緩之辭譏君臣政事不修遇變苟且非所以為國也二十有九年春新延廏延廏馬間也言新有故而修之也穀梁傳有故則何為書也古之君人者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣冬築微春新延廏以其用民力為巳悉矣千愚案孔子以敬事而信節用而愛人使民以時為道乘之國之法春秋比事而書足以見莊公無君國子民之心於斯三者皆失之矣夏鄭人侵許許與鄭世讐也然自盟幽之後不與於齊桓之㑹鄭人侵之或齊之命與自後許始從中國秋有蜚公羊傳記異也何氏云惡臭之蟲南粵所生非中國所有書有言本無也冬十有二月紀叔姬卒十二年歸于酅至此乃卒杜氏注紀國雖滅叔姬執節守義故繫之紀賢而録之城諸及防諸防皆魯邑諸今密州諸城縣縣又有故防城言及者别二邑也三十年春王正月夏師次于成左氏無師字任公輔曰人微師少不見於經知當從公榖書御成魯地地譜今泰山巨平縣東南案趙氏曰魯蓋欲㑹齊圍鄣至成待命聞鄣已降不復行耳以前㑹城濮明年來獻捷考之理必然也秋七月齊人降鄣公羊曰鄣紀之遺邑也杜氏注東平無鹽縣東北有鄣城即今東平府須城縣趙氏曰降服而為附庸也常山劉氏曰齊肆其强力脅而服之也不書鄣降而曰齊人降鄣以齊之强故罪之深以鄣之弱故責之薄也八月癸亥葬紀叔姬紀叔姬從一而終不以存亡二其心故詳録其生死又紀魯之往葬皆以正夫人之理書之所以明婦行以示後世之法也九月庚午朔日有食之鼓用牲于社鼓禮也用牲非禮也冬公及齊侯遇于魯濟杜氏注濟水歷齊魯界在齊為齊濟在魯為魯濟蓋魯地事謀伐山戎以其病燕故簡禮以議軍旅之所謂定其交而後求者與齊人伐山戎公羊傳齊人伐山戎此齊侯也其稱人何貶曷為貶子司馬子曰蓋以操之為已蹙矣孔子曰逺人不服則修文德以來之今中國之聲教未洽近有荆楚為中國患尚未正罪而勤兵于逺為燕闢地其治之先後兵之次第皆失之矣故人齊侯以為舍近事逺勞中國以事逺略之戒示强本治內柔服逺人之道也三十有一年春築臺于郎何氏注禮天子有靈臺以候天地諸侯有時臺以候四時登高逺望人情所樂動而無益于民者雖樂不為也四方而高曰臺劉氏傳何以書譏何譏爾譏厲民也去國而築臺是樂而已矣夏四月薛伯卒薛始稱伯蓋降班而告終也築臺于薛杜氏注薛魯地六月齊侯來獻戎捷傳非禮也凡諸侯有敵愾之功則獻於王王以警于逺中國則否諸侯不相遺俘我常山劉氏曰齊伐山戎得其捷齊侯躬來夸示以威而聖人書曰來獻者抑之也而愚案獻者下奉上之辭觀筆削之㫖則齊桓之恃功不知禮魯不當納而輕受之其罪皆可見矣秋築臺于秦杜氏注東平范縣西北有秦亭案寰宇記范縣今屬濮州亭尚存穀梁氏曰不正罷民三時虞山林藪澤之利且財盡則怨力盡則懟君子危之故謹而志之也愚案莊公一歲築三臺政所謂及是時般樂怠敖者則治國治家之當務荒廢多矣此所以踰年身死而蕭牆之禍至奕世而不能定也可不鑒哉冬不雨一歲三築臺明年春城小穀故冬書不雨則莊公無閔雨之志可知然獨酉戌亥之月不雨故不得歷時而言也三十有二年春城小穀小穀魯地泰山孫氏曰曲阜西北有小榖城胡氏曰孫魯人也而終身學春秋其考此事詳矣麋永嘉薛氏曰莊公自六年之後大無麥禾無麥苗螟􅈮蜚相繼而有大水者三中君之性尚當少警而公之侈心日起因娶而觀社丹楹刻桷告糴之後有築郿之役次年新廏城諸防去年三築臺而不雨今春又城小榖平歲猶曰不可況薦饑而輕用民力乎夏宋公齊侯遇于梁丘梁丘在濟州昌邑縣見齊侯為楚伐鄭之故請㑹于諸侯宋公請先于齊侯故遇于梁丘書先宋公齊不以霸主自居以梁丘近宋而先之也秋七月癸巳公子牙卒杜氏注牙慶父同母弟諡僖叔之傳初公築臺臨黨氏見孟任從之閟而以夫人言許割臂盟公生子般焉公疾問後于叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏使針季鴆之曰飲此則有後于魯國飲之歸及逵泉而卒立叔孫氏公羊傳曷為不言刺之為季子諱殺也季子之遏惡也不以為國獄緣季子之心而為之諱也季子之遏惡奈何莊公病召季子曰牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎夫何敢俄而牙弒械成季子和藥而飲之公子牙今將爾辭曷為與親弒者同君親無將將而誅焉然則善之與曰然何善爾誅不得辟兄君臣之義也然則曷為不直誅而鴆之行誅乎兄隱而逃之使託若以疾死然親親之道也愚案古者公族有死罪則磬于甸師氏刑于隱者不與國人慮兄弟也叔牙黨慶父而萌篡弒之心故季子正其罪以君命討而誅之又以親親之義不彰其惡唐陸氏所謂恩義俱立權而得中也或謂季友雖殺叔牙而無補于後日子般閔公之禍是蓋不然自文姜以來胎養亂本至此已成若于此時不誅叔牙則莊公之薨濟以叔牙雖有季子之忠秉禮之俗亦無所措其手矣故叔牙之誅乃魯國存亡之幾慶父成敗之決春秋取其遏惡救亂能先事而誅之所以原其心而為之諱也八月癸亥公薨于路寢書月書日謹之又書其所詳凶變且以别正不正也路寢正寢也於榖梁氏曰寢疾居正寢正也男子不絶婦人之手以齊終也冬十月己未子般卒己未公羊穀梁作乙未卒子般莊公子見上注公羊氏曰子卒云子此其稱子般卒何君存稱世子君薨稱子某既葬稱子踰年稱公子般卒何以不書葬未踰年之君也有子則廟廟則書葬無子不廟不廟則不書葬戲傳初雩講于梁氏女公子觀之圉人犖自牆外與之子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門公薨子般即位次于黨氏十月己未共仲使圉人犖賊子般于黨氏成季奔陳立閔公稷愚案此子般見弒而書卒者諱之也莊公主魯之社而君道不立上不能正其母使出入淫縱配偶不早立是致冢嗣之位不足以自定內失間家之道而使圉人犖得以戲女公子觀其告子般之言非不知犖之可誅而又欲以誅殺之權委其子亦終於不能殺而貽身後之患易曰間有家悔亡傳曰欲治其國者先齊其家莊公反此使淫亂肆行雖其身免篡弒之禍而及其二子春秋自夫人孫齊以來三十年間備載莊公內治之失而終之以此所以罪其無風教之本而不免于首惡也公子慶父如齊慶父自莊公即位以來己專兵柄而莊公之昏庸耽樂不恤國事致慶父肆行姦宄隂為他日取國之計觀莊公疾時與叔牙問答之辭使非季子應時誅之則般不復得立矣今雖弒子般而尚未能取國非特季子之黨未順亦見魯俗秉禮人心未盡從也故因閔公之立告于霸主以為自託之計齊桓以方伯自任與魯為鄰且親豈不知慶父為弒君之賊容其來使使之復歸以遺魯國之後禍即此已見其無討賊之實意而有取魯之私心春秋書慶父如齊著莊公不君養成其惡使得以出入自如而齊侯失方伯連帥之職也狄伐邢杜氏注邢姬姓周公之𦙍國在廣平襄國縣今之邢州龍岡縣狄北狄前此雖未見於經然自伐邢而滅衛三年之間塗炭兩國首以伐書著其强也閔公名啓方莊公之子母叔姜史記云名開諡法在國遭難曰閔元年春王正月胡氏曰不書即位內無所承上不禀命也今案閔公以幼為慶父所立初不知子般不終之故此齊桓公之責也桓公若能請于天子誅哀姜慶父於此時而為之置君則父子君臣之倫定而大義明矣乃縱慶父歸其國以致閔公為篡弒者所立故不書即位亦所以纍齊桓也齊人救邢案傳管仲言于桓公以為戎狄不可縱諸夏不可弃燕安不可懷引詩云豈不懷歸畏此簡書請救邢以從之桓公于是興救邢之師故於此書齊人救邢以與之而論語以九合一匡之功歸于管仲蓋救諸夏畏簡書皆管仲發其端也夏六月辛酉葬我君莊公國亂子弒嗣君幼弱十一月乃葬所謂危不得葬也秋八月公及齊候盟于落姑落公穀作洛落姑齊地請復季友也是時閔公幼弱哀姜慶父為亂國人思得季子以靖難而大臣尚能奉閔公㑹霸主以請季子卒致季友之歸此秉禮舊俗未泯之驗也季子來歸邦之杌隉有親且賢孰不賴之季友遏惡於初萌子般之亂力不能討而遂去之非其罪也故魯人惡之齊侯從閔公之請使召諸陳季子始歸春秋從諸侯晜弟之例特字之而書來歸所以著季子足以為國之輕重而殺魯人喜其來歸之情也冬齊仲孫來傳言齊仲孫湫來省難實所謂覘國也仲孫齊智謀之士故歸告齊侯言不去慶父魯難未己公問魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不弃周禮未可動也君其務寧魯難而親之而臨江劉氏曰桓公不務修霸主之義討有罪扶微國更使智計之士窺覘虛實致慶父極惡魯君再弒此由桓公仲孫謀不臧之弊也故奪其君臣之常辭以見君使臣不以禮臣事君不以忠法之所禁也孔子沐浴而朝請討陳恆豈嘗告其君以齊人尚强待其自斃哉愚嘗論之仲孫之罪固如劉氏之言矣然其言魯秉周禮國有本而不可動則於此可以見周公之澤入人深而足以維持其國於政亂俗壞之日所謂秉者與民之秉彞秉文之德同著明于心而不可奪之謂也當是時周公之禮存於人心為亂者獨哀姜公子慶父數人耳而在朝之人有見於周公之典禮而不從弒父與君者尚多有之所以國再有難而誅慶父立僖公尚得以自存於極亂之時仲孫之智善於覘國而不能輔君速行方伯之義此春秋所以雖貶而尚不名以為猶有以異於傾險乘釁者之可誅也二年春王正月齊人遷陽陽國漢志東海郡陽都縣是啖助曰移其國于國中而為附庸蓋桓公之强力施於可取者如此非有興滅繼絶之誠心也夏五月乙酉吉禘于莊公禘為天子宗廟之大祭不王不禘諸侯不得用之魯有禘樂其非禮與雖先王所賜而止可用於周公之廟不可施於羣公趙氏程氏言之詳矣況喪禮二十五月而祥又兩月而禫然後以吉祭易喪祭今莊公之薨至此才二十二月喪未三年主未遷祔嗣君幼弱而以吉禮盛樂用於神主忘哀僭上反易人心何秉禮之有此蓋出于哀姜慶父樂哀謀篡而為之又非他日僭禮之所得比矣婉而成章尤當比事以考聖人誅絶之㫖也秋八月辛丑公薨傳公傅奪卜齮田公弗禁共仲使卜齮賊公于武闈成季以僖公適邾弒而書薨諱之也不地隱之不忍言也倒于羣公之書地者而此不書則隱諱變故之實亦可見矣他國之篡弒明書之可也凡人於其父祖之罪惡尚不忍肆言之聖人書父母國之惡豈可同於他國而不隱乎然諱國惡者臣子之禮也存事實者傳信之法也聖人之經兩存禮法以垂訓萬世故不徒隱諱而已而不書地以變於常又比事屬辭以見其實將使後人因例啓疑考究始末以知莊公不能正身齊家致後嗣再弒國幾滅亡雖欲諱之而其實終不可得而掩究觀書法則知左氏所謂微而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人孰能修之者蓋指此類而言之其說必有所傳而施于稱族舍族之傳則非也九月夫人姜氏孫于邾傳言哀姜欲立共仲而與聞閔公之弒經書其奔與文姜不同者文姜妻也哀姜母也妻義尤重故哀姜於喪歸貶姓而已公子慶父出奔莒傳成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之使公子魚請不許哭而往共仲曰奚斯之聲也乃縊慶父與哀姜謀弒閔公欲自立而不遂此魯國秉禮之驗也方季友適邾之時使魯國無人安能逐姜氏慶父哉季友既立僖則當正慶父之罪致辟於甸人以致兩弒其君之討乃以賂求于莒不許其入而已又立孟氏與叔牙同無復輕重之别豈非邦憲之失此所以不書國賊之討而閔不書葬與冬齊高子來盟公羊傳高子不名喜之也何喜爾正我也魯比三君死曠年無君桓公使高子將南陽之甲立僖公而城魯或曰自鹿門至爭門是也或曰自爭門至吏門是也魯人至今以為美談曰猶望高子也常山劉氏曰不稱使者齊侯使高子來視魯而未定盟高子至而後結盟也恤愚案此所謂寧魯難而親之者然春秋豫高子之能魯奉使而知權是以字之十有二月狄入衛衛之滅非特懿公好鶴而失人心蓋自惠公即位宣姜淫恣耽樂忘政習實為常公又重之亡形已具故狄人一至而渙然離散國隨以亡非齊桓公救而封之則康叔之後至此無噍類矣桓公迎其遺民立文公而為之建國家社稷此所以止書入也以衛為春秋初之大國方與齊侯胥命欲為方伯才四十年而淪于亡滅所以治國必先齊家而淫亂之禍不篡則滅可不戒哉鄭弃其師昔舜授禹之辭曰后非衆罔與守邦此古先聖人相傳之㫖也宗廟社稷主之于君守之以人君與一國之人蓋一體也今以欲逺所惡之人而舉一國之衆付之度外存亡死生舉不以關其心當時如楚如狄方有狡焉思啓封疆之心一旦乘罅搗虛則鄭必束手就亡矣春秋書法因物賦形或書人臣之奔或書師旅之潰此皆不以是書而蔽罪乃如此可以識輕重之權衡矣以此類推之後世謀國如舉一郡縣之民三軍之旅陷於重圍之中置而不救皆得罪于聖人者胡氏曰惡高克者文公而特書鄭者蓋國本顛危曽不扶持是大臣之失職也春秋集注卷三
