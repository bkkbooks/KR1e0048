body:
  text: 春秋集注卷五宋張洽撰文公名興僖公之子夫人聲姜所生諡法慈惠愛民曰文元年春王正月公即位二月癸亥日有食之公羊有朔字天王使叔服來㑹葬傳內史叔服也公羊傳㑹葬禮夏四月丁巳葬我君僖公五月而葬天王使毛伯來錫公命傳毛伯衛也受穀梁傳禮有命無來錫命錫命非正也即劉氏曰錫命者何命為諸侯也諸侯在喪稱子踰年位喪畢以士服見於王王乃於廟命之喪未畢而命之非禮也既畢喪而不受命於天子亦非禮也晉侯伐衛不朝霸主而伐同盟此其所以受兵也叔孫得臣如京師杜氏注得臣叔牙之孫傳拜錫命也高郵孫氏曰文公即位未嘗如周而天子使大夫來錫命公受命矣又不自朝而使得臣往其不臣可知矣衛人伐晉霸主聲罪致討不自反其不仁無禮之罪乃稱兵以伐之故書人罪孔逹也秋公孫敖㑹晉侯于戚晉侯伐衛圍戚取之秋晉侯疆戚田故公孫敖㑹之戚衛地在頓丘衛縣西冬十月丁未楚世子商臣弒其君頵公羊縠梁作髠其不言其父而言君者稱世子以見有父之親稱其君以見有君之尊而商臣於二者之義絶也推原其故由楚子頵在位四十六年更齊桓晉文之時僭王猾夏力爭諸侯齊桓既殁益肆慿陵詐行戰勝執宋戌齊毒被中國及城濮之敗聲勢消沮欲易世子謀及婦人自取篡弒蓋暴虐無道之極感應之理故至於此後世如胸奴頭曼魏拓跋圭唐安祿山史思明朱全忠本朝西夏曩霄皆以僭亂盜賊毒被天下中國不能制而受禍於其子積不善之餘殃千載一律故商臣之惡特書之使為君父者知謹履霜之戒以此坊人猶有在位日久驟欲廢立議論不決以啓庶人劭之禍如宋元嘉之主者公孫敖如齊始聘通嗣君也二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績彭衙秦地杜氏注馮翊郃陽縣西北有彭衙城今屬同州白水縣傳秦孟明帥師伐晉以報殽之役晉侯禦之及秦師戰秦師敗績晉人謂秦拜賜之師之程子曰越國襲人秦罪也忘親背惠晉惡也秦經人國以襲人雖憤無可為辭矣故來不稱伐晉不諭秦而與戰故書晉及憤以取敗故書敗績丁丑作僖公主公羊傳為僖公作主也主者曷用虞主用桑練主用栗用栗者藏主也作僖公主何以書譏不時也今案事亡如事存故作主以象神而祭之禮既葬作主於墓不終日而虞祭不忍一日忘親也僖公元年四月葬今乃作主慢而違禮甚矣三月乙巳及晉處父盟傳晉人以公不朝來討公如晉晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也胡氏曰不書公者抑大夫之伉正君臣之分也適晉不書反國不致為公諱恥存臣子之禮也愚案盟于晉之都而君不出恥甚矣故諱之夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴隴公羊榖梁作斂諸杜氏注滎陽縣東有隴城鄭地討傳公未至穆伯㑹侯及晉司空士縠盟于垂隴晉衛故也陳侯為衛請成於晉執孔達以說自十有二月不雨至于秋七月穀梁傳厯時而言不兩文不憂雨也不憂雨者無志乎民者也雨胡氏曰書不雨至於秋七月而不曰至于秋七月不者蓋後言不雨則是冀望欲雨之詞而非文公之意也夫書不雨至秋七月即八月嘗雨矣而不書八月雨見文公不以民事繫憂樂也其怠於政可知而魯衰自此始矣八月丁卯大事于大廟躋僖公大事者因嘗祭而祔僖公于廟大合自周公伯禽以來之主于大廟而祭之故曰大事穀梁所謂著祫嘗公羊所謂毁廟之主陳于大祖未毁廟之主皆升合食于大祖五年而再殷祭也躋升也僖公乃閔公之臣子宜祔于閔公之下今用宗人夏父弗忌非禮之言升僖公於閔公之上故三傳以為逆祀蓋昭穆祖禰至是逆亂故特書以譏之案此乃吉祭而不言者閔二年書已明此主為逆祀書也冬晉人宋人陳人鄭人代秦傳晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役伐程子曰秦以憤取敗晉可以已矣而役秦報復無已殘民結怨故貶稱人公子遂如齊納幣公羊傳納幣不書此何以書譏喪娶也娶在三年之外則何譏乎喪娶三年之內不圖婚三年之恩疾矣非虛加之也以人心為皆有之娶者大吉也非常吉也其為吉者主乎已以為有人心者則宜於此焉變矣二年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰沈姬姓國杜氏注汝南平輿縣北有沈亭今案漢志汝南治平輿故沈子國今屬蔡州傳莊叔㑹諸侯之師伐沈以其服於楚也沈潰凡民逃具上曰潰常山劉氏曰兵加而民漬君之不能可知矣夏五月王子虎卒傳翟泉之盟王人王子虎也王叔文公卒來赴弔如同盟胡氏曰王子虎不書爵譏之也天子內臣無外交以同盟而致恩禮是以私情害公義也秦人伐晉傳秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還今案秦穆公既歸自殽而作秦誓矣然彭衙及此役猶以報復為事豈非悔過之心不能勝其恥敗之心而至此乎秦伯書人罪之也秋楚人圍江江見僖公二年雨螽于宋記異冬公如晉十有二月己巳公及晉侯盟傳晉人懼其無禮於公也請改盟公如晉及晉侯盟不書地盟于晉都也晉陽處父帥師伐楚以救江公羊榖梁並無以字江公羊傳此伐楚也其言救何為諼也其為諼奈何伐楚為救江也楚胡氏曰以者不以者也救江善矣其書以何當是時有覆載不容之罪晉宜大合諸侯聲罪致討庶幾震恐而江圍可解矣計不出此乃獨遣一軍逺攻彊國豈能濟乎然則救江雖善而所以救之者非其道矣之今案楚商臣無父無君乃欲致患於江是禽獸逼人甚以中國諸侯為己任者豈得安居而以伐楚之任付之大夫而已乎晉襄不能率諸侯乘此時誅之此春秋特書以正其不能奉天討之罪也四年春公至自晉自是而後公至多書前乎此者逺不能詳故多略也夏逆婦姜于齊程氏曰納幣在喪中與喪昏同也稱婦姜已成婦不稱夫人不可為小君奉宗廟也不書逆者雖卿亦失其職矣以愚謂聖人嚴吉凶之辨蓋人之所以異於禽獸者正有父子之親而三年之喪哀戚之至也國君為風教之首而納幣於喪中此聖人所深痛故變逆女為逆婦姜不復成其夫人之禮以見人倫之本已大失矣何以正是國人而為後嗣之基乎狄侵齊秋楚人滅江江之不祀晉襄公之無逺謀也晉侯伐秦傳圍邧新城以報王官之役若愚案晉襄以王官之役不報為恥未商臣之得志於江為恥之大也報秦而不誅商臣使亂臣賊子得以夷滅小弱逞其凶毒晉襄之為盟主未矣比事書之深罪晉侯不以江亡為恥而敵秦怨也衛侯使寧俞來聘寧武子也冬十有一月壬寅夫人風氏薨風氏之稱夫人僖八年詳矣用陸淳曰自成風之後妾母皆僭夫人之禮故亦書薨著其非禮矣程子曰仲子始僭尚未敢同嫡也成風已後嫡妾亂胡氏曰禮庶子為君為其母無服不敢二尊者也春秋於成風記其卒葬各以其實不為異辭所以謹禮之變也五年春王正月王使榮叔歸含且賵珠玉曰含含口實也車馬曰賵胡氏曰不書來請之也也劉氏曰王何以無天言是非天之法始以妾為嫡也三月辛亥葬我小君成風陸淳曰自葬成風之後乃有二夫人祔廟非禮也王使召伯來㑹葬榖梁召作毛子召伯天子卿召采地伯爵王不稱天與桓元年歸仲賵及今年含且賵同譏㑹寵妾之葬失禮之甚也甚胡氏曰舍賵而又㑹葬其事益隆亂人倫廢王法益矣再不稱天聖人於此尤謹其戒而不敢略也夏公孫敖如晉秦人入鄀今襄陽宜城縣地有故城傳鄀叛楚即秦又二於楚夏秦人入鄀秋楚人滅六六國臯陶之後杜氏注今廬江六縣任公輔曰地譜夀州安豐縣有六國故城今屬安豐軍子傳六人叛楚即東夷楚成大心仲歸帥師滅六楚公燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳行父季友之子秋季孫行父如晉八月乙亥晉侯歡卒公羊傳歡作歡冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父晉狐射姑出奔狄傳晉初搜于夷命狐射姑將中軍趙盾佐之已而大傅陽處父聘于衛而至遂改搜于董謂趙盾能曰使能國之利也乃以盾將中軍而為國政及襄公卒狐射姑怨陽處父易其班使續鞫居殺陽處父案左氏則若晉國之事一聼於陽處父者及考穀梁氏所謂君漏言則知易中軍之將乃陽處父密言於襄公公不能謹而輕漏之以致狐射姑之殺處父此春秋所以分其殺於君與大夫也狐射姑使續鞫居殺處父事已顯故春秋微之襄公漏言而害成於處父其事幽晦故書晉殺其大夫以明之聖人於易節之初九明不出户庭之理而於陽處父之事著其用以示君臣所當謹密之法閏月不告月猶朝于廟趙氏曰天子當以每嵗冬班明年正朔於諸侯諸侯受之每月奉月朔甲子告廟所謂禀正朔也文公以閏非正不告月朔但以其日至廟拜謁而已故曰猶朝于廟成愚案月者取日月之㑹辰而定朔閏者所以定四時嵗治厯明時之政必先於此天子以為月而頒之為諸侯而不奉以告是輕正朔而慢時令也朝廟為告朔也文公以為附月之餘日而不以告則亦何以朝為哉故曰猶朝于廟以譏其捨大政而謹小禮也七年春公伐邾三月甲戌取須句遂城郚句公羊作朐須句見僖公二十二年注郚魯邑邾杜氏注卞縣有郚城今屬襲慶府泗水縣僖公伐取須句旋敗于升陘邾復取之是年伐邾取之因城郚邑左氏謂間晉難也夏四月宋公王臣卒宋人殺其大夫王榖梁作壬啓父死未踰時居不言之時而欲去羣公子以亂階致大夫不得其死故書宋人殺其大夫以見國之所以亂者由父始死而亟改其道也昭公之見弒兹可以占矣戊子晉人及秦人戰于令狐晉先蔑奔秦公羊傳先蔑下有以師字其說無據今從二傳蔑公羊作昧之令狐晉地今河中府猗氏縣有令狐城傳晉襄公卒也大子少欲立長君趙盾曰立公子雍好善而長且近於秦秦舊好也乃使先蔑如秦迎公子雍至是秦康公送公子雍于晉穆嬴日抱大子以啼于朝趙盾與諸大夫患之且畏逼乃背先蔑而立靈公以禦秦師訓卒利兵秣馬蓐食潛師夜起戊子敗秦師于令狐先蔑奔秦士㑹從之書今案如左氏說則書法當云晉人敗秦師于令狐今晉及秦戰又不言敗者秦之納不正與晉逆公子雍既而悔之又不謝秦皆罪也然二國之兵晉曲尤甚故秦伯趙盾皆稱人而特以晉及書且不書秦之敗深罪晉之置君而不定也先蔑書奔使秦而逆公子雍罪之也不書出遂在外也狄侵我西鄙間秦晉之爭秋八月公㑹諸侯晉大夫盟于扈扈鄭地杜氏以為滎陽卷縣西北有扈亭卷縣今之鄭州原武縣也傳齊侯宋公衛侯鄭伯許男曹伯㑹晉趙盾盟于扈晉侯立故也公後至故不書所㑹往程子曰文公怠政事多廢緩既約晉盟而後至故書㑹而隱其不及以不序諸侯與大夫之名者而見之也趙盾㑹諸侯靈公少故也冬徐伐莒公孫敖如莒涖盟涖公穀作蒞榖傳莒人來請盟而公孫敖往涖之梁傳曰其曰蒞前定也八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍衛雍鄭地後漢河南卷縣有垣雍城古衡雍也與扈相近翟晉以扈之盟後至來討公孑遂㑹盟以報之自晉文泉之盟付之諸大夫文公復以國事付之公子遂而不知一國之禮樂征伐皆自公子遂出此敬嬴所以得窺伺間隙私事之以胚胎殺適立庶之禍也乙酉公子遂㑹雒戎盟于暴公羊作伊雒戎戎傳遂㑹伊雒之案僖十一年揚拒泉臯伊雒之戎同伐京師而杜氏注雜戎居伊水雒水間者暴鄭地盟晉未幾遂㑹雒戎不以遂事言之者所以著內外之有别也公子遂以見討而受盟于晉為恥遂㑹雒戎以示服狄春秋以戎狄尤不當與為盟誓故兩之以示辨內外之法公孫敖如京師不至而復丙戌奔莒傳奔莒從巳氏也國君為天子斬衰三年公孫敖受命以赴天王之喪而懷桑中之行廢君命而徒返已而淫奔夫不至而復已為死誅不赦之罪泛奔莒從已氏乎文公不能正典刑聖人詳書其慢王弃君忘哀廢命容其復而後奔深以著魯之無政刑也螽宋人殺其大夫司馬宋司城來奔司城司空也宋以武公名司空諱之曰司城程子曰宋王者後得自命官故獨宋卿書官今案昭公不禮襄夫人故夫人因戴氏之族以殺大司馬公子卬司城蕩意諸來奔昭公初立已欲去羣公子而致殺大夫之變今又因不禮於君祖母致大臣或死或奔春秋皆以官書所以見六卿君所與圖政者皆因君而死亡故以國殺書之以罪昭公也九年春毛伯來求金毛伯天子大夫不稱使天王崩未踰年百官總己以聼冢宰之時所以謹君臣之分而明其責之所歸也王喪未葬喪紀所當令於諸侯者有常禮非其道則為政者不當使出使者不當承喪事求金徴索非禮特書以著其罪夫人姜氏如齊歸寧也二月叔孫得臣如京師辛丑葬襄王晉人殺其大夫先都傳六年夷之搜晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田于堇隂故箕鄭父先都士穀梁益耳蒯得使賊殺先克晉人殺先都梁益耳愚案稱國者君與大夫以政殺之也然専殺大夫已有罪矣加之以人豈非賤人得以與謀而政不出於一乎故稱晉人則殺之者不特君大夫而已無政之甚也三月夫人姜氏至自齊夫人出而書至蓋夫人與君一體寧父母而告于廟禮也前此不書者出不以禮故不書胡氏所謂書之以見小君之重者也晉人殺其大夫士縠及箕鄭父書晉人已見上凡殺二大夫或三人不書及者其罪均也書及者因殺是人而并及之也所謂著罪輕而不當殺也然胡氏曰先都士縠箕鄭父挾私怨以作亂固有罪矣不以討賊之詞書之者靈公初立主幼不君政在趙盾而中軍佐者盾之黨也若獄有所歸此三人者獨無可議從末滅乎而皆殺之是大夫専生殺也書人而不去士榖箕鄭父之官以示司賞刑者必本忠恕無有偏黨之意楚人伐鄭公子遂㑹晉人宋人衛人許人救鄭傳范山言於楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭因公子堅公子尨及樂耳鄭及楚平公子遂㑹晉趙盾宋華耦衛孔逹許大夫救鄭不及楚師卿不書緩也以懲不恪愚案楚自城濮以來不得志於中國其君臣之心實未嘗一日忘也趙盾為政無志於庇諸侯則已今欲攘楚而大庇中夏正當力懲其始以振中國之威乃視為常役而緩不及事諸大夫之師及鄭而楚已因鄭公子而去豈奉天討拯焚溺之舉哉楚子之聞宋殺申無畏也投𬒮而起屨及於窒皇劍及於寢門之外車及於蒲胥之市嗚呼楚人之勇于復仇如此而趙盾自失攘却之幾乃如彼此春秋所以悉人之也夏狄侵齊楚得氣去而狄交侵矣故書以病晉也秋八月曹伯襄卒九月癸酉地震隂盛陽微之異也冬楚子使椒來聘椒榖梁作萩聘椒鬬椒鬬穀於菟之從子伐鄭而魯亦逺交近攻之意也秦人來歸僖公成風之禭衣服曰禭翟杜氏謂秦慕諸夏欲通於魯因有泉之盟故追禭僖公并及成風猶愚謂當是時秦楚交聘中國秦欲伐晉而歸禭于魯楚欲圖北方而使椒來聘也豈古者明王謹德四夷咸賔之比哉葬曹共公十年春王三月辛卯臧孫辰卒臧文仲自莊公末巳與聞國政蓋魯之名大夫也而四十餘年間國政多疵文公尤甚由其知栁下惠之賢而不與立故夫子尤譏其竊位蓋仁者己欲立而立人故不仁之罪蔽賢為首也夏秦伐晉傳晉人伐秦取少梁秦伯伐晉取北徴秦以號舉狄之也春秋書兵罪其報復不已而狄之者三秦鄭晉也康公不紹其父悔過之謀報復無已故狄之楚殺其大夫宜申傳宜申為工尹與子家謀弒穆王五月殺鬬宜申及仲歸今案春秋於穆王之殺宜申不以討賊之法書之者用賢治不肖而不以亂易亂之義也自正月不雨至于秋七月著文公之志不以雨為念故井三時而言之也及蘇子盟子女栗不書公以盟天子之大夫諱之也冬狄侵宋楚子蔡侯次于厥貉胡氏曰伐而次者其次為善次而伐者其次為貶蓋伐而次則有抑鋒止鋭以待其服之意次而伐者無故次止久師藏禍將以致毒於人也下書伐麇楚人之勇于復仇審矣然案左氏陳鄭蔡宋皆與而止書蔡侯者陳鄭宋出於畏而從楚有不得已者獨蔡侯從楚得已不已故免三國而止書蔡也十有一年春楚子伐麇傳厥貉之㑹麇子逃歸春楚子伐麇成大心敗麇師于防渚潘崇復伐麇至于錫穴彊今案楚侵伐書子始此益盛也夏叔彭生㑹晉卻缺于承匡左氏本或作叔仲陸德明云仲衍字㑹承匡宋地在陳留襄邑縣西今拱州襄陵縣傳于承匡謀諸侯之從於楚者宋杜氏注九年陳鄭及楚平十年聽命于厥貉也秋曹伯來朝傳曰文公即位而來見公子遂如宋傳襄仲聘于宋且言司城蕩意諸而復之狄侵齊冬十月甲午叔孫得臣敗狄于鹹傳䣚瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔綿房甥為右富父終甥駟乘敗狄于鹹獲長狄僑如富父終甥椿其喉以戈殺之杜氏注䣚瞞狄國名防風氏之後漆姓鹹魯地十有二年春王正月郕伯來奔郕公羊作盛於傳郕太子朱儒自安夫鍾國人弗徇郕伯卒郕人立君太子以夫鍾與郕邽來奔伯常山劉氏曰大子當立郕人豈得而絶之故書曰郕來奔春秋大居正之法也杞伯來朝傳始朝公也稱杜氏注舍夷禮故伯二月庚子子叔姬卒文公女故曰子以别於先君之女也夏楚人圍巢杜氏注巢廬江六合東有居巢城今無為軍巢縣秋滕子來朝傳亦始朝公也秦伯使術來聘案傳秦伯使西乞術來聘且言將伐晉并備載公子遂辭玉及賔答之詞公子遂言不有君子其能國乎而厚賄之此足以見秦人以賄結魯而魯亦厚賄答之賔主相與以貨利而坐視霸主之受兵此比事以書不待貶絶而惡見者也冬十有二月戊午晉人秦人戰于河曲河曲杜氏注在河東蒲坂縣南今河中府河東縣南有河曲不書及蓋言二國曲直之無以相尚而黷兵殘民其罪均也不書敗績秦伯伐晉而趙盾帥師禦之欲待泰敝而趙穿沮其謀秦師遂遁無勝敗也秦伯趙盾皆以人書貶也季孫行父帥師城諸及鄆鄆公羊傳作運後放此東諸見莊公二十九年注鄆魯之鄆今鄆州須城縣也所謂莒魯爭鄆蓋始于此前此莒未嘗與魯有爭且未嘗有事于鄆今行父首帥師城二邑以啓爭端魯自此與莒為仇而爭由鄆始書帥師城罪行父也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒蘧蒢榖梁作籧篨自正月不雨至于秋七月大室屋壤大公羊作世將案明堂位曰祀周公於太廟此太廟之室也君子營宫室宗廟為先致孝享之敬莫先於此故榖梁氏曰為社稷之主而先君之廟壞極稱之志不敬也胡氏曰不雨凡七月而先君之廟壤不恭甚矣書壞而不書其修宗廟之事不可不嚴且急也冬公如晉衛侯㑹公于沓公羊㑹下無公字狄侵衛十有一月己丑公及晉侯盟公還自晉鄭伯㑹公于棐公還公榖並無公字棐公羊作斐沓傳公如晉朝且尋盟衛侯㑹公于請平于晉公還鄭伯㑹公于棐亦請平于晉公皆成之社氏注棐鄭地十有四年春王正月公至自晉公羊傳曰往黨衛侯㑹公于沓至得與晉侯盟反黨鄭伯㑹公于斐善之也故今案公羊氏之言有舍爵䇿勳之意録之邾人伐我南鄙叔彭生帥師伐邾傳邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾余氏曰居喪而伐人與伐人之喪其罪一也夏五月乙亥齊侯潘卒傳子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之昭公卒舍即位六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城新城宋地杜氏注在梁國穀熟縣西今南京應天府也傳同盟于新城從于楚者服且謀邾也則今案從楚者宋陳鄭許宋陳鄭見十一年承匡注許自文公圍之不服襄公又嘗伐之今始與盟㑹也同盟見莊公十六年晉自襄公之末楚再慿陵趙盾得政稍加和集去嵗文公之朝衛鄭求附盾因此并招致久負固之許諸侯偕至然後講同盟之禮修復齊桓之故事春秋以其僅能和集不足以方首止葵丘況霸主不臨政在大夫故止書癸酉同盟于新城而已雞澤之盟亦此例也胡氏曰考晉楚行事未有以大相逺也而春秋與奪如此者荆楚僭王若與同好是將代宗周為共主君臣之義滅矣可不謹乎愚謂當是時啇臣有覆載不容之罪不特僭王而已春秋惡諸侯宗而事之懼豺狼之逼人也秋七月有星孛入于北斗孛彗也天之有彗乃除穢布新之祥其言入者斗有環域入其魁中也傳周內史叔服曰不出七年宋齊晉之君皆將死亂是後齊弒君舍十七年宋弒昭公十八年齊又弒懿公宣二年晉弒靈公劉歆云天之三辰綱紀之星宋齊晉天子方伯中國綱紀斗七星故曰不出七年胡氏曰此三君皆違道失德而死于亂符叔服之言天之示人顯矣史之有占明矣公至自㑹晉人納捷菑于邾弗克納捷公羊作接生傳邾文公元配齊姜生貜且次妃晉姬捷菑文公卒邾人立貜且趙盾新城之盟謀立捷菑也盾遂以師八百乘納捷菑于邾邾人辭曰齊出貜且長盾曰辭順而不從不祥乃還人穀梁氏曰其曰人微之也長轂五百乘綿地千里敻入之國欲變其主至城下然後知何知之晚也曰弗克納弗克其義也臣陸淳曰書捷菑與小白去疾同廢置諸侯王者之事人専之罪莫大焉夫子善其聞義能徙故為之諱也凡事不合理而心可嘉者皆以諱為善義胡氏傳同人之九四曰乘其墉弗克攻吉象曰乘其墉弗克也其吉則困而反則也趙盾之謂矣九月甲申公孫敖卒于齊傳敖八年如京師而奔莒者其奔莒而從已氏魯立其子文伯穀敖生二子於莒而求復榖以為請公子遂使無朝聼命復而不出三年而盡室以復適莒文伯疾請曰穀之子弱請立難也文伯卒立惠叔敖請重賂以求復難以為請許之將來九月卒于齊告喪請葬弗許有愚案人之所當謹者始終之際也夫子之論士曰行已恥使於四方不辱君命可謂士矣況大夫乎公孫敖為魯大夫竄身於莒而無所容歸從其子為大夫而不敢出出入無詔於國身死於旅而不獲歸俯仰愧怍無以立於天地之間故特書卒于齊以著其死而無所寧其身也齊公子商人弒其君舍穀梁傳舍未踰年其曰君何也成舍之為君所以重商人之弒君也陸淳曰聞之師曰聖人作春秋以懲姦惡若未踰年君被弒而不曰君則逆亂之臣皆以未踰年而肆其凶惡故原情立義而以弒君書商愚謹案魯慶父之弒子般公子遂之弒子惡皆當從人弒舍之例惟奚齊以不正而特變書法必如是而後君臣適庶之分定矣宋子哀來奔傳髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也者今案自宋昭公在位始終無一善可稱大臣死禍出奔比比皆是獨子哀潔身而去不蹈隕身濡尾之悔觀蕩意謂再歸而卒不免則子哀之見幾而作豈非既明且哲仲山甫之流哉故書字以與之冬單伯如齊單伯魯大夫之命於天子者自莊公元年至今已七十餘年未必一人或其子若孫與齊人執單伯齊人執子叔姬胡氏曰齊君舍魯之甥也商人弒舍固忌魯矣魯使單伯如齊齊人意欲辱魯故執單伯并執子叔姬而誣之以罪不稱行人公羊所謂以已執之者也常山劉氏曰商人弒君之惡已顯而執叔姬之事聖人不獨罪商人也齊人不討賊俱北而事之又執其君母齊之人均有罪焉故曰齊人執子叔姬罪愚謹案執無罪而書人者固春秋之例也然其君無則其臣當為之用而罪在上其君當討之賊而臣為之用則罪在下而不在上夫篡弒之賊人人得討之商人既弒君矣齊人不以為不共戴天之讎而相帥以為之用以至執鄰國之命卿與其君之母則商人無責焉所以致弒逆之人能執魯卿與君母者不討賊之故也胡氏論之已詳其說出於劉質夫質夫春秋之學皆受於程子也此義之精非程子孰能發之十有五年春季孫行父如晉為單伯與子叔姬故也魯不能間暇明政刑以義討齊而反因晉以求於齊行父為大夫不能請討弒君之賊晉為盟主不能奉天討於商人皆罪也三月宋司馬華孫來盟華耦之來出於自請故不稱使結好合於事宜能其官也高郵孫氏曰昭公暗亂國事廢弛大臣外奔耦懼鄰國因閒以謀其國於是請來盟以結好而紓難宋大夫書於經多矣惟三人以官舉又皆在昭公之世豈非節義之士因世亂而後顯與夏曹伯來朝曹伯十一年來朝今復至齊人歸公孫敖之喪敖以罪出奔死于外魯不許其歸葬齊人使之飾棺置堂阜其子難猶毁以為請立於朝以俟命然後許其取殯葬視公子慶父許其取葬者以難為大夫且貴戚之卿也趙鞅之誓師曰桐棺三寸不設屬辟素車撲馬無入于兆此公孫敖之葬禮孝子慈孫所不能改者與六月辛丑朔日有食之鼓用牲于社注見莊二十五年單伯至自齊胡氏曰單伯天子之命大夫故逆王姬㑹伐宋使于齊皆書其字致而不名與意如婼異者無所書而不尊王命也王愚謂若如左氏之說以單伯為周大夫則是齊人執使春秋既不書其自周來魯又止書其至魯而不復言其歸京師是同之於魯之臣子無復周魯大夫之别且無以明齊人之執王使豈春秋辨上下尊王室之義哉晉郤缺帥師伐蔡戊申入蔡傳新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還愚謂君弱不可以怠修德以來蔡上也缺乃以兵伐而入其國徒示威武暴及其都民而蔡終不心服謂之能輔霸主服諸侯可乎言伐言入甚之也秋齊人侵我西鄙季孫行父如晉傳齊人侵我西鄙故季文子告於晉冬十有一月諸侯盟于扈傳晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不㑹書曰諸侯盟于扈無能為故也胡氏曰八國之君不序略之也夫外裔然後略之君臣同詞而不分爵號曷為略八國為不詳序弒君之賊夫人之所得討也故陳恆弒君孔子沐浴而朝告於哀公而請討今商人弒君晉與諸侯不奉天討受賂而退何忍復詳序之哉書諸侯盟於扈皆當伏不能討賊之罪也十有二月齊人來歸子叔姬此齊商人既弒舍而絶其母於齊故不以出夫人之例書之而書齊人者亦若執單伯執子叔姬之法深罪其國人之私惠反戴不共天之仇以為君而强出其君之母莫之或正也齊侯侵我西鄙遂伐曹入其郛郛曹國之郭中也入傳齊侯侵我西鄙謂諸侯不能也遂伐曹其郛討其來朝也襄陵許氏曰魯盡禮於晉而見侵莫恤曹修禮於魯而被伐莫救亂臣賊子肆行不忌皆晉靈趙盾失主盟之職也十有六年春季孫行父㑹齊侯于陽穀齊侯弗及盟公有疾使季文子㑹齊侯于陽穀請盟齊侯不肯曰請俟君間商人無道有弒君當討之罪文公不能明政刑舉大義以致命卿執辱邊鄙被兵與國蒙伐又使大夫自屈以請盟而不見答可謂困心衡慮而無憤悱改圖之心書此以見魯之衰責文公之無志也夏五月公四不視朔視朔即朝廟而告朔也今以疾不行二月至五月之禮也朔公羊氏曰曷為四不視朔公有疾也何言乎公有疾不視自是公無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也今案春秋微顯志晦之法無往不寓以見諱國惡而不沒實之意文公以疾不視朔春秋書之不用昭公有疾乃復之例書公有疾四不視朔而特書公四不視朔蓋文公自是因循不講告朔之禮以致餘公不復舉行所以定哀之時聖人有我愛其禮之言羊存而禮廢其必始於此與六月戊辰公子遂及齊侯盟于郪丘郪丘公羊作犀丘穀梁作師丘公羊疏正正本作菑丘故賈氏云公羊曰菑丘丘齊地傳公使遂納賂于齊侯故盟于郪秋八月辛未夫人姜氏薨僖公夫人文公之母毁泉臺傳有蛇自泉宫出入于國如先君之數秋聲姜薨毁泉臺公臨江劉氏曰魯人以為祥而毁之非明民之道羊傳先祖為之已毁之不若勿居而已矣楚人秦人巴人滅庸傅楚大餞戌伐其西南至于阜山師于大林又伐其東南至於陽丘以侵害枝庸人帥羣蠻以叛楚麇人率百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪高蒍賈曰不可我能往寇亦能往不如伐庸夫麇與百濮謂我饑不能師故伐我也我若出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食次于句澨使廬戢黎侵庸及庸方城楚子乘馹㑹師于臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸今案庸乘饑饉率蠻危楚楚一畏徙國誠無以保其國矣然禦變待敵亦制服之而已夷人宗社豈王法之所容乎楚子克庸而遂滅之其罪大矣是以人楚子而罪其滅也冬十有一月宋人弒其君杵臼杵公羊作處不傳宋公子鮑禮於國人宋饑竭其粟而貸之無日數於六卿之門國之材人無不事也親自桓以下無不恤也宋襄夫人助之施昭公無道國人奉公子鮑以因夫人冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之司城蕩意諸死之謹案宋昭公為無道而書宋人弒其君者見杵臼未至如獨夫之可誅而凡與於弒逆者皆當以輕重斷獄所以辨上下定民志也胡氏曰君親無將將而必誅諸侯無道天子方伯在焉臣子國人死於其職自明於去就從違之義斯可矣蕩意諸亦死之而不得與孔父仇牧並書者春秋無取焉爾之今案蕩意諸君昏不能正危不能救坐待其死而與同死真所謂匹夫匹婦之自經於溝瀆而莫之知者也十有七年春晉人衛人陳人鄭人伐宋傳晉荀林父衛孔逹陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還卿不書失其所也程子曰行天討而成其亂故貶之夏四月癸亥葬我小君聲姜聲公羊作聖諡也九月乃葬齊侯伐我西鄙西傳作北六月癸未公及齊侯盟于穀傳齊侯伐我襄仲請盟六月盟于穀諸侯㑹于扈傳晉侯搜于黃父遂復合諸侯于扈平宋也公不與㑹齊難故也書曰諸侯無功也愚案書諸侯略之與十五年盟于扈同秋公至自穀齊商人不足與㑹書至危之冬公子遂如齊拜穀之盟十有八年春王二月丁丑公薨于臺下高郵孫氏曰薨非路寢皆不正也其曰臺下蓋又甚焉秦伯罃卒康公也夏五月戊戌齊人弒其君商人傳齊懿公之為公子也與邴歜之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘夏五月公遊于申池二人弒懿公納諸竹中歸舍爵而行謹案既書齊公子商人弒其君舍矣則商人固當討之賊也然齊人不以為賊而討之反北靣稱臣而戴之以為君者三年以為賊則不當事以為君則不可弒今三年事之一旦弒之亂作於大分已定之後故曰弒其君也況商人驟施聚士以成弒舍之謀有王者作則凡前日受施推戴之人乃同惡之黨其罪有不容貸者所以邴歜間職同謀殺商人而特以齊人弒其君書之也六月癸酉葬我君文公秋公子遂叔孫得臣如齊傳六月葬文公秋襄仲莊叔如齊惠公立故且拜葬也文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲褒仲欲立之叔仲不可仲見於齊侯而請之齊侯新立而欲親魯許之胡氏曰使舉上客此春秋立文之常體其變文書介副者欲以起問者見事理也子赤夫人之子今卒于弒不著其實是為國諱惡無以傳信於將來而春秋之大義隱矣故上書大夫並使下書夫人歸于齊中曰子卒則見禍亂邪謀發於奉使之日而公子遂弒立其君之罪著矣冬十月子卒子之名左氏曰惡公羊曰赤未知孰是若如左氏則亦晉師服所謂異哉君之名子者也子般書名而此不書文公已葬故不名也傳公子遂殺太子惡及其弟視而立宣公書曰子卒諱之也遂矯太子惡之命召叔仲惠伯其宰公冉務人止之曰入必死惠伯曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中愚謂私事公子遂敬嬴奪嫡之心也然其敢啓是心嬖故也有夫人太子而嬖寵妾則文公所以怠於事霸急於盟齊簡於視朔者有自來矣人君昏於嬖寵棄忘國政故妾媵大臣相與謀賊君嗣而不能察身死之後冢嗣二人遂見戕弒所謂前有讒而不見後有賊而不知者文公之謂矣叔彭生身為大臣既無以拯救文公又不能知公子遂之邪謀有公冉務人之忠言不能用甘心就死無一毫扶持之實沒而不書有以也哉夫人姜氏歸于齊傳夫人姜氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀姜君胡氏曰書夫人則知其正書姜氏則知非見絶於先書歸于齊則知其無罪異于孫于邾者而魯臣子不能事主君存適母之罪並見矣是愚案胡氏於九年夫人姜氏至自齊傳曰出姜蓋至始不安於魯於傳未有見之也必要終原始而言之與適庶之亂未有不始於妾上僭夫人失位而致之者是以始知文公之首惡也季孫行父如齊告宣公之立也與沙隨程氏曰遂得臣行父三人皆謀以其前後如齊而知之也莒弒其君庶其凡稱國以弒者蓋其君以無道為國人所弒而大臣坐視不能討賊皆當誅不赦之罪也春秋集注卷五
