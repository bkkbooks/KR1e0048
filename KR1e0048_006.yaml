body:
  text: 春秋集注卷六宋張洽撰宣公名倭一名接文公妾敬嬴之子公子遂弒大子惡而立之諡法善問周逹日宣元年春王正月宣公受弒賊之立而居其位其罪同於桓公而十八年之間皆書王與桓公不同者法己舉於前矣天理不可以常亡王法不可以久廢故存王以舉大法亦所以正宣公之罪也公即位胡氏曰宣為弒君者所立受之而不討故如其意而書即位其輿僖文之立一美一惡不嫌於同也公子遂如齊逆女不貶喪中逆女者與即位同不待貶而罪惡見也胡氏曰宣公懼於見討故結昏于齊為自安計越典禮以逆女如此其亟而不顧者必敬嬴公子遂請齊立接之始謀也三月遂以夫人婦姜至自齊公子遂宣公之為亂臣賊子明矣不待貶絶也書婦著敬嬴之罪也書姜不氏責夫人不能以禮自防行吉禮於斬焉衰絰之中也劉氏曰婦人不專行在家制於父母夫人有貶則父母與有罪矣君胡氏曰敬嬴私事襄仲以子屬之殺世嫡兄弟出主夫人援成風故事即以子貴為君母衰絰中請昏納幣其罪隱而未見也故因夫人至特書夫人婦姜至自齊而不書氏所以深著宣公與敬嬴不可勝誅之罪也夏季孫行父如齊納賂以請㑹也文公世子之死在官之當誅者公子遂其首而行父次之觀春秋所書則知之矣晉放其大夫胥甲父于衛傳十二年河曲之戰秦行人夜戒晉師曰兩軍之士皆未憗也明日請相見也臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而弃之不惠也不待期而薄人於險無勇也乃止自戰及今七年矣討不用命者放胥甲父于衛罪久不治而二人有罪趙穿以盾之側室而獨免刑之偏頗如此非所以治有罪主諸侯也公㑹齊侯于平州平州齊地杜氏曰在泰山牟縣西後漢志琅邪國陽都故地有牟臺注平州在縣西今屬沂州沂水縣不傳㑹于平州以定公位愚謂凡亂臣賊子之所以敢縱其欲者以有伯主大國能討之也齊乃魯之鄰其力足以正魯而惠公不明於義利邪正之辨始許仲遂以亂魯之適庶終㑹平州以定賊子之位則亂賊復何畏而不逞哉㑹者外為志魯宣欲求寵以定位而書以齊惠之志蓋誅亂賊而先治其黨之法與桓公鄭莊垂之㑹一也晉為盟主諸侯所取正而商人宋人弒君威弗能加致魯亂不治亦以見晉之無能為也公子遂如齊公子遂自去年三見於經所以著其為惡之首也再胡氏曰遂一再見於經矣如齊拜成雖削之可也又書于䇿者於以著其始終成就弒立之謀以戒後世人臣或內交宫禁以固其寵或外結藩鎮以為之援至於殺生廢置皆出于其手而人主不悟者其慮深矣凡此皆直書于䇿而義自見也六月齊人取濟西田為立公故以賂齊也濟西田魯之故也僖三十一年取之於曹者義程子曰宣公不義得國賂齊以求助齊受之以助不故書取不義不能保其土故不云我非為彼强故不諱不能有而失者皆諱愚謂桓公篡立求援於鄭而誘以許田宣公奪嫡主齊以自立而賂以濟西以利自固前後一轍使鄭莊齊惠不貪其利則桓宣必不能以自立矣故春秋曰假曰取蔽罪鄭齊深以誅其貪利而成亂也大學論治國平天下之道而深戒以利為利孟子論先利後義者必後其君遺其親而不奪不饜皆拔本塞源知春秋之微意也與秋邾子來朝諸侯朝當討之人不貶者桓公已舉王法從同同也楚子鄭人侵陳遂侵宋傳宋人之弒昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟於晉又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟於楚陳共公之卒楚人不禮焉陳靈公受盟于晉故楚子侵陳宋今案不討有罪固晉之無義而亦未至如僭王猾夏之罪大也鄭舍晉而從楚附無王之夷狄以為中國患故人之晉趙盾帥師救陳左傳晉趙盾帥師救陳宋不今案陳無罪而蒙伐當救也宋有弒君之罪當救故略之也宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭胡氏曰鄭在王畿之內而附蠻夷陳先代之後而見侵過此門庭之冦利用禦之者故書救以與之愚謂與之則見諸侯之來㑹者固義舉矣然不曰㑹趙盾而曰㑹晉師蓋鄭之從楚亦盾不能治齊宋有以致之若再書其名則書重復而子之大過矣故止曰㑹晉師而不再書盾詳味書法然後見聖人抑揚之當也冬晉趙穿帥師侵崇崇公羊作柳在杜氏曰崇秦之與國晉任公輔曰案地譜啇有崇國京兆鄠縣甘亭傳欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬穿侵崇泰弗與成胡氏曰求成大國不以大義動之而伐其與國為諼甚明意者趙穿己有邪謀欲得兵權託於伐國以用其衆乎不然何謀之迂而當國者不能裁正也弒君子桃園而上卿以志同受惡名其端見於此矣晉人宋人伐鄭傳晉人伐鄭以報北林之役於是晉侯侈趙盾為政驟諫而不入故不競於楚之晉受宋賂不行天討鄭以是叛中國而晉人復與宋伐不能服鄭又致明年之師故稱人罪之二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元大棘杜氏注在陳留襄邑縣南今襄邑屬拱州于傳鄭公子歸生受命於楚伐宋宋華元樂吕禦之戰大棘宋師敗績囚華元宋人以兵車百乘文馬百駟贖華元于鄭半入華元逃歸乎宋以弒君致冦而不服罪故書宋及猶曰華元為志此戰也書師敗又書獲華元師與將之輕重適等也秦師伐晉傳以報崇也遂圍焦晉趙盾救焦胡氏曰晉用大師於崇乃趙穿私意而無名故書侵秦人為是興師報怨則問其無名之師故書伐愚謂欲求成而反召兵所以深著趙穿之妄動干戈而欲竊兵權誅其意也夏晉人宋人衛人陳人侵鄭傳趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚鬬椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競於楚殆將斃矣姑益其疾乃去之理胡氏曰歸生受命于楚以伐宋楚有辭矣趙盾去之以曲故也故去其名氏而稱人書侵而不言伐也秋九月乙丑晉趙盾弒其君夷臯臯公羊作嗥之趙盾為大臣任一國之重無能改君之德而君將殺惟去以全身然後其義明此盾接淅而行之時也況鉏麑提彌明皆為靈公之欲殺盾而死矣盾之去寧可後哉趙穿平日好勇犯上數干軍令追泰軍之役不待元帥之命而以其屬出晉軍欲薄秦師而穿當軍門呼以沮成算盾保庇之不黜不放平日曲意容養使之在位及至靈公欲殺盾而盾僞出奔穿弒公于挑園則未出山而歸復其位若取穿尸諸市朝猶可以自明也乃使穿逆公子黑臀而為君前日庇之今日不討而用之董狐非子而誰之言是乃推見至隱而歸弒於盾真至公之筆也聖人豈得而易之哉冬十月乙亥天王崩匡王也文十五年即位在位凡六年三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望此又因事之變以明魯郊之非禮也而僭禮之中復有忘哀從吉之罪郊牛者本養以祀天之牛也公羊氏曰養牲養二一郊牛一稷牛也然必卜而用之卜帝牲不吉則以稷牲卜用之帝牛必在于滌三月稷牛惟具郊之必祭稷者王者祀天必以其祖配之故也所愚案周公郊祀后稷以配天為成王制禮耳非魯之得用也況有三年之喪乃臣子斬衰奔赴之時豈可僭天子越紼行事之禮此春秋所以特書之并書猶三望以譏其可己而不已也葬匡王胡氏曰四月而葬王室不君其禮略也微者往㑹魯侯不臣其情慢也楚子伐陸渾之戎陸公羊作賁公榖無之字十陸渾子本允姓居瓜州僖公二二年晉惠公與秦遷之于伊川在唐為河南陸渾縣地今河南府伊陽縣北二十里有陸渾縣故城傳曰楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎胡氏曰其類相攻而特書于䇿者陸渾在王都之側楚子伐之又觀兵周疆而問鼎嚴內外之分也夏楚人侵鄭傳春晉侯伐鄭及郔鄭及晉平士㑹入盟夏楚人侵鄭鄭即晉故也胡氏曰不書晉之伐鄭及平者仲尼削之也鄭自宣元年以晉之受賂縱罪為不足與似矣而楚豈所當從乎今晉成新立背僭歸霸則反之正也春秋大改過遷善故獨著楚人侵掠之罪書侵鄭則及晉平可知矣秋赤狄侵齊赤狄狄之别種洺孔氏疏云謂之赤狄白狄者俗尚赤衣白衣也地譜州春秋赤狄之地襄陵許氏曰楚狄迭擾南北此中國大過棟橈之時也宋師圍曹傳宋以母弟須及昭公子之亂逐武穆之族二族以曹師伐宋宋師間曹報之也冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向向見隱二年注感易曰貞吉悔亡憧憧往來朋從爾思聖人所以人心而天下和平者此心之公正自足以感之也今以宣公而平二小國若出於公不必假齊一言而彼己服今挾齊為重而莒尚不肯伐莒而齊不復與復取向以自益春秋深以著宣公此心之不公而終之以為利也秦伯稻卒秦共公也魯不會夏六月乙酉鄭公子歸生弒其君夷傳楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而沉君乎反譖子家子家懼而從之夏弒靈公謹案公子歸生位為上卿久執重權國事由己乃不能鎮服姦邪遏絶萌蘖又脅於邪謀撓而從之位尊責重故春秋定為戎首以戒大臣不能持正而阿附惡人者所以示國討之法而明事君之義也嘗胡氏曰歸生與宋並為大夫以貴戚之卿同執國政統大衆久得兵權聞宋逆謀先事誅之猶及掌耳夫據生殺之柄使人聽己猶犬羊之伏於虎也何畏於人懼而從之乎計不出此顧以畜老憚殺比方君父何其悖也春秋以為逆之罪歸之歸生若司馬亮沈慶之等苟知此義則能討賊不至失身而為人制矣赤狄侵齊秋公如齊公至自齊胡氏曰君行告至常事不書宣公比年如齊而皆至者危之也今案此所謂危與桓二年書至自唐同意冬楚子伐鄭傳鄭未服也十今案楚自去年至十年侵伐鄭者凡五至一年盟鄭于辰陵而鄭又徼事晉於是十二年圍鄭入之遂敗晉于邲而後鄭服楚晉人之不振有自來矣五年春公如齊傳公如齊高固使齊侯止公請叔姬焉夏公至自齊傳書過也君杜氏注往朝見止厭尊毁列辱其先而於廟行飲至之禮故書以示過秋九月齊高固來逆子叔姬左氏作叔姬無子字據高固及子叔姬來有子字當從公榖二傳謹案此著高固非君命而越境特書以著其罪也之胡氏曰稱子者别於先公之女其曰來者以公自為主也嫁女於大夫而不使大夫主之則厭尊毁列卑朝廷慢宗廟矣鄭國褊小楚公子圍貴驕强大來娶于鄭子産辭而卻之使館于外宣公以國君而逼於高固强委禽而請昏其女不知以禮為幹以守身而取辱春秋詳書罪宣公也叔孫得臣卒不書日闕文也冬齊高固及子叔姬來傳來反馬也胡氏曰禮嫁女留其送馬不敢自安及廟見成婦遣使反馬高固親來非禮也況見逆未易嵗遽歸寧乎故書及書來以著齊罪也禮法之所禁不可犯也惠公許其臣越禮恣行而莫遏高固委其君踰境自如而不忌人欲肆矣故以為非常特書為後世戒楚人伐鄭傳楚子伐鄭陳及楚平晉荀林父救鄭伐陳六年春晉趙盾衛孫免侵陳傳晉衛侵陳陳即楚故也胡氏曰案傳稱陳及楚平林父伐陳而經不書者以侵陳則平楚可知故也已之有闕不內省德而以兵加之故林父不書伐而盾免書侵以正晉之所主盟者非其道也諸愚案屢失幾會大義不立營營救鄭以致楚人益陵侯攜二兹晉之所以失道歟夏四月秋八月螽胡氏曰傳謂螽為榖災虐取於民之效也先是伐莒取向一再如齊軍旅數起賦斂既繁戾氣應之矣宣公遇災不知遷善以補前愆而用兵不息國用空乏卒改助法而稅民蓋自此始經於螽螟一物之變必書于䇿以示天人感應之理不可誣當謹其所感也冬十月七年春衛侯使孫良夫來盟傳孫桓子來盟始通且謀㑹晉也榖梁曰來盟者前定也又胡氏曰來盟所以為前定者嘗有約言矣未足效信歃血以固結之也衛欲為晉致魯而魯宣専於事齊初未與晉通必有疑焉而衛侯任其無咎故遣良夫來為此盟及公㑹晉卒以見辱盟非春秋所貴義自見矣夏公㑹齊侯伐萊秋公至自伐萊萊杜氏注東萊黃縣地今登州黃縣有萊山㑹胡氏曰平莒及郯魯欲也故書及伐萊齊志也故書繼以伐萊致則師行之危可知見齊侯不務德合黨連兵恃強陵弱而宣公惟命之從也大旱比年螽旱觀其所感可見矣冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤黑壤晉地一名黃父傳鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟于黑壤王叔桓公臨之以謀不睦晉侯之立也公不朝馬又不使大夫聘晉人止公于㑹公不與盟以賂免盟不書諱之也夫凡盟㑹而不得見不與盟直書之者曲不在公也若見執且不與盟而悉諱之則其曲在公矣宣公私昵於齊而不事盟主故盟見執而不得與幸以賂而苟免於是諱之則宣公之罪可見矣八年春公至自㑹見執於晉踰年乃至夏六月公子遂如齊至黃乃復黃齊竟上地將大夫奉君命出境死生以之未致使而死以尸事禮也書至黃乃復與公孫敖不至而復同罪其違君命也辛巳有事于大廟仲遂卒于垂事謂時祭也垂齊地非魯竟故書地仲遂得罪於文公以公子翬不書卒之例不當書卒今特書其卒以事之變卒之也書仲遂其字也蓋宣公德之與公子友之於僖公同有輔立之恩故亦用公子友例生而賜氏俾世其卿也觀無駭之不氏則知季友仲遂以私思而變前世命氏族之法春秋特書以示戒故臨江劉氏云譏自是世仲氏也壬午猶繹萬入去籥繹者明日之祭所以賔尸也籥吕氏曰萬舞文武二舞之總名也舞文舞之别名也文舞又謂之羽舞蓋文舞吹籥秉翟羽也萬入去籥者文武二舞俱入於二舞中去羽舞吹籥以其有聲也去其有聲而用其舞者以仲遂之卒知其不可而為之也此蓋正祭之日仲遂卒于垂則次日己聞之股肱之痛賔尸之祭為可已也行吉禮於方聞喪之時雖用舞而僅去其有聲者是知其不可而猶為之也以喜怒哀樂發而中節謂之和仲遂有殺嫡之罪宣公其私於已而愛之生賜之氏今出使未畢中道擅返不正其罪其喜樂既不以正聞喪當哀又復心知其不可而故行吉禮春秋謹書始未以見其心不正而施之宗廟朝廷者謬戾如此詳觀書法可以見聖人格心之道矣戊子夫人嬴氏薨嬴公榖作熊公宣公母敬嬴也嫡胡氏日成風屬僖公於季友及僖立正夫人之位妾始亂春秋於風氏始卒四貶之禘致夫人去其姓氏秦禭不稱夫人榮叔召伯含賵㑹葬王不書天敬嬴視效援例自立而無貶從同同也晉師白狄伐秦白狄今丹州廷州銀夏之地狄傳白狄及晉平㑹晉伐秦愚案白秦同壤之國也晉與秦自侵崇啓釁七年而未巳晉與為㛰而結以伐秦援外兵以攻與國也自此至成公十三年吕相絶秦之詞皆連兵之事楚人滅舒蓼蓼榖梁作鄝地杜氏注舒蓼二國名或曰譜上義陽之蓼不與羣舒近蓼已滅於楚見文五年此即如舒鳩舒庸一國也傳楚伐舒蓼滅之楚子疆之及滑汭盟吳越而還強胡氏曰楚夷自相攻滅書而不削者楚盟吳越勢益大經斯世者當以為懼有攘却之謀而不可忽也秋七月甲子日有食之既杜氏注月三十日食餘此自文公以來二十年中凡列國弒父與君幾遍之咎晉敗于邲宋圍折骸之徴也冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬敬嬴公榖作頃熊趙子曰頃惡諡也宣公必不以加於其母誤也制榖梁傳葬既有日不為雨止禮也兩不克葬喪不以也胡氏以為敬嬴事襄仲而殺嫡立庶逐去哀姜之咎徴而不克葬天理之不可誣也又曰僖公享國八年然後成風致于廟敬嬴於宣公元年穆姜即稱婦婦有姑之詞見敬嬴以子貴援例而亟立為夫人也貶於成風之賻葬而此不復貶謹其始也城平陽杜氏注泰山平陽縣今襲慶府鄒縣有南平陽城楚師伐陳傳陳及晉平楚師伐陳取成而還九年春王正月公如齊泰山孫氏曰公有母喪而逺朝齊無哀甚矣公至自齊夏仲孫蔑如京師胡氏曰當嵗首月朝齊而夏使大夫聘京師公享國九年於是才一聘其於齊則又再朝矣經於如齊每行必至不待貶絶而惡自見者也齊侯伐萊襄陵許氏曰狄比侵而不報萊不敢犯亟伐之畏强陵弱可以觀惠公矣秋取根牟杜氏注根牟東夷國琅邪陽都縣東有牟鄉今屬密州安丘縣八月滕子卒傳滕昭公卒九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳傳㑹于扈討不睦也陳侯不㑹晉荀林父以諸侯之師伐陳辛酉晉侯黑臀卒于扈卒于境外故書地冬十月癸酉衛侯鄭卒胡氏曰晉成公衛成公皆不書葬魯不㑹也衛成事晉甚謹而宣公獨深向齊衛欲為晉致魯使孫良夫來盟以定之及宣㑹黑壤而晉止公是以扈之㑹魯獨不往二國赴喪皆不往命以私怨廢禮忘親其罪著矣宋人圍滕傳因其喪也今案不哀有喪用兵圍之此事以著其不仁也楚子伐鄭晉郤缺帥師救鄭傳六年厲之役鄭伯逃歸故楚子伐鄭晉郤缺救鄭鄭伯敗楚師于柳棼鄭人喜惟子良憂曰是國之災也吾死無日矣胡氏曰宣三年晉成初立鄭舍楚從中國楚興師伐之罪也故稱人次年歸生弒君楚師致討稱爵與之也然賊則不討惟服鄭之為事故又次年傳稱楚子伐鄭而經書人亦貶之也今此書爵豈與之乎下書郤缺之救則知罪其親以重兵侵暴中華矣故一字之褒貶所以為著明也陳殺其大夫泄冶泄左氏本作泄今左傳本多因唐人諱世字雖偏傍亦然故改泄為泄也戲傳陳靈公與孔寧儀行父通於夏姬皆衷其衵服以于朝泄冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣以告二子二子殺泄冶胡氏曰稱國以殺者君與用事大臣同殺之也稱大夫則不失其官守而殺之者有専殺之罪矣冶無罪而書名者冶以諫殺身者也殺諫臣者必有亡國喪身之禍從之故書名以為徴舒弒君滅陳之端以垂後戒此義繫於名而書名者也或曰泄冶以諫死而無褒詞何也愚謂易曰君子見幾而作不俟終日方靈公君臣驅馳於株林之時泄冶知其不可諫潔身而去之可矣至於褻慢朝廷衷服而戲則立於其朝者雖欲默然不可得矣泄冶失於不能知幾而早辨是以不可與宋子哀同日而語也十年春公如齊公至自齊齊人歸我濟西田傳齊人以我服故歸濟西之田得今案書歸田而言我者言此田魯之舊封非齊之所專也不言來歸者請而得之也歡及闡歸於取之年故不言我今歸於十年之後故書我也特書曰我則取之不以其道而歸之不以其正一出於相與之私為可見矣夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛傳齊惠公卒崔杼有寵於惠公髙國惡其逼也公卒而逐之奔衛榖梁傳氏者舉族而出之之辭也今案特書其氏見崔杼之宗強於齊故勢足以逼高國雖今日逐之而尚能復歸於齊也如崔成之徒復日卒自遺滅宗之禍豈非族大勢張而不知制節謹度卒至凶于家禍于國也與公如齊五月公至自齊傳公如齊奔喪天胡氏曰天王之喪不奔而奔齊喪王之葬使微者㑹而使公孫歸父會齊侯之葬其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也癸巳陳夏徴舒弒其君平國傳陳靈公與孔寧儀行父飲酒于夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廏射而殺之二子奔楚以胡氏曰禍莫大於拒諫而殺直臣泄冶不憚盡言正靈公君臣淫縱恐其及禍不忍坐視而言之公不能納又從而殺之卒以見弒而亡其國此萬世之大戒也愚謂古人以禮為防間而人君之尊有妃偶嬪御之侍有居處出入之奉有亷恥羞惡之限所以養其尊貴者至矣何至驅馳於株林以為樂哉泄冶之諫夏南之詩皆以其捨人道而躬為禽獸之行也考之國語前年單子如楚過陳時泄冶未死也單子歸而告王以陳侯帥其卿佐南冠以淫於夏氏陳侯不有大咎國必亡己見之於三年之前矣能無及乎觀春秋之所書弒君如陳平國齊光蔡固以千乘之主而自儕於閭巷小人所不為者心術之惑可不戒哉六月宋師伐滕傳滕人恃晉而不事宋宋師伐滕胡氏曰稱師用衆也鄰有弒逆不能聲罪致討乃舊大師以伐當恤之小邦故特稱師以著其罪公孫歸父如齊葬齊惠公胡氏曰歸父仲遂之子也宣公深德齊侯之能定其位又以濟西歸之故生則事之不辭屈辱殁則親往奔喪使貴卿㑹葬故愚案春秋書此深著亂臣賊子不復明送終之正禮缺於天子而厚於強國豈非九伐之威不行而專征之討不加以至於此與晉人宋人衛人曹人伐鄭傳鄭及楚平諸侯之師伐鄭取成而還戈愚案稱人者貶其捨亂臣賊子之大惡而輕動干以討迫於强令無所通從之小國桓五年諸侯從王伐鄭之經詳言之矣秋天王使王季子來聘傳劉康公來報聘杜注康公即王季子其後食采於劉謹案宣公事周簡慢極矣僅遣一介而重臣繼來書以見王室之無政如此故許翰曰自是王靈益亡王聘益輕春秋王聘不復録矣公孫歸父帥師伐邾取繹繹公羊作蘱杜氏注魯國鄒縣有繹山也案詩保有鳧繹邾文公卜遷于繹皆此今在襲慶府鄒縣為邾魯二國之境大水隂長陽消荆楚乘釁之徴季孫行父如齊冬公孫歸父如齊傳季文子初聘于齊冬子家如齊伐邾故也胡氏曰齊侯嗣立公往奔喪卿共葬事矣修聘宜可緩也而季孫亟行歸父繼往宣公不知以禮為國而謂妄說可以免討也歸父貪於取繹畏齊而往蓋理曲氣餒能無畏乎故備書不削以著其罪齊侯使國佐來聘傳國武子來報聘饑王政以民食為重故積貯天下之大命也前此百有餘年水旱螟螽之災多矣不以饑書今大水之後特書饑者著宣公煩於事外國用無節上下困竭故一遇水旱遂致乏食耳荀卿論本末源流賈誼論蓄積皆明於為民而知春秋書饑之意者也楚子伐鄭傳楚子伐鄭晉士㑹救鄭逐楚師于潁北諸侯之師戍鄭缺胡氏曰九年楚子伐鄭稱爵者貶辭也蓋下書晉郤救鄭則罪楚可知矣此年楚子伐鄭稱爵者直詞也以傳書士㑹救鄭逐楚師而經削之則責晉可知矣十有一年春王正月夏楚子陳侯鄭伯盟于辰陵辰陵榖梁作夷陵杜氏注陳地潁川長平縣東南有辰亭今淮寧府西華縣傳楚子伐鄭及櫟子良曰晉楚不務德而兵爭與其來者可也乃從楚盟于辰陵陳鄭服也楚莊於是合二國為盟欲討陳夏徴舒也春秋以晉齊二大國方且用兵于莒狄而不能討獨楚莊合諸侯以討之所以楚子書爵於陳侯鄭伯之上與之也公孫歸父㑹齊人伐莒莒恃晉而不事齊魯從齊而伐之事齊故聽命也兵不討亂而附强陵弱深著齊魯之罪也秋晉侯㑹狄于櫕函櫕函狄地衆傳晉郤克求成于狄衆狄疾赤狄之役遂服于晉故㑹于櫕函與今案書㑹狄者內中國而外狄也晉侯為盟主而往狄㑹捨夏徴舒之罪以遺楚討使楚舉大義以加於中國又欲與楚爭鄭楚直晉老所以敗於邲也冬十月楚人殺陳夏徴舒傳楚子為陳亂故伐陳謂陳人無動將討於少西氏遂入陳執夏徴舒轘諸栗門州今案楚子蠻荆也能殺夏徴舒而其書之也與衛殺吁蔡殺陳他一例書之者所以明亂臣賊子人人共惡人人得討不閒于內外乃所以廣忠孝之路而拯救三綱於大亂之日也孫氏曰與楚者傷中國無人喪亂陵夷之極也丁亥楚子入陳納公孫寧儀行父于陳傳楚子入陳殺夏徴舒遂縣陳申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弒其君寡人以諸侯討而戮之諸侯縣公皆慶寡人汝獨不慶何故對曰徴舒弒君其罪大矣戮之義也諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉乃復封陳鄉取一人焉以歸謂之夏州陸氏微㫖曰入人之國義納淫亂之臣邪也故明書其爵以示不正春秋之義彰善疸惡纎芥無遺稱事原情瑕瑜不掩斯之謂也朝胡氏曰公孫寧儀行父此二臣者從君於昏宣淫於誅殺諌臣致君見弒蓋致亂之臣肆諸市朝與衆同弃然後足以終討亂之義而快於人心今乃詭詞奔楚託於討賊復讎求脫其罪楚莊不能察其反覆又使陳人用之猶人有飲鴆而死者幸而復生人強以毒飲之也聖人外此二人於陳而特書曰納納者不受而强納之也為楚莊者若能瀦夏氏之宫封泄冶之墓尸孔寧儀行父于朝謀於陳衆置其君而去其庶幾乎徴愚案孔寧儀行父必因奔楚誘楚子以利故楚子殺舒而縣陳微申叔時之言則陳遂亡矣楚莊懷夷狄貪婪之心而尚能以義自克故封陳而不取然見善不明而非有改過不吝之公心所以雖封陳而終宥陳之亂臣復納諸國聖人豫善之𢎞待人之公先旌其討賊之義然後著其入陳且納亂臣之罪使楚莊之善惡功罪顯然明白詳味此編則知非聖人莫能修而游夏不能與者矣十有二年春葬陳靈公公羊傳討此賊者非臣子也何以書葬君豫詞也胡氏曰天下之惡一也臣子不能討而有天子方伯四鄰同盟方域諸侯四夷君長與凡民皆得討之所以明大倫存天理也徴舒雖楚討之陳之臣子亦可以釋怨矣故得書葬君子詞也楚子圍鄭傳楚子圍鄭三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆王曰其君能下人必能信用其民矣退三十里而許之平潘尩入盟子良出質圍胡氏曰入皇門至逵路即其國都矣不書入而止書蓋陳之亂天子方伯不能討而楚能討之故從末減以見誅亂臣賊子之為重也夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績邲鄭地地譜鄭州城下管城縣有邲城在縣南公羊傳楚莊王圍鄭三月克之鄭伯肉袒左執茅旌右執鸞刀以逆曰寡人無良邉垂之臣以干天禍是以使君王沛焉辱到敝邑君如矜此喪人錫之不毛之地使帥一二耋老而綏焉請惟君王之命莊王曰君之不令臣交易為言是以使寡人得見君而微至乎此親自手旌左右撝軍退舍七里將軍子重諌曰南郢之與鄭相去數千里諸大夫死者數人厮役扈養死者數百人今君勝鄭而不有無乃失臣民之力乎莊王曰古者杆不穿皮不蠧則不出於四方是以君子篤於禮而薄於利要其人不要其土告從不赦不詳吾以不詳道民災及吾身何日之有既則晉師之救鄭者至曰請戰莊王許諾將軍子重諌曰晉大國也王師淹病矣君請勿許莊王曰弱者吾威之强者吾避之是以使寡人無以立乎天下令之還師逆晉人莊王鼓之晉師大敗晉衆之走者舟中之指可掬矣莊王曰嘻吾兩君不相好百姓何罪令之還師而佚晉人傳夏六月晉師救鄭荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之楚歸而動不後隨武子曰善㑹聞用師觀釁而動楚君討鄭怒其二而哀其卑叛而伐之服而舍之德刑成矣伐叛刑也柔服德也二者立矣若之何敵之見可而進知難而退軍之善政也先縠曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵强而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟楚子北師次于郔將飲馬於河而歸聞晉師既濟王欲還嬖人伍參欲戰言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聽而無上衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之次于管以待之楚少宰如晉師曰寡君此行也將鄭是訓定豈敢求罪于晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室母廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人先榖以為諂使趙括從而更之曰行人失詞寡君使羣臣遷大國之跡於鄭曰無避敵羣臣無所逃命楚子又使求成於晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉帥晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還趙旃求卿未得且怒夫楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往晉人懼二子之怒楚師也使以軘車逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我遂疾進師車馳卒奔桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也及昏楚師軍于邲晉之餘師不能軍宵濟亦終夜有聲丙辰楚重至于邲遂次于衡雍祀于河作先君宫告成事而還令案經書荀林父及之者言林父之為志乎此戰也蓋晉不能討陳亂已失三綱軍政之本乃欲恃力以爭鄭不知楚莊既討陳亂則師出有名而所以施於鄭者又進退得冝勇怯中節林父上不能輔君討亂以行主盟之大義而此行本為救鄭而鄭己服楚軍政失於輿尸士榖之徒恃强專制故林父雖知楚之不可敵而不能止諸帥之從楚師觀公羊之言則知楚子之所以勝觀左氏之言則知晉之所以敗此春秋所以不書晉之救鄭而特以林父主此戰著其敗師之罪也秋七月冬十有二月戊寅楚子滅蕭簫宋附庸國也僚傳楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭明日蕭潰减胡氏曰假討賊而滅陳春秋以討夏氏之義重也未而書入惡二已而入鄭春秋以退師之情恕也末減而書圍與人為善之德宏矣至是肆其强暴滅人之國不可赦也故傳稱蕭潰經以滅書斷其罪也其日謹之也晉人宋人衛人曹人同盟于清丘清丘衛地地譜今濮州臨濮縣東南有清丘討傳晉原榖宋華椒衛孔達曹人同盟于清丘曰恤病二胡氏曰楚既入陳圍鄭敗晉滅蕭憑陵中國甚矣為諸侯計者宜信任仁賢修明政事自强於為善則可以保其國耳曽不是圖而刑牲歃血要質鬼神求以禦楚謀之不臧孰大於是故國卿貶而書人譏失職也原縠違命喪師乃晉國罪人而主兹盟約所信任者可知也宋師伐陳衛人救陳傳宋為盟故伐陳衛人救之孔逹曰先君有約言焉若大國討我則死之縣胡氏曰陳有弒君之亂宋不能討而楚能討之雖曰陳尋復封之其德於楚而不二未足責也宋不能內自省德遽以大衆伐之非義舉矣衛人救陳背盟失信而以救書者見陳未有罪而受宋師為可恤也且謀國失圖妄興師以怒强楚亂自此始矣其以救書意在責宋也若衛叛盟則不待貶絶而惡自見十有三年春齊師伐莒傳齊師伐莒莒恃晉而不事齊故也夏楚子伐宋傳以其救蕭也存今案孟子曰天下無道小役大弱役强天也順天者逆天者亡宋不知屈伸消長之道而欲以區區之力强中國由此致伐者胡氏曰楚滅蕭將以脅宋諸侯懼而同盟為宋人計恤民固夲輕徭薄賦使民效死親其上則可以待敵矣計不出此而急於伐陳攻楚與國非䇿也故楚有詞于伐而得書爵秋螽冬晉殺其大夫先縠傳赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族又胡氏曰先縠違命大敗晉師不能用鉞已失刑矣今重有罪焉晉人治其罪而戮之義也曷為稱國以殺而不去其官夫兵者安危所係有國之大事也將非其人則敗雖得其人使親信間之則敗以剛愎不仁者參焉而莫肯用命者則敗凡此三敗君之過也河曲之戰趙穿獨出而史駢之謀不用濟涇而次樂黶欲東而荀偃之令不行今荀林父將中軍乃以先縠佐之使敵國謀臣知其從政者新未能行令誰之遏與稱國以殺不去其官罪纍上也莊愚謂盡滅其族必怒其召狄也然越椒將攻王而楚尚思子文治楚而復克黃之所先縠先軫之孫而滅其族蓋晉之德刑皆不足以敵楚矣十有四年春衛殺其大夫孔達傳清丘之盟晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔逹曰苟利社稷請以我說我則為政而亢大國之討將以誰任我則死之春孔達縊而死衛人以說于晉而免故蘇氏曰孔達則有罪矣而衛人用其言以干盟主稱國以殺罪纍上也夏五月壬申曹伯壽卒晉侯伐鄭傳晉侯伐鄭為邲故也告於諸侯搜焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良于楚愚謂屈而知伸敗而能改可以興矣晉所以敗由大義不明而爭與國也今敗未兩嵗而復興爭鄭之師故書晉侯以著其師之為報怨也秋九月楚子圍宋傳楚子使申舟聘于齊曰無假道於宋亦使公子馮聘于晉曰無假道於鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺汝我伐之見犀而行及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及於寢門之外車及於蒲胥之市九月楚子圍宋由胡氏曰經於宋伐陳特書救陳以著宋罪明見伐之也國必自伐然後人伐之凡事其作始也簡其將畢也必巨易於訟曰君子以作事謀始始而不謀必至於訟訟而不竟必至於師若宋是矣葬曹文公冬公孫歸父㑹齊侯于榖胡氏曰夫禮别嫌明微制治于未亂自天子出者也列國之君自相㑹聚是禮自諸侯出矣以國君而降班以㑹外臣以外臣而出位以抗諸侯是禮自大夫出矣君若贅旒陪臣執命豈一朝一夕之故哉故易於坤之初六日馴致其道至堅氷也易言其理春秋見諸行事若合符節可謂深切著明矣愚謂以歸父㑹齊侯蓋魯素事齊而宣公之立公子遂主之故其父子嘗親于齊而齊亦不復計等列之不班從而與之㑹也非禮甚矣十有五年春公孫歸父㑹楚子于宋傳孟獻子言於公曰臣聞小國之免於大國也聘而獻物於是乎有庭實旅百朝而獻功於是乎有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公說春歸父㑹楚子甚于宋胡氏曰楚不假道以啓釁端而圍之陵蔑中華矣諸侯縱不能畏簡書邱同惡存先代之後嚴兵固圉以為聲援猶之可也乃以周公之裔千乘之國謀其不免至於薦賄不亦鄙乎比事以觀則知當時列國盛衰之由春秋經世之略矣夏五月宋人及楚人平傳宋人使樂嬰齊告急于晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之强能違天乎諺曰高下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之乃止夏五月楚師將去宋申犀稽首于王之馬前曰毋畏知死而不敢廢王命王弃言焉王不能答申叔時僕曰築室反耕者宋必聽命從之之公羊傳曰外平不書此何以書楚王圍宋軍有七日糧爾於是使司馬子反乘堙而窺宋城宋華元亦乘堙而出見之子反曰子之國何如華元曰憊矣曰何如易子而食之折骸而炊之子反曰是何子之情也華元曰吾聞君子見人之死則矜之是以告情于子也子反曰諾勉之矣吾軍亦有七日之糧耳盡此不勝將去而歸爾揖而去之反曰于莊王莊王曰何如曰易子而食之析骸而炊之莊王嘻甚矣憊吾今取此而後歸耳子反曰不可臣已告之告矣軍有七日之糧爾莊王怒曰吾使子往視之子曷為之子反曰以區區之宋猶有不欺人之臣可以楚而無乎是以告之也莊王曰諾吾猶取此而後歸耳子反不可乃引師而去之此皆大夫也其稱人何貶曷為貶平者在下也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸潞氏今潞州潞城縣杜氏注潞赤狄之别種潞氏國故稱氏子爵也之傳潞子嬰兒之夫人晉景公之姊也酆舒為政而殺又傷潞子之目六月癸卯晉荀林父敗狄于曲梁辛亥滅潞死胡氏曰上卿為主將而稱師者著其暴也潞嬰兒不社稷比於中國而書爵者免嬰兒之責詞也酆舒為政而殺其君之夫人又傷其君之目則酆舒者罪之在也為晉計者執酆舒轘諸市立黎侯定潞子改紀其政則諸狄服疆域安矣今乃以其君歸何不仁之甚哉春秋所以責晉而略狄也秦人伐晉王札子殺召伯毛伯傳王孫蘇與召氏毛氏爭政使王子捷殺召戴公及毛伯衛卒立召襄忿杜氏注王子捷即王札子榖梁曰矯王命以殺之非怒相殺也故曰以王命殺也為天下主者天也繼天者君也君之所存者命也為人臣而侵君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天下所以傾也梁襄陵許氏曰拓跋魏世高歡覩張彛之變而生亂心世武帝在位王侯専殺政法不施遂以亂亡無惑乎周之無以令天下也秋螽螽公羊作􅏑蟲案自六年至今三遇災而水旱未與焉此宣公不修德莭用愛人之所感也仲孫蔑㑹齊高固于無婁無婁公羊作牟婁恐當從之聲之訛也祀邑大夫相㑹蓋始於此初稅畝傳初稅畝非禮也榖出不過藉以豐財也譏公羊傳初者何始也稅畝者何履畝而稅也何以書始履畝而稅也古者什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣榖梁傳古者什一藉而不稅初稅畝非正也古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民初稅畝以公之與民為已悉矣古者公田為居井竈葱韭盡取焉胡氏曰孟子曰耕者藉而不稅則天下之農皆悅而願耕于其野矣初稅畝者譏宣公廢助法而用稅也初者志變法之始也其後作丘甲用田賦二猶不足皆宣公啓之也冬蝝生蝝螽子也滋生而將為害是以記之也饑宣兩書饑一在大水之後一在螽蝝之後甚言國無蓄積而民無以生也十有六年春王正月晉人滅赤狄甲氏及留吁傳晉士㑹帥師滅赤狄甲氏及留吁鐸辰地案晉自不得志於楚而一意用武於狄兼并其士㑹書人深貶之也夏成周宣榭火榭公羊作謝火公榖並作災室成周者周之東都今之洛陽宣榭者廟無曰榭杜氏以為講武屋宣王南征北伐講武於此詩所謂復㑹諸侯于東都因存其廟蓋古者袓有功故百世不毁也胡氏曰吕大臨考舌圖有􅌏敦稱王格于宣榭是知宣王之廟也周衰貴戚擅殺大臣而天子不討王室不復中興矣人火之天所以見戒乎秋郯伯姬來歸傳出也際胡氏曰詩記男女之易叙咸恆為下經首春秋內女出夫人歸詳書于䇿所以使有國者謹於齊家之道正人倫之本也冬大有年宣公奪嫡而立王誅不加而天災饑饉之禍屢降今年大有年亦所以記咎徴常多故曰記異也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公胡氏曰日卒書名赴得禮也葬不月其略在內宣公不知禮義邦交之實送終獨厚於齊而利害不切於身者皆薄其禮大則君親次則盟主又其次秦衛若滕雖赴告而不㑹葬考春秋之備書而宣公不謹於事上交鄰之罪見矣六月癸卯日有食之己未公㑹晉侯衛侯曹伯邾子同盟于斷道傳晉侯使郤克徴㑹于齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能涉河齊侯使高固晏弱蔡朝南郭偃㑹及斂孟高固逃歸夏㑹于斷道討二也盟于卷楚辭齊人晉人執晏弱于野王執蔡朝于原執南郭偃于溫晉師還此蓋郤克怒齊之甚假同盟之禮約束諸侯共伐齊也秋公至自㑹冬十有一月壬午公弟叔肸卒榖梁傳其曰公弟叔肸賢之也其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴乎春秋胡泰山孫氏曰不曰公子公孫以見肸無祿而卒也氏曰公子為正大夫而書卒貴也不為大夫而特書卒賢也十有八年春晉侯衛世子臧伐齊傳晉侯衛世子臧伐齊至于陽榖齊侯㑹晉侯盟于繒以公子彊為質于晉晉師還蔡朝南郭偃逃歸公伐杞夏四月秋七月邾人戕鄫子于鄫公羊傳戕鄫子子鄫者何殘賊而殺之也范氏曰于鄫惡臣子不能距難也胡氏曰邾人蓋嘗執鄫子用之則不共戴天之世讎既不能復又使邾人得造其國都而戕殺其君曰于鄫者所以深責鄫之臣子至此極也甲戌楚子旅卒旅榖梁作吕公羊傳何以不書葬吳楚之君不書葬辟其號也尼胡氏曰不書葬者恐民之惑而辟其號也蓋仲削之也公孫歸父如晉傳公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘於晉欲以晉人去之胡氏曰宣公刻意事齊易世猶未怠也及頃公不能謹禮怒晉魯上卿而郤克當國決䇿討之晉方强盛齊少懦矣於是背齊而事晉其於邦交以利為向背者也況欲以晉人去三桓夫輕於背大國易於謀大家而不知其本末未有能成而無悔者也冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊笙公榖並作柳立傳公薨季文子言於朝曰使我殺嫡庶以失大援者仲也夫臧宣叔怒曰當其時不能治後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命於介既復命袒括髮即位哭三踊而出遂奔齊以胡氏日三年無改於父之道可謂孝矣孟莊子之孝其不改父之臣與父之政也夫仁人孝子於其父之臣非有大不可赦如晉悼公於夷羊五之屬必存始終進退之禮而不遽也歸父以君命出使未返而君薨在禮有執圭復命于殯之文升自西階子臣皆哭情亦戚矣宣公猶未殯而東門氏逐忍乎哉書曰歸父還自晉者已畢事之詞也至笙遂奔齊者罪成公君臣死君而忘父亟逐之也比事以觀則見當國者有無君之心此春秋所以作不可不察也春秋集注卷六
