body:
  text: 春秋集注卷八宋張洽撰襄公名午成公之子定姒所生諡法因事有功曰襄元年春王正月公即位於是襄公始生四歲即位仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城案楚己取彭城封魚石今彭城非復宋地尚繫之宋傳曰諸侯為宋討魚石故稱宋且不登叛人也臨江劉氏曰楚為不道奬亂助惡雖得其地春秋不與也石氏曰齊國夏衛石曼姑圍蒯聵于戚不曰衛戚不與齊衛大夫助子圍父也此仲孫蔑會晉宋諸國大夫圍彭城則繫之宋不與蠻荆取中國之地以與叛臣也此春秋微意之見於筆削者也丘傳彭城降晉晉人以宋五大夫在彭城者歸置諸瓠齊人不㑹彭城晉人以為討二月齊太子光為質於晉夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫秋楚公子壬夫帥師侵宋韓厥公羊作韓屈下同鄫公羊作合偃鄫鄭地杜氏注在陳留襄邑縣東南傳晉韓厥荀帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次於鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援楚子辛救鄭侵宋鄭子然侵宋取犬丘魚胡氏曰楚人釋君助臣事已悖矣晉於是降彭城以石等歸遂伐鄭而諸侯次鄫援之放義而行者也楚子辛救鄭而經不書鄭本為楚以其君故集矢於目是以不二于楚弃華從夷不能裁之以義惟私欲之從則鄭無可救之善楚不得有能救之名故削而不書九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘泰山孫氏曰天王崩邾子晉衛之來朝聘皆不臣也二年春王正月葬簡王五月葬速也鄭師伐宋楚令也杜氏注以彭城故夏五月庚寅夫人姜氏薨成公夫人齊姜也以傳齊姜薨初穆姜擇美檟自為櫬與頌琴季文子取以葬非禮也婦養姑者也虧姑以成婦逆莫大焉六月庚辰鄭伯睔卒傳鄭成公疾子駟請息肩于晉公曰楚君以鄭故親集矢于其目非異人任寡人也若背之是弃力與言其誰䁥我免寡人惟二三子侵胡氏論鄭從楚見上公子壬夫宋注晉師宋師衛寧殖侵鄭傳晉師侵鄭於是子罕當國子駟為政子國為司馬諸大夫欲從晉子駟曰官命未改杜氏注宋雖非卿師重故序衛上晉伐喪非禮也愚謹案士丐侵齊聞喪而還春秋與之則兹伐喪之罪不待貶而見矣秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚傳會于戚謀鄭故孟獻子曰請城虎牢以逼鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不惟鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈惟寡君賴之己丑葬我小君齊姜杜氏注齊諡也三月而葬速叔孫豹如宋叔孫豹僑如之弟傳通嗣君也冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢虎牢故東虢之邑鄭滅虢為制邑秦漢為成臯東有汜水今孟州汜水縣有故虎牢城武傳復會于戚齊崔武子及滕薛小邾之大夫皆會知子之言故也遂城虎牢鄭人乃成陸淳曰諸侯之大夫取他國之邑相與城之非正也城虎牢可以安中國息征伐故聖人許之不繫于鄭也愚謹案虎牢所以不繫鄭者鄭人背監棄信黨楚以為中國患悼公動天下之諸侯以討之而負固自若故從孟獻子之謀城其巖邑以制之以伯主而討不服從之國地非鄭之所可私有故彭城非宋有也伯主為宋討則繫之宋虎牢鄭地也以中國當討鄭而不繫之鄭皆春秋明王制以示豫奪之正也楚殺其大夫公子申傳公子申為右司馬多受小國之賂以逼子重子辛楚人殺之劉氏傳嬰齊壬夫畏其逼而殺之也三年春楚公子嬰齊帥師伐吳傳楚子重伐吳為簡之師使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸吳人伐楚取駕子重病之遇心疾而卒王許氏曰大臣相殘又外結吳怨共之所以不振也公如晉傳始朝也夏四月壬戌公及晉侯盟于長樗公至自晉長樗近晉之地蘇氏曰晉侯修禮於諸侯故去其國都與公盟于長樗寡傳孟獻子相公稽首知武子曰天子在而君辱稽首君懼矣孟獻子曰以敝邑介在東表密邇仇讐寡君將君是望敢不稽首愚謂孟獻子魯之賢大夫尚不知君臣之義以相其君所謂不知先立乎其大者春秋諸賢之同病也六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤雞澤杜氏注在廣平曲梁縣西南任公輔曰案地譜一名雞丘今洛州永平縣傳晉為鄭服故且欲修吳好將合諸侯使士丐告齊曰寡君以歲之不易願與一二兄弟相見以謀不協請君臨之齊侯欲勿許而難為不協乃盟于耐外六月己未同盟于雞澤晉侯使荀㑹逆吳子于淮上吳子不至今案晉悼公始合諸侯尊王室而盟單子與桓公首止葵丘異矣故書諸侯㑹而己未同盟于雞澤所以譏其儕王官於諸侯俾下同於歃血其事不足乎揚故不再言雞澤而例之於新城同盟之書也陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟傳楚子辛為令尹侵欲於小國陳成公使袁僑如會求成晉侯使和組父告于諸侯秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也榖梁傳諸侯盟又大夫相與私盟是大夫張也故雞澤之會諸侯始失正矣泰山孫氏曰諸侯既盟而袁僑至無盟可也己未諸侯盟戊寅大夫又盟是大夫强諸侯始失政也至溴梁之盟曰大夫盟而不復言諸侯之大夫則政在大夫矣于胡氏曰陳久叛中國而從楚不堪其侵欲然後求盟晉悼公立已四年復修霸業其從之也不已晚乎悼公盍亦增修德政而謂袁僑曰諸侯之盟事畢矣而吾子始來若再刑牲歃血要質鬼神是瀆之也且吾子以帝王之胄習于禮義害楚之政去逆效順此諸侯之願寡君之欲也雖微盟誓天地鬼神實照臨之其惟同心糾逖王慝厚禮遣之使往報焉足矣奚必汲汲使大夫盟之哉書大夫及袁僑盟罪晉也秋公至自會冬晉荀罃帥師伐許傳許靈公事楚不會于雞澤冬晉知武子帥師伐許案荀罃悼公之賢大夫也偶見陳人之服不能輔悼公益修德以保陳陳固則許何患其不來今遽帥師以問罪於許規模欲速宜其并陳不能保也四年春王三月己酉陳侯午卒傳春楚師為陳叛故猶在繁陽韓獻子患之言于朝曰文王帥殷之叛國以事紂唯知時也今我易之難哉三月陳成公卒楚人將伐陳聞喪乃止陳人不聼命夏楚彭名侵陳夏叔孫豹如晉傳如晉報知武子之聘也秋七月戊子夫人姒氏薨姒公羊作弋下同杜氏注成公妾襄公母姒杞姓傳定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成君長誰受其咎初季孫為已樹六檟於蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御葬陳成公八月辛亥葬我小君定姒襄陵許氏曰傳載季文子欲不以夫人禮葬定姒志復古也而不得己於人言卒夫人之觀此踰月而葬蓋禮略也冬公如晉傳公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇於仇讐而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑𥚹小闕而為罪寡君是以願借助焉晉侯許之陳人圍頓傳楚人使頓間陳而侵伐之故陳人圍頓五年春公至自晉夏鄭伯使公子發來聘傳鄭子國來聘通嗣君也鄭案子國即子産之父僖公初即位叔孫豹鄫世子巫如晉傳穆叔覿鄫太子於晉以成屬鄫書曰叔孫豹鄫世子巫如晉言比諸魯大夫也劉氏傳此鄫世子巫也曷為與叔孫豹如晉鄫屬於魯為之附庸故相與往見于晉也鄫曷為為附庸于魯鄫不勝莒魯之患求為附庸以自定諸侯死社稷正也不能守其國以卑其宗廟鄫失正矣天子建附庸非天子命而私有之魯失正矣臣不能以矯其君子不能以正其父故曰叔孫豹鄫世子巫如晉猶吾大夫焉交譏之襄陵許氏曰天下無道小役大弱役强如此春秋蓋傷之也仲孫蔑衛孫林父會吳于善道道公榖作稻善道吳地榖梁曰吳謂善伊謂稻緩故杜氏注魯衛俱受命於晉故不言及二大夫往會之曰會吳傳吳子使夀越如晉辭不會于雞澤之故且請聼諸侯之好晉人將為之合諸侯使魯衛先會吳且告會期故孟獻子孫文子會吳於善道成襄陵許氏曰晉楚爭衡權之在吳故晉急吳如此案九年為蒲之會將以會吳而吳不至故十五年諸侯之大夫會之于鍾離前三年悼公盟雞澤使荀會逆吳子而又不至故此年使魯衛先會之于善道凡此皆往會之也至秋戚之會序吳于列而不復殊者因其來會也由此觀之則凡序吳者來會我也殊吳者往會之也悼公初立其風聲所及逺人慕之故吳有志於親中國辭謝雞澤之不會而請聼後會之期悼公告以會戚之期而聼其自來足矣至使魯衛特往會之則是以中國大邦而為蠻夷屈此二大夫會吳之所以特書也秋大雩傳旱也楚殺其大夫公子壬夫傳楚子討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是乎不刑已則無信而殺人以逞不亦難乎杜氏注共王伐宋封魚石背盟敗于鄢陵殺子反及公子甲壬夫八年之中殺三卿故君子以為不可公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚傳九月丙午盟于戚會吳且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命于會楚子囊為令尹范宣子曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近于楚民朝夕急能無往乎有陳非吾事也無之而後可愚謂戚之會因吳之來而命戍陳自桓文以來所以服陳者未聞以兵守之也士丐知戍陳之非長䇿是以有喪陳之歎孔子曰逺人不服則修文德以來之既來之則安之晉為安陳之計如此何以能保陳乎公至自會冬戍陳傳諸侯戍陳公羊曰曷為不言諸侯戍之離至不可得而序故言我也楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳榖梁曹伯下有莒子邾子滕子薛伯八字會傳子囊伐陳十一月甲午于城棣以救之十有二月公至自救陳書勞也辛未季孫行父卒傳季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬六年春王三月壬午杞伯姑容卒傳杞桓公卒夏宋華弱來奔傳宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱于朝平公見之曰司武而梏于朝難以勝矣遂逐之司城子罕曰同罪異罰非刑也専戮于朝罪孰大焉亦逐子蕩秋葬杞桓公滕子來朝莒人滅鄫傳鄫恃賂也杜氏注鄫有貢賦之賂在魯恃之而慢莒故滅之絶案吕氏以為鄫莒小國而自相滅亡蓋是時禮義衰滅國之大惡以為常事皆目見之熟而莫之顧也愚謂晉女叔齊對平公治杞田之問以為武獻以下兼國多矣誰得治之然則晉蓋吞滅之首也固無以正諸侯之相滅豈特目見之常事哉冝晉悼雖賢終無以戢諸侯之相滅也冬叔孫豹如邾傳穆叔如邾聘且修平季孫宿如晉宿行父之子鄫傳晉人以鄫故來討曰何故亡季武子如晉見且聽命國愚案晉人不討莒而討魯可謂偏矣宜其無以正小之罪也襄陵許氏曰魯既世卿而大夫無復三年之喪哀典廢於下矣十有二月齊侯滅萊傳萊恃謀也初二年齊侯伐萊萊人使正與子賂夙沙衛以索馬牛皆百匹齊師乃還五年四月晏弱城東陽而遂圍萊甲寅堙之環城傳于堞今年三月王湫帥師及正輿子棠人軍齊師齊師大敗之萊共公奔棠晏弱圍棠十一月丙辰而滅之公羊傳國滅君死之正也七年春郯子來朝傳始朝公也夏四月三卜郊不從乃免牲傳孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也小邾子來朝傳小邾穆公亦始朝公也城費費今沂州費縣季氏之邑傳南遺為費宰叔仲昭伯為隧正欲善季氏而求媚于南遺謂遺請城費吾多與而役故季氏城費胡氏傳行父相三君而無私積固忠于公室而不顧所食之邑也行父卒宿之不忠遂專魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違至于帥師墮費其越禮不度可知矣然則書城費乃履霜之戒强私家弱公室之萌據事直書而義自見矣用人不惟其賢惟其世豈不殆哉秋季孫宿如衛傳季武子如衛報子叔之聘且辭緩報非二也八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟傳衛孫文子來聘且拜武子之言而尋孫桓子之盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄬榖梁或作䧦鄭地杜傳楚子囊圍陳會于鄬以救之氏注謀救陳陳侯逃歸故不書救鄭伯髠頑如會未見諸侯丙戌卒子鄵公羊榖梁頑作原鄵作操夫公羊傳操者何鄭之邑也鄭伯將會諸侯于鄬其大欲與楚鄭伯曰不可於是弒之曷為不言大夫弒之為中國諱也未見諸侯其言如會何致其意也榖梁傳諸侯不生名此其生名何卒之名也卒之名則曷為加之如會之上見以如會卒也鄭伯將會中國其臣欲從楚不勝其臣弒而死謹案左氏傳子駟使賊夜弒僖公而以瘧疾赴於諸侯考三傳之說則鄭僖公之為弒也明矣弒而書卒若如左氏所言而從其僞赴以隱之是春秋之作乃為亂臣賊子之地而非章善疸惡之書也獨公羊則主諱之說榖梁則主不使得加之說然則春秋書卒而不書弒其諸聖人之意蓋出於此乎夫中外逆順天下之大分也鄭僖欲去楚而返見弒春秋為賢者諱蓋因其志于中國之善類不幸而無臣以輔佐之至于不得其死聖人為之隱其不幸而成其考終命所以垂世立教廣為善之門也陳侯逃歸傳陳人患楚慶虎慶寅謂楚人曰吾使公子黃往而執之楚人從之二慶使告陳侯于會曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸亦胡氏傳諸侯戍陳今楚令尹來伐諸侯又救之既勤矣為陳侯計者下令國中大中警偹立太子以固守親聽命於諸侯謀禦敵之策當是時晉君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧弃儀衛而逃歸此匹夫之事耳夫義路也禮門也輕弃中國惟蠻夷之懼是不能由是路出入是門故書逃歸以罪之八年春王正月公如晉傳公如晉朝且聽朝聘之數夏葬鄭僖公鄭人侵蔡獲蔡公子燮燮榖梁作濕馬傳鄭子國子耳侵蔡獲蔡司公子燮鄭人皆喜惟子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣乃謹案僖公方葬楚方脾睨鄭人之不服而欲討之今不能逺圖先侵蔡以桃楚故書人以貶之季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘邢丘任公輔曰故邢國河內平臯縣也邢自邢丘遷襄國又遷夷儀傳會于邢丘以命朝聘之數使諸侯之大夫聼命季孫宿齊高厚宋向戌衛寧殖邾大夫㑹之鄭伯獻捷于會故親聼命榖梁傳見魯之失正也公在而大夫會也與泰山孫氏曰邢丘之會公在晉也晉侯不與公會而季孫宿會者襄公微弱政在季氏故也晉為盟主弃其君而與臣何以宗諸侯此晉侯之惡亦可見矣胡氏傳大夫稱人貶也昔周公戒成王以繼自今我其立政立事夫不自為政而委於臣下是以國之利器示人而不知寶也朝聘事之大者重煩諸侯而使大夫聼命無乃以姑息愛人而不由德乎使政在大夫而諸侯失國又豈所以愛之也後此八年溴梁之會悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故貶諸大夫以謹之也謹案會而使大夫聼命自齊桓北杏始春秋之法必辦等列以大夫而會諸侯未有不人之者所以嚴君臣之分謹上下之交而革霸者荀且之政也公至自晉莒人伐我東鄙傳莒人伐我東鄙以疆鄫田不謹案莒人滅鄫而魯不敢爭霸主討所以興伐魯疆鄫田之師也秋九月大雩傳旱也冬楚公子貞帥師伐鄭傳楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰民急矣姑從楚以紓吾民晉師至吾又從之犧牲玉帛待於二竟以待疆者而庇民焉子展曰小所以事大信也五會之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也子駟曰詩云謀夫孔多是用不集請從楚騑也受其咎乃及楚平自胡氏傳鄭介大國之間若能任仁賢明政刑以禮法守而親比四鄰必能保國楚雖大何畏焉乃加兵于蔡以怒楚所謂不修德而有武功也故國人皆喜而子産獨不順是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣平而不書見鄭之屈服於楚而不信也晉侯使士丐來聘傳晉范宣子來聘且拜公之辱告將用師于鄭九年春宋災災公羊作火天火曰災來告故書夏季孫宿如晉傳報宣子之聘五月辛酉夫人姜氏薨宣公夫人成公毋穆姜秋八月癸未葬我小君穆姜冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有一月己亥同盟于戲戲鄭地糧傳諸侯伐鄭甲戌師于汜令曰修器備盛餱歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈于戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也乃許鄭成同盟于戲晉為載書曰自今日既盟之後鄭國不唯晉命是聼而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之無所底告自今日既盟之後鄭國不唯有禮與疆可以庇民者是從而敢有異志者亦如之晉人不得志於鄭以諸侯復伐之門其三門次于隂口而還武胡氏傳善為國者不師善師者不陳善陳者不戰知子明于善陳之法以佐晉悼公屢與諸侯伐鄭楚輒救之而不與之戰得善勝之之道矣楚子伐鄭傳楚子伐鄭子駟子展曰吾盟固云惟强是從乃及楚平十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤柤楚地後漢彭城國傳陽縣有柤水杜氏注吳子在柤晉以諸侯往會之故曰會吳夏五月甲午遂滅逼陽逼榖梁作傳逼陽杜氏注彭城傳陽縣今徐州沛縣小傳晉荀偃士丐請伐逼陽而封宋向戌焉荀罃曰城而固勝之不武弗勝為笑固請丙寅圍之弗克諸侯之師久於逼陽荀偃士丐請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以機出于其間曰女成二事而後告余余恐亂命以不女違七日不克必爾乎取之五月庚寅荀椻士丐帥卒攻逼陽親受矢石甲午滅之以與向戌向戌辭乃豫宋公以逼陽子歸獻于武宫謂之夷俘逼陽妘姓也使周內史選其族嗣納諸霍人吳襄陵許氏曰晉之威德未能服逺躬率諸侯涉楚會而因道用師滅人之國恃衆剽利無復伯討則中國之禮義盡矣夫何以昭格荒服甚之故日而志之也公至自會榖梁傳會夷狄不致惡事不致此其致何也存中國也中國有善事則并焉無善事則異之存之也汲鄭伯逃歸陳侯致柤之會存中國也范氏說有善事則并焉猶侵蔡蔡潰遂伐楚是并也無善事則異之謂如今年會吳甲午遂滅逼陽若會與遂異也楚公子貞鄭公孫輒帥師伐宋傳楚子囊鄭子耳伐宋師于訾母圍宋門于桐門晉師伐秦傳九年秦景公使士雃乞師于楚將以伐晉楚子許之秋楚子師於武城以為秦援秦人侵晉晉饑弗能報也今年晉荀罃伐秦報其侵也秋莒人伐我東鄙傳莒人間諸侯之有事也故伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭傳諸侯伐鄭齊崔杼使太子光先至于師故長于滕改吕氏曰齊世子光序諸侯上主會者為之也春秋不所以示譏言上下之無禮文專以彊弱事勢為先後也冬盜殺鄭公子騑公子發公孫輒騑公羊榖梁作斐侯傳初子駟與尉止有爭子駟為田洫司氏堵氏氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西官之朝殺子駟子國子耳子孔知之故不死程氏傳不稱大夫失卿職也愚謂鄭之從楚以勞中國皆公子騑之罪也鄭成公卒之初諸大夫欲從晉矣公子騑以官命未改止之及鄵之役僖公如會以從中國而騑弒之及楚子囊伐鄭子展欲堅守以待晉而騑請從楚以任其咎故公子騑者從逆之人弒君之賊也而公子發公孫輒惟騑是從惡積而不可掩鄭不能討而盜得殺之所謂上慢下暴而致寇至孔子以為盜之招也此所以不稱殺其大夫也與戍鄭虎牢傳諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之鄭及晉平胡氏傳虎牢之城不繫鄭者責在鄭也戍而繫鄭者罪諸侯也愚謂罪諸侯者責霸主之寡謀前年戍陳不能制楚以保陳矣又踵前轍而勞諸侯以戍守罷敝中國恃力逼小豈霸主服人之道乎故反繫之鄭以罪之楚公子貞帥師救鄭傳楚子囊救鄭十一月諸侯之師還鄭而南至于陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也丁未諸侯之師還侵鄭北鄙而歸楚人亦還胡氏曰以救許楚所以深罪諸侯不能保鄭肆其陵逼曽荆楚之不若也公至自伐鄭襄陵許氏曰書楚救鄭而致公知諸侯之避楚也十有一年春王正月作三軍杜氏注增立中軍萬二千五百人為軍傳季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍正義曰往前民皆屬公家若非征伐不屬三子故三子自以其邑之民為己之車乘今既三分公室所分得者即是己有故三家各自壞舊時車乘部伍以足成三軍也季氏使所分得國內三分有一之人以其役與邑皆來入季氏者則無公征若不以役邑入季氏則使公家倍征之役今之丁也邑賦稅也設利害以驅民使入己耳民畏倍征則盡歸季氏所分得者無一入公也孟氏於子弟之中課取其一又分半以歸公也叔孫氏使子弟盡為己臣唯以父兄歸公耳故昭五年傳云季氏盡征之叔孫氏臣其子弟言不臣父兄取二分而二分歸公也孟氏取其半又如叔孫所取其中止取其半以半歸公取一分而三歸公也無吕氏曰孟氏稍弱所以只使半為臣季氏强直欲盡公室也下胡氏傳詩頌復古言公車千乘又曰公徒三萬則臣無私民若有侵伐諸卿更帥以出事畢則將歸于朝車復于甸甲散于丘卒還于邑將皆公家之臣兵皆公家之衆不相繫也文宣以來政在私門襄公幼弱季氏益張廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作明年季孫宿救台遂入鄆又其後享范獻子而公臣不能具三耦民不屬公可知矣春秋書其作舍以見昭公失國定公無正以示兵權不司去公室有天下國家者之所宜鍳也夏四月四卜郊不從乃不郊榖梁傳夏四月不時也四卜非禮也鄭公孫舍之帥師侵宋傳鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將避之何為而使晉師致死于我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至我又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆場之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聼命焉且告于楚楚師至我又與之盟而重賂晉師乃免矣夏鄭子展侵宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北亳公羊榖梁作京故亳任氏云即鄭地偃師也湯都傳諸侯會于北林師于向觀兵于南門西濟于濟隧鄭人懼乃行成同盟于亳城北范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟母蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家之胡氏曰既同而又叛從子展之謀欲致晉師而後與也故其載書雖有隊命亡氏踣其國家之言渝之而不顧噫慢鬼神至此而盟猶足恃乎公至自伐鄭榖梁傳不以後致盟後復伐鄭也楚子鄭伯伐宋傳楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋公會晉侯宋公衛侯曹伯濟世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚傳九月諸侯悉師以復伐鄭鄭人使良霄大宰石􅎢如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之諸侯之師觀兵于鄭東門鄭人使王子伯駢行成甲戍晉趙武入盟鄭伯冬十月丁􅕀鄭子展出盟晉侯十二月戊寅會于蕭魚庚辰赦鄭囚皆禮而歸之納斥侯禁侵掠晉侯使叔肸告于諸侯蘇氏曰鄭與會也自八年後晉楚爭鄭三年之間晉人四以諸侯伐鄭楚輒救之晉用知罃之謀未嘗與楚人戰至是楚不能應遂全師以服鄭於是鄭固與晉二十餘年楚不能爭雖城濮之克不能過也程子𫝊鄭不可信而悼公推誠以待之不疑至哉誠之能感人也自此鄭不背晉者二十四年臨江劉氏曰悼公之服鄭也有道其信義著于諸侯非一日之積此善之可嘉者也鄭伯之欲從中國也亦非一日之積逼于楚之强而未果此不能之可矜者也然則晉之取鄭鄭之下晉不始于會蕭魚之日其信已在前矣至其會也諸侯以小息中國以小安是乃有貴乎約信者也其義不言而諭不盟而一故略其文以見其實蓋春秋成人之美之意也不以戰伐為善不以盟誓為信示以救災患恤禍亂同好惡獎王室而逺人服矣為天下豈可以詐力哉公至自會榖梁𫝊伐而後會不以伐鄭致得鄭伯之辭也程子曰兵不加鄭故書至自會楚人執鄭行人良霄霄榖梁作宵人陸淳曰稱行人而執以其事執也不稱行而執以己孰也許氏曰書楚執良霄見楚之力盡於是矣冬秦人伐晉傳秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴禦之少秦師而弗設備秦晉戰于櫟晉師敗績易秦故也十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆台榖梁作邰杜氏注琅邪費縣有台亭得公羊傳大夫無遂事此其言遂何公不為政爾胡榖梁𫝊受命而救邰不受命而入鄆惡季孫宿也氏傳台在邦域之中而専行之非有無君之心者不敢為也夏晉侯使士魴來聘傳晉士魴來聘且拜師秋九月吳子乘卒傳吳子壽夢卒臨于周廟惡泰山孫氏曰不書葬以其稱王罪大重貶之也冬楚公子貞帥師侵宋傳楚子囊秦庶長無地伐宋師于揚梁以報晉之取鄭也公如晉傳公如晉朝且拜士魴之辱十有三年春公至自晉夏取邿邿公羊作詩任杜氏注邿小國也城亢父縣有邿亭邿傳邿亂分為三師救遂取之秋九月庚辰楚子審卒冬城防傳於是將早城臧武仲請俟畢農事防許氏曰鄭役既息魯政有裕則知取邿以為利城以為安而已矣十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向蠆公羊作囆叔傳吳侵楚養由基奔命子庚以師繼之養曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師吳告敗于晉會于向為吳謀楚故也范宣子數吳之不德也以退吳人公襄陵許氏曰四卿帥師自成公始二卿列會自襄始大夫張也二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦傳諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟衛北宫懿子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死至于棫林不獲成焉茍偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役己未衛侯出奔齊衛侯下公羊有衎字而傳衛獻公戒孫文子寧惠子食皆服而朝日盰不召射鴻于囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使太師歌巧言之卒章太師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑于戚而入見遽伯王曰君之暴虐子所知也大懼杜稷之隕將若之何對曰君制其國臣敢奸之遂行從近關出公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之公出奔齊孫氏追之敗公徒于阿澤及竟公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冢卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪衛人立公孫剽孫林父寧殖相之以聽命於諸侯師曠侍于晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之天生民而立之君使司牧之勿使失性有君而為之二使師保之勿使過度自王以下各有父兄子弟以𥙷察其政天之愛民甚矣豈其使一人肆于民上以縱其淫而弃天地之性必不然矣亡杜氏注諸侯之策書孫寧逐君春秋以衛侯自取奔之禍故諸失國者皆不書逐之賊也猶襄陵許氏曰逐君之惡未有若林父者矣鄭厲衛惠以禮去者也春秋之季君弱臣彊衛獻出奔不名所以抑强臣定常君而存大義也莒人侵我東鄙秋楚公子貞帥師伐吳傳楚子為庸浦之役故子囊師于棠以伐吳吳不出而還冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚傳晉侯問衛故於中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之君其定衛以待時乎冬會于戚謀定衛也范宣子假羽毛于齊而弗歸齊人始二襄陵許氏曰衛人立剽非正也而謀定之則正弗勝矣林父在位是以知其謀定剽也愚案前書衛侯之奔此列孫林父於會足見晉為霸主抑君而臣是助其書于策則晉大失之黨孫林父罪惡具見左氏所載師曠中行偃之言專罪其君情可見矣十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉魯地于傳宋向戌來聘且尋盟公襄陵許氏曰不盟國而盟于劉崇向戌故弱甚矣劉夏逆王后于齊杜氏注劉采邑夏名劉夏天子之士也非傳官師從單靖公逆王后于齊卿不行禮也夏常山劉氏曰昏姻者人倫之本王后者天下之母劉非三公而逆后是不重人倫之本不尊天下之母禮何以興而風化何以成乎諸胡氏曰或曰天子必親迎信乎太上無敵于天下雖父昆弟莫不臣適四方諸侯莫敢有其室若屈萬乘之尊逺行親迎之禮則何無敵于天下之有或曰王后所與共事天地宗廟繼萬世之重者其禮當如何使同姓諸侯主其詞命卿往逆公監之父母之國諸卿皆送至于京師舍而止然後天子親迎以入其納王后之禮乎夏齊侯伐我北鄙圍成公救成至遇傳齊侯圍成二于晉故也於是乎城成郛不公羊傳其言至遇何不敢進也常山劉氏曰武備謹成郛見圍救患當速乃復畏避公之所為可知矣季孫宿叔孫豹帥師城成郛常山劉氏曰由不能救成故成郛見壞而城也愚謂待事之無及敵去而後城亦已晚矣詩曰逮天之未隂雨徹彼桑土綢繆牖戶孔子曰為此詩者其知道乎能治其國家誰敢侮之秋八月丁巳日有食之悼公卒政逮大夫之徴也邾人伐我南鄙傳邾人伐我南鄙使告于晉晉將為會以討邾莒晉侯有疾乃止民襄陵許氏曰政在君則民一民一則國强政在臣則二民二則國弱魯自文襄失政大夫益竊國柄齊與邾莒交伐其國不競甚矣則是無他故民分於三桓故也冬十有一月癸亥晉侯周卒傳冬晉悼公卒遂不克會十有六年春王正月葬晉悼公踰月而葬速也三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于湨梁戊寅大夫盟湨水名杜氏注出河內軹縣東南至溫入河蘇氏曰衛侯剽也二十五年衛侯入于夷儀衎也二君皆稱衛侯猶鄭突及忽皆稱鄭伯也傳葬晉焯公平公即位羊舌肸為傳張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服修官蒸于曲沃警守而下會于湨梁晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸于是叔孫豹晉荀偃宋向戌衛寧殖鄭公孫蠆小邾之大夫盟曰同討不庭公羊傳諸侯在是其言大夫盟何信在大夫也何言乎信在大夫遍刺天下之大夫也曷為遍刺天下之大夫君若贅旒然榖梁傳湨梁之會諸侯失正矣諸侯會而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也胡氏傳上二年春會于向十有三國之大夫也夏會伐秦亦十有三國之大夫也冬會于戚七國之大夫也此三會皆國之大事也而使大夫皆專之而諸侯不與焉是列國之君不自為政弗躬弗親禮樂征伐己自大夫出矣況悼公既沒晉平初立無先公之明也君若贅旒而大夫張亦宜矣夫豈一朝一夕之故哉善惡積于至微而不可掩常情忽于禾兆而弗預謀荀偃怒大夫盟而晉靖公廢趙籍韓䖍魏斯為諸侯之勢見矣有國者謹于禮而不敢忽此春秋以待後世之意也晉人執莒子邾子以歸傳命歸侵田以我故執邾宣公苡犁比公且曰通齊楚之使悼臨江劉氏曰前此者邾莒交伐魯晉將討焉未及而公卒平公即位㑹于湨梁於是執邾莒之君此執有罪何以不得為伯討古之君子正己而物正先自治而後治人晉侯之正未能以行其國而執人固所以非伯討也何氏注諸侯有罪當歸京師不得自治之録以歸惡其專也愚案孔子曰天下有道則禮樂征伐自天子出無道則禮樂征伐自諸侯出春秋之初已自諸侯出矣然莊十三年之前皆諸侯出而權未一也自齊桓既立晉文繼霸中國之政齊晉專之然猶在諸侯也至今年以後則皆自大夫出矣故於此書大夫盟著世變之益降也齊侯伐我北鄙夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許傳許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師會晉荀偃六月次于棫林伐許次于函氏襄陵許氏曰晉卿主兵而先鄭伯臣不可過君也沮愚謂許男有從中國之志而大夫之足以見一時之俗矣秋齊侯伐我北鄙圍成傳齊侯圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還大雩冬叔孫豹如晉傳穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之間恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見楚宣子賦鴻鴈之卒章宣子曰丐在此敢使魯無鳩乎十有七年春王二月庚午邾子牼卒牼公羊穀梁並作瞷宣公也泰山孫氏曰前年魯人執邾子以歸此書邾子牼卒者晉人尋赦之也宋人伐陳傳宋莊朝伐陳獲司徒印夏衛石買帥師伐曹傳衛孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹曹人訴于晉秋齊侯伐我北鄙圍桃高厚帥師伐我北鄙圍防桃公羊作洮公榖高厚上並有齊字于桃杜氏注辨縣東南有桃虛高傳齊人以其未得志我故秋齊侯伐我北鄙圍桃厚圍臧統于防師自陽關逆臧孫至于旅松鄹叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之泰山孫氏曰三年之中君臣加兵于魯者四齊之不道可知也九月大雩宋華臣出奔陳傳宋華閲卒華臣弱臯比之室使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後左師懼曰老夫無罪賊曰臯比私有討于吳遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之華臣出奔陳冬邾人伐我南鄙傳為齊故也十有八年春白狄來公羊傳曰狄者何夷狄之君也何以不言朝不能朝也劉氏傳蕃服于中國無事焉其於天子世一見則諸侯雖善其交際不得而通也是以春秋亦不與其朝不與其朝者所以懲淫慝一內外也周公致太平越裳氏九譯而獻白雉公曰君子德不及焉不享其贄此乃天子而讓也況列國之君守藩之臣乎夏晉人執衛行人石賈傳晉人執衛行人石買于長子執孫蒯于純留為曹故也之劉氏傳石買以君命聘于晉晉人執之晉能知石買伐曹為惡矣而未能知孫氏逐君之為惡也蒯者孫林父之子也非愚謹案石買之執有三失焉舍大而治小一也行人所執二也不歸于京師三也三者有一不得為伯討而況於兼而有之乎秋齊師伐我北鄙榖梁作齊侯襄陵許氏曰四年之中六伐鄙而四圍邑又從邾莒以助其虐諸侯之陵暴未有若是者也是以動天下之兵幾亡其國冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊傳齊侯伐我北鄙晉侯伐齊冬十月會于魯濟尋湨梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聼諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子家以告公公恐齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曵柴而從之齊侯見之畏其衆也乃脫歸丙寅晦齊師夜遁十一月丁卯朔入平隂遂從齊師晉人欲逐歸者魯衛請攻險己卯荀偃士丐以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭齊侯駕將走郵棠太子與郭榮諫太子抽劍斷鞅乃止甲辰東侵濰南及沂孫氏曰齊為不道數侵諸侯言同者諸侯同心疾齊也攻程氏傳書同圍見諸侯之惡齊襄陵許氏曰環而之焚其四郭故謂之圍曰同圍齊言得罪于天下也曹伯負芻卒于師襄陵許氏曰負芻之惡不容于堯舜之世春秋書卒與葬以刺王政之不行著世之亂也楚公子午帥師伐鄭傳鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位于今五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦于晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵于汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢會楚師楚師伐鄭次于魚陵右師城上棘遂涉潁次于旃然蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁右回梅山侵鄭東北至于蟲牢而反子庚門于純門信于城下而還涉于魚齒之下甚雨及之楚師多凍役徒幾盡十有九年春王正月諸侯盟于祝柯柯公羊作阿杜氏注祝柯縣今屬濟南郡後漢志平原郡祝柯地譜齊州禹城縣齊邑不傳諸侯還自沂上盟于督揚曰大毋侵小案諸侯序同圍之諸侯也晉人執邾子傳執邾悼公以其伐我故遂次于泗上疆我田取邾田自漷水歸之于我邾愚謂政自大夫出故前年執邾子以歸以伐魯故也人宜有所懲戒而伐魯無忌如此霸威之不足以令諸侯可以自反矣之臨江劉氏曰此其為非伯討奈何邾人伐魯晉人疾執其君以劫其地然則曷為不言以歸釋之也曷為釋之未得其地故劫之已得其地故釋之執君取地不以王命而皆出于大夫何以服人心而正其罪乎公至自伐齊胡氏傳同圍齊以伐致何也見齊靈無道宜得諸侯之伐而免其圍齊之罪辭也春秋于此有沮橫逆抑强暴之意孟子曰國必自伐然後人伐之自作孽不可逭齊侯環之謂矣取邾田自漷水杜氏注取邾田以漷水為界也漷水出東海合鄉縣西南經魯國至高平湖陸縣入泗濟傳見上文注而案言取邾田則非魯之舊可知異于西汶陽之取恃霸威以强取明矣魯肆强奪邾失漷水田而庶其畀我相繼來奔邾自是始衰亂矣季孫宿如晉傳如晉拜師葬曹成公夏衛孫林父帥師伐齊傳晉欒魴帥師從衛孫文子伐齊謹案欒魴不書孫林父并將也夫討强暴之罪而使逐君之大夫尸其事則晉何以服齊故特書林父主兵以罪之秋七月辛卯齊侯環卒環公羊作瑗晉士丐帥師侵齊至榖聞齊侯卒乃還傳士丐侵齊及榖聞喪而還禮也公羊傳還者何善辭也何善爾大其不伐喪也杜氏注詳録所至及還者明其得禮總愚謂將在軍君命有所不受三軍之進退將實司之殺伐之柄以臨有喪君子所不忍尚何墠帷請命以自纍其作止乎八月丙辰仲孫蔑卒曾子言孟莊子不改父之臣與政臣者使半為臣之類故傳記多稱獻子之賢有足法也齊殺其大夫高厚傳齊侯娶于魯曰顔懿姬無子其姪鬷聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子仲子曰不可廢常不祥間諸侯難光之立也列于諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東太子光使髙厚傳牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝靈公辛莊公即位執公子牙於句瀆之丘以夙沙衛易已衛奔髙唐以叛八月崔杼殺髙厚於灑藍而兼其室所謹案殺髙厚者崔杼也杼雖擅生殺之柄亦莊公之欲也以纍上之詞言之可謂著明矣鄭殺其大夫公子嘉嘉公羊作喜專傳鄭子孔之為政也國人患之乃討西宫之難與純門之師子孔當罪甲辰子展子西帥國人伐之殺子孔而分其室胡氏傳嘉則有罪矣子展子西不能正以王法肆諸市朝與衆同弃乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意冬葬齊靈公城西郛傳懼齊也叔孫豹會晉士丐于柯杜氏注魏郡內黃縣東北有柯城柯傳齊及晉平盟于大隧故穆叔會范宣子于穆叔見叔向賦載馳之四章叔向曰肸敢不承命城武城杜氏注泰山南武城縣不傳穆叔歸曰齊猶未也可以不懼乃城武城二十年春王正月辛亥仲孫速會莒人盟于向傳春及莒平孟莊子會莒人盟于向督揚之盟故也杜氏注莒數伐魯前年盟督揚故二國自復盟結好夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵杜氏注澶淵在頓丘縣南一名繁汗衛地案唐置澶州今屬開德府臨河縣新傳盟于澶淵齊成故也同襄陵許氏曰自文十四年城之役諸侯參盟則書同盟云者名生于不足也平公祝柯澶淵之盟不書同此悼公之遺烈也與秋公至自會仲孫速帥師伐邾傳邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之襄陵許氏曰祝柯之會既執邾子又取其田報亦足矣而復伐之譏已甚也且澶淵在彼何以盟為蔡殺其大夫公子燮燮榖梁作濕蔡公子履出奔楚傳初蔡文侯欲事晉曰先君與於踐土之盟晉不可弃且足弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡蔡人殺之公子履其母弟也故出奔楚而胡氏傳公子燮謀國之合於義者也國人乃不順焉殺燮此何罪矣故稱國以殺而不去其官履其母弟進不能正國退不能逺害懼禍而奔從于蠻荆書者罪之也陳侯之弟黃出奔楚黃公羊榖梁作光馬傳陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司同謀楚人以為討公子黃出奔楚書曰陳侯之弟黃出奔楚言非其罪也公子黃將奔呼于國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也弟襄陵許氏曰二慶執陳之權外介大國以奔其君之而哀公力不能正則國何恃而不亡叔老如齊傳齊子初聘于齊冬十月丙辰朔日有食之季孫宿如宋傳季武子如宋報向戌之聘也二十有一年春王正月公如晉傳公如晉拜師及取邾田也邾庶其以漆閭丘來奔杜氏注二邑在高平南平陽縣東北有漆鄉西北有顯閭亭任公輔曰兖州鄒縣即南平陽也後漢山陽南平鄉有漆亭山陽南平陽有閭丘亭傳邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司冦將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜庶其竊邑于邾以來子以姬氏妻之而與之邑是賞盜也賞而去之其或雖焉紇也聞之在上位者洗濯其心一以待人軌度其信可明徴也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎庶其非卿也以地來雖賤必書重地也陸淳曰以地來即叛也不言叛為內諱也諱受叛臣也及劉氏傳漆一邑也閭丘一邑也曷為不言及公邑言私邑不言及私邑者所受於君食之者也公邑者非食之者也則胡氏傳小國之大夫不書其姓氏微也其以事接我書謹之也莒慶以大夫即魯而圖昏接我不以禮者也邾庶其以地叛其君而來奔接我不以義者也書來奔而魯受叛臣納其地之罪亦見矣夏公至自晉秋晉欒盈出奔楚傳欒黶娶于范宣子生盈范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賓通幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂以范氏為死桓主而專政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而專之吾父死而益富死吾父而專子國有死而已吾蔑從之矣其謀如是懼害於主吾不敢不言范鞅為之徵懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之秋欒盈出奔楚使劉氏意林不以范丐逐之為文而以盈之自出為說盈無可逐之釁則丐不得逐矣丐之罪易見盈之失難知此春秋所以深探其情而大正其本也道莫難于治天下而天下之治在國國之治在家家之治在身身不治國家不可得而治也詩之首二南書之首堯舜皆原于此矣春秋述堯舜者也是以謹于人道之始閨門之內易曰間有家悔亡家之不間悔不亦宜乎九月庚戌朔日有食之冬十月庚辰朔日有食之襄陵許氏曰比年食今又比月食蓋此八年之間而日七食禍變重矣曹伯來朝曹武公來朝即位而來見也公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任傳㑹于商任錮欒氏也襄陵許氏曰欒氏之出非其罪也徒以權臣私相忌惡何有于國平公受其激怒勤動諸侯以逞范鞅之積憾必欲使盈無所容於世故盈發憤卒興禍亂此皆以私敗公足以為古今之至戒也二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨公羊榖梁邾子下有滕子傳秋欒盈自楚適齊晏平仲言于齊侯曰商任之會受命于晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聼退而告人曰君人執信臣人執共忠信篤敬上下同之天之道也君自弃也弗能久矣冬會于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼胡氏傳古者大夫去國君不掃其社稷不係纍其子弟不收其田邑使人導之出疆又先於其所往敕五典厚人倫也今晉不念欒氏世勳而逐盈又將搏執之而命諸侯無得納焉何其已甚也楚逐申公巫臣子反請以重幣錮之楚子曰止彼若能利國家雖重幣晉將可乎若無益于晉晉將弃之何勞錮焉其賢於商任沙隨之謀逺矣公至自會楚殺其大夫公子追舒傳楚觀起有寵於令尹子南禾益祿而有馬數十乘楚人患之王將討焉子南之子弃疾為王御士王每見之必泣弃疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南于朝轘觀起于四竟子南之臣謂弃疾請徙子尸於朝曰君臣有禮唯二三子三日弃疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉八曰然則臣王乎曰弃父事讐吾不忍也遂縊而死劉氏傳追舒之為人臣也足以殺其身矣然而楚子與人之子謀其父其刑已甚不可以行乎天下故稱國以殺罪纍上也二十有三年春王二月癸酉朔日有食之三月己巳杞伯丐卒傳杞孝公卒夏邾卑我來奔卑公羊作鼻之杜氏注卑我庶其黨泰山孫氏曰書畀我來奔惡內也惡鄉受邾叛人邑今又納邾叛人也葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黃自楚歸于陳傳陳侯如楚公子黃訴二慶于楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黃氏榖梁傳稱國以殺罪纍上也及慶寅慶寅纍也吕曰慶虎慶寅之罪不等故言及也逺胡氏人君擅一國之利勢使權傳臣暴蔑其身而不能欲去其親而不能保譖訴之於大國而不能辨至因夷狄之力然後能克則非君人之道也故二慶之死稱國以殺公子黃之出特以弟書者譏歸陳侯也晉欒盈復入于晉入于曲沃曲沃在河東聞喜縣劉氏傳曲沃欒氏之邑也然則曷為不言叛非叛者也劫衆以敵君直亂而已矣傳晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之樂王鮒侍坐于范宣子或告曰欒氏至矣宣子懼樂王鮒曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劍左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劔以帥卒欒氏退欒盈奔曲沃晉人圍之蘇氏曰欒盈自齊入于曲沃不言自齊何也齊之納欒盈非以兵納之也譬如盜賊私納之耳胡氏傳復入者甚逆之詞為其既絶而復入也曲沃者所食之地當是時權寵之臣各以利誘其下使為之用至于殺身而不避莫知有君臣之分者也故聞語欒孺子者則或歎或泣而樂為之死盈從之遂入絳乘公門若非天弃欒氏又有范鞅之謀晉亦殆矣原其失在于錮之甚急使無所容是以至此極春秋備書以見人而不仁疾之已甚亂也其為後世鑒豈不深切著明也哉秋齊侯伐衛遂伐晉傳齊侯伐衛自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聼陳文子見崔武子曰將如君何武子曰吾言于君君弗聼也以為盟主而利其難羣臣若急君於何有于姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也況以惡乎齊侯遂伐晉取朝歌為二隊入孟門登太行張武軍于熒庭戍郫邵封少水以報平隂之役乃還襄陵許氏曰齊間欒氏之難故能得志於晉而莊公禍亂之成著于此矣書齊侯本其惡也八月叔孫豹帥師救晉次于雍榆榆公羊榖梁作渝杜氏曰汲郡朝歌縣東有雍城常山劉氏曰晉有欒盈之難重以齊侯之伐魯命豹帥師救之斯義事也豹反怠弃君命不恤同姓之憂次于雍榆卒不克救豹罪明矣救蘇氏曰聶北之役先言次而後言救接兵待時卒能邢故以救終之也雍榆之役先言救而後言次以救晉出兵而盤桓于雍榆不及于事故以次終之也己卯仲孫速卒杜氏注孟莊子也冬十月乙亥臧孫紇出奔邾傳季武子無適子公彌長而愛悼子欲立之訪于申豐申豐趨退訪于臧紇紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正孟孫惡臧孫季孫愛之孟氏之御騶豐㸃好羯也曰從吾言必為孟孫豐㸃謂公鉏苟立羯請讐臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己卯孟孫卒公鉏奉羯立于户側季孫至曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有惟其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告于季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從己而視之孟孫又告季孫季孫怒命攻臧氏己亥臧紇斬鹿門之關以出奔邾杜氏注阿順季氏為之廢長立少以取奔亡書奔罪之晉人殺欒盈傳晉人克欒盈于曲沃盡殺欒氏之族黨孫公羊傳曷為不言殺其大夫非其大夫也泰山氏曰不言其大夫者欒盈出奔楚當絶也稱人以殺從討賊詞齊侯襲莒杜氏注輕行掩其不備曰襲傳齊侯還自晉不入遂襲莒門于且于傷股而退明日將復戰期于壽舒杞殖華還載甲夜入且于之隧宿于莒郊明日先遇莒子于蒲侯氏莒子親鼓之從而伐之獲杞梁莒人行成高郵孫氏曰以强攻弱又掩其不備焉書曰齊侯襲莒蓋侵伐之中而罪之尤者也二十有四年春叔孫豹如晉仲孫羯帥師侵齊傳孟孝伯侵齊晉故也夏楚子伐吳傳楚子為舟師以伐吳不為軍政無功而還秋七月甲子朔日有食之既襄陵許氏曰春秋三書日食既桓三年以周桓敗宣八年以楚莊興至是而中國諸侯皆受盟于楚矣齊崔杼帥師伐莒傳齊侯既伐晉而懼將欲見楚子楚子使薳啓彊如齊聘且請期秋齊侯聞將有晉師使陳無宇從薳啓彊如楚辭且乞師崔杼帥師送之遂伐莒侵介根大水襄陵許氏曰夷儀之會以水不克伐齊則知水之所𬒳廣矣非特魯之災也八月癸巳朔日有食之漢五行志曰董仲舒以為比食又既象陽將絶蠻荆主上國之象也後六君弒楚子伐鄭滅舒鳩魯侯朝之卒主中國公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀夷儀見僖元年注傳會于夷儀將以伐齊水不克冬楚子蔡侯陳侯許男伐鄭傳楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭楚子自棘澤還使薳啓彊帥師送陳無宇襄陵許氏曰夷儀之師不能正齊之亂而徒致棘澤之役以為鄭難則其救不足録矣公至自會陳針宜咎出奔楚傳陳人復討慶氏之黨針宜咎出奔楚則襄陵許氏曰針宜咎之事無聞焉爾而以慶氏黨逐其人亦可知矣易曰比之匪人不亦傷乎叔孫豹如京師傳齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路年襄陵許氏曰自宣九年仲孫蔑如京師其後五十餘乃始有叔孫豹以罕書也蓋自是不書聘王矣大饑榖梁傳五榖不升為大饑一榖不升謂之嗛二榖不升謂之餞三榖不升謂之饉四榖不升謂之康五榖不升謂之大侵大侵之禮君食不兼味臺榭不塗弛侯廷道不除百官布而不制鬼神禱而不祀此大侵之禮也移胡氏傳古者救荒之政若國凶荒或發廪以賑之或粟以通用或徙民以就食或為粥溢以救餓莩或興工作以聚失業之人緩刑含禁弛力薄征索鬼神除盜賊殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大饑蓋所以賑業之者有不備矣故書之以為戒二十有五年春齊崔杼帥師伐我北鄙傳崔杼伐我北鄙報孝伯之師也公患之使告于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使民不嚴異于他日齊師徒歸夏五月乙亥齊崔杼弒其君光傳齊棠公之妻東郭偃之姊也棠公死偃御武子以弔焉見棠妻而美之使偃取之莊公通焉驟如崔氏崔子因是又以其間伐晉也曰晉必將報欲弒公以說于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒子朝于齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從姜氏姜入于室與崔子自側户出侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請自刃于廟弗許皆曰君之臣杼疾病不能聽命陪臣干掫有淫者不知二命公踰牆又射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死晏子立于崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民杜稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私䁥誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭之興三踊而出盧蒲癸奔晉王何奔莒丁丑崔杼立景公而相之慶封為左相盟國人于大宫曰所不與崔慶者晏子仰天歎曰嬰所不唯忠于君利社稷者是與有如上帝乃歃太史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還胡氏傳莊公見弒賈舉州綽十人皆死之而不得以死節稱何也所謂死節者以義事君責難陳善有所從違而不苟者也雖在屬車後乘必不肯同入崔氏之宫矣若此十人者獨以勇力聞皆逢君之惡從于昏亂而莊公嬖之者死非其所比諸匹夫匹婦自經於溝漬而莫之知者猶不逮也雖殺身不償責安得以死節許之哉襄陵許氏曰齊莊勢陵大邦衆暴小國而又躬亂巨室淫肆不君故使崔杼因民不忍以與敵市此足以為世鑒矣公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀傳晉侯濟自泮會于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之使叔向告于諸侯求泰山孫氏曰晉再合諸侯將伐齊齊人懼弒莊公以成晉侯許之八月己巳諸侯同盟于重丘是也莊公復背澶淵之盟加兵晉衛信不道矣然齊人弒莊公以求成逆之大者晉侯不能即而討之以正齊國之亂曷以宗諸侯哉宜乎大夫日熾自是卒不可制也故先書崔杼之弒以著其惡胡氏傳夫晉本為報朝歌之役來討及會夷儀既聞崔杼之弒則宜下令三軍建而復斾問齊人以莊公之故執崔杼而戮之謀于齊衆置君以定其國示天討之義則方伯連帥之職修矣今乃知罪不討而受其賂則是與之同情也故春秋治之如下文所貶云六月壬子鄭公孫舍之帥師入陳傳初陳侯會楚子伐鄭當陳隧者并堙木刋鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其太子偃師奔墓子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還秋八月己巳諸侯同盟于重丘重丘在曹州乘氏縣有故城傳同盟于重丘齊成故也于胡氏傳崔杼既弒其君晉侯受其賂而許之成故盟重丘特書曰同或曰同盟之書自幽以來皆假王制以約束諸侯何獨此盟罪之之深如胡氏之言乎愚案二幽之盟合諸侯以共尊周而諸侯聼命也重丘之盟合諸侯將以討齊乃受賂而釋之且列弒君之齊于盟也天下之惡孰大於是即其所同之實而觀之晉侯之罪亦一齊也故曰一美一惡無嫌于同公至自會衛侯入于夷儀杜氏注夷儀本邢地衛滅邢而為衛邑晉愍衛衎失國使衛分之一邑傳晉侯使魏舒宛沒逆衛侯將使衛與之夷儀崔杼止其帑以求五鹿八月衛獻公入于夷儀名胡氏傳鄭伯突入于櫟衛侯入于夷儀其入則一或或不名者何也鄭伯奪正以立而國人君之諸侯助之不知其義不可以有國也故特書其名著王法以絶之衛侯蔑其冢卿失國出奔固不為無罪矣然有世叔儀以守有母弟鱄以出或撫其內或營其外有歸道焉其義猶未絶也故止書其爵而不名及寧喜弒剽復歸于衛然後書名此聖人俟其改過遷善不輕絶人之意楚屈建帥師滅舒鳩傳二十四年吳人為舟師之役故召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹夀與師祁黎讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還二十五年楚薳子馮卒屈建為令尹舒鳩人卒叛令尹子木伐之及離城吳人救之大敗遂圍舒鳩八月楚滅舒鳩冬鄭公孫夏帥師伐陳夏公羊作囆之傳鄭子産獻捷于晉晉人受十月鄭伯如晉拜陳之功子西復伐陳陳及鄭平十有二月吳子遏伐楚門于巢卒遏公羊榖梁並作謁吳傳吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰王勇而輕若啓之將親門我獲射之必殪從之吳子門焉牛臣隱于短牆以射之卒以榖梁傳諸侯不生名取卒之名加之伐楚之上者見伐楚卒也其見以伐楚卒何也古者大國過小邑小邑必飾城而請罪禮也吳子謁伐楚至巢入其門門人射吳子而卒古者雖有文事必有武備非巢之不飾城而請罪非吳子之自輕也二十有六年春王二月辛卯衛寧喜弒其君剽傳二十年衛寧殖疾召其子喜曰吾得罪于君悔而無及也名藏在諸侯之䇿曰孫林父寧殖出其君君入則掩之若能掩之則吾子也不然吾有餒而已不來食矣喜許諾殖卒三十五年冬衛獻公自夷儀使與寧喜言寧喜許之太叔文子聞之曰詩曰夙夜匪懈以事一人今寧子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而況置君而弗定乎九世之卿族一舉而滅之可哀也哉二十六年衛獻公使子鮮為復辭敬姒强命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在不然必敗故公使子鮮子鮮不獲命于敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人寧喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出告右宰榖右宰榖曰不可獲罪于兩君天下誰畜之悼子曰吾受命于先人不可以二榖曰我請使焉而觀之遂見公于夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在右宰榖曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以已孫文子在戚孫嘉聘于齊孫襄居守二月庚寅寧喜右宰榖伐孫氏不克伯國傷寧喜出舍于郊伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之辛卯殺子叔及大子角不或問寧喜弒衛侯剽既有其父之命矣經于衎之出以名書是其位未嘗絶也曷為書喜之罪不從未減乎愚以為人臣夙夜匪懈以事一人不可以二者也殖既從林父之逐衎共立剽而臣事之十餘年矣其可以反易天常而命其子乎君臣之分如天冠地屨不可一日易者也殖之命其子可謂悖矣故太叔儀責其視置君不如奕棋而知其身之不死以及其宗也喜也輕徇父命而不知諫躬犯大惡書以弒君辭而不可得矣故春秋者聖人所以定天下之大分而示萬世臣子之法不可不審思而明辨之也以襄陵許氏曰君臣之分一正而不可復易此聖人所定天下之經也劉氏曰季子然問仲由冉求可謂大臣與孔子曰所謂大臣者以道事君不可則止今由與求也可謂具臣矣季子然曰然則從之者與曰弒父與君亦不從也自此論之其任重其責厚小從罪也大從惡也夫據國之位而享其祿臨禍不死聞難不圖偷得自存之計使篡弒因己而立後雖悔之不可及己里克趙盾寧殖之貶不亦宜乎夫三子之罪方諸商人陳乞則輕重有問矣然而春秋不别也以謂君臣之間義不容失故其文一施之所以教天下之為人臣者也衛孫林父入于戚以叛傳孫林父以戚如晉書曰入于戚以叛罪孫氏也臣之祿君實有之義則進否則奉身而退專祿以周旋戮也杜氏注衎雖未居位林父専邑背國猶為叛也甲午衛侯衎復歸于衛傳衛侯入大夫逆于竟者執其手而與之言道逆者自車揖之逆于門者頷之而已得胡氏傳衛侯出奔入于夷儀皆以爵稱今既復歸而國矣乃書其名何也人之有德慧術知者恆存乎疢疾衛侯淹恤在外十有二年困于心衡于慮久矣此生於憂患之時而一旦得國失信無刑猶夫人也則是困而弗革雖復得國猶非其國也然愚案春秋名衎與衛侯鄭殺叔武公子瑕名之同意寧喜以納君而見殺則方之成公衎為甚矣夏晉侯使荀吳來聘公會晉人鄭良霄宋人曹人于澶淵杜氏注澶淵衛地又近戚田傳衛人侵戚東鄙孫氏訴于晉晉戍茅氏殖綽伐茅氏殺晉戍三百人復訴于晉晉為孫氏故召諸侯將以討衛也中行穆子來聘召公也六月公會晉趙武宋向戌鄭良霄曹人于澶淵取衛懿氏六十以與孫氏胡氏曰趙武貶稱人助孫氏也鄭良霄獨不貶者案左氏鄭伯為衛侯故如晉則知其不助孫氏矣秋宋公殺其世子痤傳初宋芮司徒生女子共姬納諸御嬖生佐惡而婉秋太子痤美而狠寺人惠牆伊戾為太子內師而無寵楚客聘于晉過宋太子知之請野享之公使往伊戾請從之至則欿用牲加書徴之而騁告公曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為太子公徐聞其無罪也乃亨伊戾子泰山孫氏曰稱君以殺世子甚之也胡氏傳賊世痤者寺人之譖也而獨罪宋公何哉譖言之得行也必有嬖妾配嫡以惑其心又有小人欲結內援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎直稱君者春秋正其本之意晉人執衛寧喜傳晉人執寧喜北宫遺使女齊以先歸也公羊傳此執有罪何以不得為伯討不以其罪執之劉氏傳曷為不以討賊之辭言之寧喜如晉晉人執之曰爾曷為納君而伐孫氏也云爾非伯討也八月壬午許男寧卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公傳許靈公如楚請伐鄭曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚王是故昧于一來不如使逞而歸乃易成也子展說不禦寇十二月乙酉入南里墮其城涉于樂氏門于師之梁縣門發獲九人焉涉于汜而歸而後葬許靈公二十有七年春齊侯使慶封來聘傳齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋奐公羊作瑗善傳宋向戌善於趙文子又於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀于諸大夫韓宣子曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得己齊人許之如秦秦亦許之皆告于小國為會于宋五月甲辰晉趙武至于宋壬戌楚公子黑肱先至成言于晉丁卯宋向戌如陳從子木成言于楚子木謂向戌請晉楚之從交相見也庚午向戊復于趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能于秦也楚君若能使秦君辱于敝邑寡君敢不固請于齊壬申左師復言于子木子木使馹謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至庚辰子木至自陳陳孔奐蔡公孫歸生曹許之大夫皆至以藩為軍晉楚各處其偏泰山孫氏曰隱桓之際天子失道諸侯擅權宣成之間諸侯僭命大夫專國至宋之會則又甚矣何哉宋之會諸侯日微天下之政中國之事皆大夫專持之也故二十九年城杞三十年會澶淵昭元年會虢諸侯莫有見者此天下之政中國之事皆大夫專持之可知也衛殺其大夫寧喜衛侯之弟鱄出奔晉鱄榖梁作專不傳衛寧喜專公患之公孫免餘請殺之公曰徵寧子及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寧氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻寧氏殺寧喜及右宰榖尸諸朝石惡將會宋之盟受命而出欲殺以亡懼不免且曰受命矣乃行子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟于河託于木門不鄉衛國而坐終身不仕高郵孫氏曰喜弒剽而立衎衎反國而復用之既而以其私殺之喜雖有罪而衛侯殺之不以其罪矣昔里克弒奚齊而立夷吾夷吾殺之二君之殺其大夫皆以其私里克寧喜之見殺皆不以其罪故春秋皆曰殺其大夫也榖梁傳專其曰弟何也專有是信者故出奔晉織絇邯鄲終身不言衛專之去合乎春秋劉氏意林衛侯忌小忿以誅有功捐大信以疑至親使鱄至于去國逃死者無人君之道故也當此之時鱄以全身不離于惡名為智以毋使其兄有誅弟之惡為義以不翹世以自潔為忠以不仕而能矯國之失為廉可謂重己乎是乃君子之所貴也秋七月辛巳豹及諸侯之大夫盟于宋傳辛巳將盟于宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信趙孟患之以告叔向叔向曰匹夫一為不信猶不可若合諸侯之卿以為不信必不捷矣夫以信召人而以僭濟之必莫之與也安能害我又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也乃盟晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德毋爭先乃先楚人書先晉晉有信也劉氏傳豹何以名一事而再見者卒名也地子宋以宋為主也胡氏曰此一地也曷為再言宋書之重詞之復其中必有大美惡焉宋之盟向戌欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見自是中國諸侯南向而朝楚及申之會蠻荒之君篡弒之賊大合十有一國之衆而用齊桓召陵之禮聖人至此哀人倫之滅傷中國之衰而其事自宋之盟始也故會盟同地而再言宋者貶之也吕氏曰晉楚之從交相見內外之分自此不復辨矣冬十有二月乙亥朔日有食之二十有八年春無氷夏衛石惡出奔晉傳衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀邾子來朝傳邾悼公來朝時事也秋八月大雩傳旱也仲孫羯如晉傳告將為宋之盟故如楚也冬齊慶封來奔傳二十七年齊崔杼生成及彊而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立明成請老于崔崔子許之偃與無咎弗豫曰崔宗邑也必在宗主成與彊怒將殺之告慶封慶封告盧蒲嫳盧蒲嫳曰彼君之讎也天或者將弃彼矣崔之薄慶之厚也他日又告慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔彊殺東郭偃棠無咎于崔氏之朝崔子怒而出遂見慶封慶封使盧蒲嫳帥甲以攻崔氏殺成與彊而盡俘其家其妻縊嫳復命於崔子且御而歸之至則無歸矣乃縊慶封當國二十八年慶封好田而嗜酒與慶舍政則以其內實遷于盧蒲嫳氏易內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有寵言王何而反之二人皆嬖冬十月慶封田于萊十一月乙亥嘗于太公之廟慶舍涖事盧蒲癸自後刺子之王何以戈擊之死慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宫弗克反陳于嶽請戰弗許遂來奔既而齊人來讓奔吳吳句餘與之來方富于其舊十有一月公如楚傳為宋之盟故公及宋公陳侯鄭伯許男如楚國泰山孫氏曰公朝楚者桓文既死夷狄日熾中日微故公逺朝强夷也十有二月甲寅天王崩靈王也乙未楚子昭卒康王也日胡氏曰甲寅天王崩乙未楚子昭卒相距四十二則閏月之驗也然不以閏書見喪服之不數閏也其吕氏曰此明閏月之驗然不書閠者閏承前月而受餘日故書閏月之日繫前月之下史䇿常體又有定例故不必每月發傳此范寧之說也然杜預以十二月無乙未日誤蓋預專據左氏說經以二十七年十二月辰在申司歷再失閏二十八年春頓置兩閏故此年正月得以無氷為災而書孔潁達又以為甲寅乙未不得同月是皆不知閏月之日繫前月之下史䇿常體之法也二十有九年春王正月公在楚傳公在楚楚人使公親檖夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公曰欲之而言叛祗見疏也公問公冶曰吾可以入乎對曰君實有國誰敢違君公欲無入榮成伯賦式微乃歸公羊傳何言乎公在楚正月以存君也胡氏傳歲之首月公如他國者有矣此獨書公在楚者外為蠻荆所制以俟其葬而不得歸內為强臣所逼欲擅其國而不敢入故特書所在以存君也使後世臣子戴天履地視君父之危且困必有天威不違顔咫尺食坐見于羮牆之意而不以頃刻忘也此義一與身而不恤國附權臣以圖富貴而豈行敢有顧其家其背君者乎劉氏意林曰有公則無所復存存公則疑于失國在易坤之剝曰龍戰于野其血𤣥黃夫嫌于無陽而後稱陽猶嫌于無君而後稱公安可弗察邪夏五月公至自楚穀梁傳公在楚閔公也公至自楚喜之也致君者殆其往而喜其反此致君之義也庚午衛侯衎卒閽弒吳子餘祭傳吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之公羊傳閽者何門人也刑人也刑人則曷為謂之閽刑人非其人也君子不近刑人近刑人則輕死之道也穀梁傳閽門者也不稱名姓閽不得齊于人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也仲孫羯會晉荀盈齊高止宋華定衛世叔儀鄭公孫假曹人莒人邾人滕人薛人小邾人城杞儀公羊作齊左氏無邾人月傳晉平公杞出也故治杞六知悼子合諸侯之大夫以城杞鄭子太叔與伯石往子大叔見大叔文子與之語文子曰甚乎其城杞也子大叔曰若之何哉晉國不恤周宗之闕而夏肄是屏其弃諸姬亦可知也己諸姬是弃其誰歸之吉也聞之弃同即異是謂離德詩曰協比其鄰婚姻孔云晉不鄰矣其誰云之胡氏傳古之建國立家者必親九族然有父族而後及母族有母族而後及妻族此葛藟之詩所為刺也晉主夏盟令行中國平公不能修文襄之業奬王室而夏肄是屏可謂知本乎平王惟不撫其民而逺屯戍于母家周人怨思而作詩此揚之水所以降為國風也城杞之役亦不待貶絶而可見矣公襄陵許氏曰齊桓城衛而諸侯歸心焉者桓公之志天下也晉平城杞而人疾其役其志私也動又不時能無攜乎晉侯使士鞅來聘傳范獻子來聘拜城杞也杞子來盟傳杞文公來盟書曰子賤之也吳子使札來聘傳吳公子札來聘通嗣君也弱公羊傳謁也餘祭也夷昧也與季子同母者四季子而才兄弟皆愛之同欲立之以為君謁曰季子不受也請無與子而與弟兄弟迭為君而致國乎季子皆曰諾故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國宜之季子者也季子使而亡焉僚者長庶也即之季子至而君之爾闔廬曰先君之所以不與子國而與弟者凡為季子故也將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚惡得為君乎於是使專諸刺僚而致國乎季子季子不受曰爾弒吾君吾受爾國是吾與爾為篡也爾殺吾兄吾又殺爾是父子兄弟相殺終身無已也去之延陵終身不入吳國常山劉氏曰札何以不稱公子辭國而生亂者札為之也吳子壽夢有四子季則札也壽夢欲立札札辭而去遏緣先君之志約以次必致國于札夷昧之卒札宜受命以安社稷而徇匹夫之節辭位以逃夷昧之子僚於是代立遏之子光乃弒僚而代之是以吳之亂札實為之也故春秋因札來聘去其公子以示貶焉人愚謹案春秋之書季札無以異於秦術楚椒然則聖不貴讓乎曰辭壤之心人皆有之至于義之所當受分之所當處而不得辭雖聖人不敢㣘小節而以退讓為安舜禹之受天下季歷武王之受國皆擇乎時中當其可而居之者也季子者其父命之其兄遜之受之則父兄之意慊而國家安榮不受則父兄之命塞而適以長亂君子于此將何處而可哉況身為貴戚古之聖賢未有視社稷之安危若是恝者微子箕子比干之在商反覆詔告自靖自獻以求無愧於先王孔子曰殷有三仁焉蓋必若是而後心德始全而吾可以有辭于永世矣季子為其父之所立其兄之所屬違父兄之命而徒以潔身而去為高觀宗國之危亂僚與光之相殘賊若秦人視越人之肥瘠正夫子所謂果哉末之難矣者其復位而待之言曰非我生亂君子殆未之信也劉質矢之傳得聖入之㫖矣秋九月葬衛獻公齊高止出奔北燕杜氏注高止高厚之子北燕燕國薊縣愚案南燕見桓十二年注北燕召公奭之後姬姓之國至此始見於經書傳齊公孫蠆公孫竈放其大夫高止於北燕乙未出曰出奔罪高止也高止好以事自為功且專故難及之君襄陵許氏曰案傳子尾子雅實放高止而經書出奔子以為大夫而放于君可也臣放大夫是無君也不可以訓故以出奔書也冬仲孫羯如晉傳孟孝伯如晉報范叔也三十年春王正月楚子使薳罷來聘罷公羊作頗下同傳楚子使薳罷來聘通嗣君也乎愚案魯以君朝而楚以大夫聘此齊桓晉文所以行列國者故自宋之盟夷夏不辨楚人行霸主之禮於中國非晉平趙武之責而誰責哉夏四月蔡世子般弒其君固傳蔡景侯為太子般娶于楚通焉太子弒景侯五月甲午宋災宋伯姬卒伯姬上公羊榖梁無宋字日傳甲午宋大災宋伯姬卒待姆也災榖梁傳取卒之加之災上者見以災卒也其見以卒奈何伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也然劉氏意林曰使共姬避火而全生未足以害其貞也而不以己之可以全其生之故而違天下之常義此安乎性命者乃能之故審乎死生之度辨乎榮辱之境知禮之重重于生辱之甚甚于死伯夷叔齊餓于首陽之下何以過乎詩曰彼己之子舍命不渝姬襄陵許氏曰王化始于正家春秋撥亂謹禮以宋共為婦道之表故詳録焉天王殺其弟侫夫王子瑕奔晉侫夫公羊作年夫傳初王儋季卒其子括將見王而歎單公子愆期為靈王御士過諸廷聞其歎而言曰必有此夫入以告王且曰必殺之不戚而願大視躁而足高心在他矣王曰童子何知及靈王崩儋括欲立王子侫夫侫夫弗知儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺侫夫括瑕廖奔晉書曰殺其弟侫夫罪在王也治榖梁傳甚之也明愚案王者之道親親而及天下則有序别嫌疑以賞罰則政有經周景王初立儋括謀亂而免侫夫不知而死所厚者薄本心亡矣所以終欲黜嫡立庶而致子朝之亂也秋七月叔弓如宋葬宋共姬榖梁無下宋字隱公羊傳外夫人不書葬此何以書之也其稱諡何賢也鄭良霄出奔許自許入于鄭鄭人殺良霄傳二十九年鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將强使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟于伯有氏三十年伯有嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許乙巳鄭伯及其大夫盟于大宫盟國人于師之梁之外伯有聞鄭人之盟己也怒聞子皮之甲不與攻己也喜曰子皮與我矣癸丑晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶率國人以伐之伯有死于羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城位榖梁傳不言大夫惡之也劉氏傳曷為不言復入未絶也曷為不言殺其大夫非其大夫也討賊之辭也伐愚謂良霄之出公孫黑蓋有罪焉春秋舍公孫黑專之罪而罪良霄何也曰嗜酒而不恤政汰侈而好爭伯有之所為有喪家亡身之道焉雖微公孫黑其能免于死乎既亡而不自省又入伐君而大亂其國此春秋所以正名以討賊之辭也春秋於喪國失家者皆不書所逐之人以明其身之有罪使有國有家者兢兢自謹而求所以保身也知所以反身自修之道則奔亡之禍逺矣此春秋之大義也孟子曰愛人不親反其仁治人不治有不得者皆反求諸己非深于春秋者其其智行能知之冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故澶淵衛地胡氏傳春秋大法君弒賊不討則不書葬況世子之于君父乎蔡景公何以獨書葬遍刺天下之諸侯也葬送之禮在春秋時視人情之疏密而為之者也有嘗同盟卒而不赴者有雖同姓赴而不會者則以哀死而致禭為輕弔生而歸賻為重必矣今蔡世子般弒其君藏在諸侯之䇿而往會其葬是恩義情禮之篤於世子般不以為賊而討之也世子弒君是誠為禽獸之不若也而不知討豈不廢人倫滅天理乎故春秋大法君弒賊不討則不書葬而蔡景公特書葬者聖人深痛其所為遍刺天下之諸侯也傳為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宫他鄭罕虎及小邾之大夫會于澶淵不書魯大夫諱之也爾劉氏傳會未有言其所為者此言其所為何譏何譏晉人與諸侯十二國之大夫會于澶淵凡為宋災故謀之也曰更宋之所喪雖死者不可復生其財復矣非務也何言乎非務會者講禮正刑一德紀天下也蔡侯弒其君而不謀宋災而謀之微矣陳恆弒其君孔子沐浴而朝告于哀公請討之公曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也又意林曰天下之事不一也君子慮所逺而小人恤所近夫災雖諸侯所當救然而一時之變一國之禍也財足以周其乏粟足以濟其用則己矣非所以為天下之憂也彼天下之憂者臣弒君一子弒父二如是則倫愆矣雖有粟吾得而食諸故孔子論天下之信則曰寧去食論陳恆之變則曰請討之其察於道之輕重緩急大小先後也審矣豈以姑息愛人哉胡氏傳叔孫豹晉趙武而下皆諸侯上卿執國之政者也三綱國政之本至于淪絶無父無君禽獸逼人雖得天下弗能一朝居矣昔者伯禹過門不入放龍蛇也周公坐以待旦驅猛獸也今世子弒君與之同羣而不恤有國者不戒于火自亡其財苟共來告弔之可也則合十二國之大夫而謀更其所喪尚為知類也乎蔡之亂猶人有腹心之疾而宋之災譬諸桐梓雞犬之亡失也以為未之察也可謂不智苟察之而不謀亦不仁矣是故諸國之大夫貶而稱人魯卿諱而不書又特言禽之所為以垂戒後世其欲人之自别于禽獸之害也可謂深切著明矣愚謹案父子君臣之變自文元年楚以商臣書此猶蠻荆之事也及是年蔡以中國之臣子為之而魯會其葬晉合諸侯為會而所恤者宋之火災而已故於此章三致意焉既變例書蔡景公之葬又人諸侯之大夫而諱魯卿又特書曰宋災故而閔天下之日尋亂亡以見深傷之意者為可知矣三十有一年春王正月夏六月辛巳公薨于楚宫傳公作楚宫六月辛巳薨于楚宫而杜氏注公適楚好其宫歸而作之不居先君之路寢安所樂失其所也襄陵許氏曰公還自楚不能增修政德而反勤民傷財務作楚宫公之志亦荒矣其何振之有又況變夏從夷亂國經常所以為不祥之道也秋九月癸巳子野卒傳立胡女敬歸之子子野次于季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子公子禱穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非嫡嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰祍如故衰於是昭公十九年矣猶有童心君子是以知其不能終也薨泰山孫氏曰襄公太子未踰年之君也名未葬也不不地降成君也胡氏傳般赤弒而書卒子野過毁亦書卒何以辨乎曰閔公內無所承不書即位則般之弒可知下書夫人姜氏歸于齊上書公子遂叔孫得臣如齊則子赤之弒可知與子野異矣杜氏注不書葬未成君也己亥仲孫羯卒傳孟孝伯卒冬十月滕子來會葬癸酉葬我君襄公傳滕成公來會葬癸酉葬襄公夫襄陵許氏曰子大叔曰先王之制諸侯之喪士弔大送葬滕子會葬非禮也十有一月莒人弒其君密州傳莒犂比公生去疾及展輿既立展輿又廢之犁比公虐國人患之十一月展輿因國人以攻莒子弒之乃立去疾奔齊齊出也展輿吳出也陸氏辨疑曰據傳則展輿弒其父不當不書恐傳是展輿因國人之攻莒子弒之乃立誤以之為以字春秋集注卷八
